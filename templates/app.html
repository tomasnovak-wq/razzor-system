.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-weight:500; cursor:pointer; transition:.15s; border:none; font-size:.875rem; }

.btn-secondary { background:#f1f5f9; color:#374151; } .btn-secondary:hover { background:#e2e8f0; }
.btn-danger { background:#fee2e2; color:#dc2626; } .btn-danger:hover { background:#fecaca; }
.btn-success { background:#dcfce7; color:#16a34a; } .btn-success:hover { background:#bbf7d0; }
.btn-warning { background:#fef3c7; color:#d97706; }
.input { border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 12px; font-size:.875rem; width:100%; outline:none; transition:.15s; }

.select { border:1.5px solid #e2e8f0; border-radius:8px; padding:8px 12px; font-size:.875rem; width:100%; outline:none; background:white; cursor:pointer; }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; display:flex; align-items:center; justify-content:center; padding:16px; }
.modal { background:white; border-radius:16px; padding:28px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
.modal-lg { max-width:900px; }
.tr-hover:hover { background:#f8fafc; }
th { font-size:.75rem; font-weight:600; color:#6b7280; text-transform:uppercase; padding:10px 12px; text-align:left; }
td { padding:8px 12px; font-size:.875rem; color:#374151; border-bottom:1px solid #f1f5f9; }
.stav-Čeká { background:#dbeafe; color:#1d4ed8; }
.stav-CNC-hotovo { background:#f3e8ff; color:#7c3aed; }
.stav-Výroba { background:#fef3c7; color:#b45309; }
.stav-Hotovo { background:#dcfce7; color:#15803d; }
.stav-Expedováno { background:#ede9fe; color:#6d28d9; }
.stav-Zrušeno { background:#fee2e2; color:#b91c1c; }
.stav-Zkontrolováno { background:#e0e7ff; color:#3730a3; }
.prioritni-row { background: #fffbeb !important; }
.prioritni-row:hover { background: #fef3c7 !important; }
.stav-OK { background:#dcfce7; color:#15803d; }

.stav-Nedostatek { background:#fee2e2; color:#b91c1c; }
input[type=number] { -moz-appearance:textfield; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
.hidden { display: none !important; }
.tab-btn { padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:500; font-size:.875rem; }
.tab-btn.active { background:#2563eb; color:white; }
.tab-btn:not(.active) { color:#6b7280; }
.tab-btn:not(.active):hover { background:#f1f5f9; }
/* ── STICKY THEAD + SORT ────────────────────────────────────────────────── */
table.tbl-sort thead th {
  position: sticky;
  top: 0;
  z-index: 4;
  cursor: pointer;
  user-select: none;
  background: #f9fafb;
  box-shadow: 0 1px 0 #e5e7eb;
  white-space: nowrap;
}
table.tbl-sort thead th:hover { background: #f0f4ff; color: #1d4ed8; }
table.tbl-sort thead th.sort-asc::after  { content: ' ▲'; font-size:.65em; opacity:.7; }
table.tbl-sort thead th.sort-desc::after { content: ' ▼'; font-size:.65em; opacity:.7; }
table.tbl-sort thead th.sort-asc,
table.tbl-sort thead th.sort-desc { color: #2563eb; }
/* Nesortovatelný sloupec (akce) */
table.tbl-sort thead th.no-sort { cursor: default; }
table.tbl-sort thead th.no-sort:hover { background: #f9fafb; color: #6b7280; }
table.tbl-sort thead th.no-sort::after { content: '' !important; }

@media print {

</style>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let currentPage = '';
let currentData = {};

// Cache pro client-side filtrování (data se načtou jednou, pak filtrujeme v JS)
let _cache = { materialy: null, typy: null, sklad: null, zakazky: null, dodavatele: null };

function setContent(html) {
  document.getElementById('page-content').innerHTML = html;
}

function setFilter(html) {
  const el = document.getElementById('page-filter');
  el.innerHTML = html;
  el.style.display = html ? '' : 'none';
}

function clearFilter() {
  const el = document.getElementById('page-filter');
  el.innerHTML = '';
  el.style.display = 'none';
}

// ── NAVIGACE ──────────────────────────────────────────────────────────────
function navigate(page) {
  // Invaliduj cache modulů které se mohly změnit
  if (page !== currentPage) {
    if (['materialy','sklad','zakazky','dodavatele','fakturace','dochazka','statistiky'].includes(page)) _cache[page] = null;
    if (page === 'priprava-vyroby') _cache['priprava-vyroby'] = null;
    if (page === 'dilna') _cache.dilna = null;
  }
  currentPage = page;
  clearFilter();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active','text-white'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.add('text-blue-200'));
  const nav = document.getElementById('nav-' + page);
  if (nav) { nav.classList.add('active','text-white'); nav.classList.remove('text-blue-200'); }
  const pages = { dashboard, materialy, sklad, 'typy-casu': typyCasu, zakazky, 'priprava-vyroby': pripravaVyroby, dilna, inventura, nastaveni, dodavatele, prijemky, fakturace, kancelar, 'opravne-doklady': opravneDoklady, nakupy, cnc, nabidky, dochazka, 'chyby-v-bom': chybyVBom, statistiky };
  if (pages[page]) pages[page]();
}

// ── SORT ENGINE ───────────────────────────────────────────────────────────
const _sortState = {};

function _sortTable(tbl, colIdx) {
  const id = tbl.dataset.sortId || (tbl.dataset.sortId = '_t' + Math.random().toString(36).slice(2,7));
  const prev = _sortState[id] || { col: -1, asc: true };
  const asc  = prev.col === colIdx ? !prev.asc : true;
  _sortState[id] = { col: colIdx, asc };

  // Update sort-indicator classes on ths
  tbl.querySelectorAll('thead th').forEach((th, i) => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (i === colIdx) th.classList.add(asc ? 'sort-asc' : 'sort-desc');
  });

  const tbody = tbl.querySelector('tbody');
  if (!tbody) return;
  const rows = Array.from(tbody.querySelectorAll(':scope > tr'));

  rows.sort((a, b) => {
    const ca = a.cells[colIdx], cb = b.cells[colIdx];
    // data-sort attribute lets cells provide a sortable value (e.g. raw number)
    const av = (ca?.dataset.sort ?? ca?.textContent ?? '').trim();
    const bv = (cb?.dataset.sort ?? cb?.textContent ?? '').trim();

    // Detect numbers (strip currency/units, allow comma decimal)
    const _n = s => parseFloat(s.replace(/\s/g,'').replace(',','.').replace(/[^\d.\-]/g,''));
    const an = _n(av), bn = _n(bv);
    let cmp;
    if (!isNaN(an) && !isNaN(bn)) {
      cmp = an - bn;
    } else {
      // Czech-aware string compare, handles dates (YYYY-MM-DD sorts lexically)
      cmp = av.localeCompare(bv, 'cs', { numeric: true, sensitivity: 'base' });
    }
    return asc ? cmp : -cmp;
  });
  rows.forEach(r => tbody.appendChild(r));
}

function _initSortable(root) {
  (root || document).querySelectorAll('table.tbl-sort').forEach(tbl => {
    if (tbl.dataset.sortInit) return;
    tbl.dataset.sortInit = '1';
    tbl.querySelectorAll('thead th').forEach((th, i) => {
      if (th.classList.contains('no-sort')) return;
      th.addEventListener('click', () => _sortTable(tbl, i));
    });
  });
}

// Auto-init: any time #page-content changes, wire up new tables

// ── API ────────────────────────────────────────────────────────────────────
async function api(url, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  const text = await r.text();
  try {
    return JSON.parse(text);
  } catch(e) {
    // Server vrátil HTML místo JSON – zobraz první smysluplnou řádku
    const snippet = text.replace(/<[^>]+>/g,'').trim().split('\n').find(l=>l.trim()) || text.slice(0,200);
    return { error: `Chyba serveru [${r.status}]: ${snippet.trim().slice(0,300)}` };
  }
}

function html(strings, ...vals) {
  return strings.reduce((acc, str, i) => acc + str + (vals[i] !== undefined ? String(vals[i]).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''), '');
}
function rawHtml(s) { return s; } // use for trusted HTML

function badge(status, cls='') {
  // 'CNC hotovo' má mezeru → nelze použít jako CSS class přímočaře
  const safeClass = status === 'CNC hotovo' ? 'stav-CNC-hotovo' : 'stav-' + status;
  const icon = status === 'CNC hotovo' ? '⚙ ' : '';
  return `<span class="badge ${safeClass} ${cls}">${icon}${status}</span>`;
}

function fmt(n, dec=2) {
  if (n === null || n === undefined || n === '') return '–';
  return Number(n).toLocaleString('cs-CZ', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}

function fmtKc(n) {
  if (!n && n !== 0) return '–';
  return Number(n).toLocaleString('cs-CZ', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' Kč';
}

function sklStav(item) {
  const stav = item.stav ?? item.skutecny_stav ?? (item.naskladneno - item.pouzito);
  const min = item.min_skladem || 0;
  if (min > 0 && stav < min) return 'Nedostatek';
  if (min > 0 && stav < min * 1.5) return 'Málo';
  return 'OK';
}

/** Vrátí textovou jednotku podle typu materiálu (shodná logika jako Python _mat_jednotka) */
function _typJednotka(typ) {
  const nt = (typ || '').toUpperCase()
    .replace(/[ÁÀÂÄ]/g,'A').replace(/[ČĆĈ]/g,'C').replace(/[ŠŚŜ]/g,'S')
    .replace(/[ŽŹŻ]/g,'Z').replace(/[ĚÈÉÊË]/g,'E').replace(/[ÍÌÎÏ]/g,'I')
    .replace(/[ÝŸ]/g,'Y').replace(/[ÚÙÛÜ]/g,'U').replace(/Ů/g,'U')
    .replace(/[ÓÒÔÖ]/g,'O');
  if (/DESKA|PREKLIZK|PLAYWOOD|PLAST|PEN|FOAM|BALDACH/.test(nt)) return 'm²';
  if (/PROFIL|HLINIK|LISTA/.test(nt)) return 'bm';
  return 'ks';
}

async function _matToggleOblibeny(kod, btn) {
  const r = await api(`/api/materialy/${encodeURIComponent(kod)}/oblibeny`, 'POST');
  if (r.error) return;
  // Okamžitá vizuální odpověď (bez čekání na reload)
  const fav = r.oblibeny == 1;
  if (btn) {
    btn.textContent = fav ? '★' : '☆';
    btn.className = `text-xl leading-none transition-colors ${fav ? 'text-amber-400' : 'text-gray-200 hover:text-amber-300'}`;
    btn.closest('tr').className = `tr-hover${fav ? ' bg-amber-50' : ''}`;
    const nazevCell = btn.closest('tr').querySelector('td:nth-child(3)');
    if (nazevCell) nazevCell.className = `font-medium${fav ? ' text-amber-900' : ''}`;
  }
  // Aktualizuj cache a přesuň řádek na správné místo
  if (_cache.materialy) {
    const mat = _cache.materialy.find(m => m.kod === kod);
    if (mat) mat.oblibeny = r.oblibeny;
    // Znovu seřaď cache: oblíbené na začátek
    _cache.materialy.sort((a, b) =>
      (b.oblibeny||0) - (a.oblibeny||0) ||
      (a.typ||'').localeCompare(b.typ||'', 'cs') ||
      (a.nazev||'').localeCompare(b.nazev||'', 'cs')
    );
    _matFilter(); // překresli seznam se správným pořadím
  }
}

function _matFilter() {
  const s = (document.getElementById('mat-search')||{value:''}).value.toLowerCase();
  const t = (document.getElementById('mat-typ')||{value:''}).value;
  const data = _cache.materialy || [];
  const filtered = data.filter(i =>
    (!s || i.kod.toLowerCase().includes(s) || i.nazev.toLowerCase().includes(s) || (i.dodavatel||'').toLowerCase().includes(s)) &&
    (!t || i.typ === t)
  );
  const tbody = document.getElementById('mat-tbody');
  const counter = document.getElementById('mat-count');
  if (tbody) tbody.innerHTML = filtered.map(_matRow).join('') || '<tr><td colspan="12" class="text-center text-gray-400 py-8">Nic nenalezeno</td></tr>';
  if (counter) counter.textContent = filtered.length;
}

async function _matAddSpojeni(kod) {
  const spojKod = (document.getElementById('spoj-kod')?.value || '').trim();
  const mnoz = parseFloat(document.getElementById('spoj-mnoz')?.value || 0);
  if (!spojKod) return alert('Vyberte spojovací materiál ze seznamu');
  if (!mnoz || mnoz <= 0) return alert('Zadejte kladné množství (ks na 1 kus tohoto materiálu)');
  const r = await api(`/api/materialy/${encodeURIComponent(kod)}/spojeniky`, 'POST', { spojovaci_kod: spojKod, mnozstvi_na_kus: mnoz });
  if (r.error) return alert('Chyba: ' + r.error);
  materialDetail(kod);
}

async function _matDeleteSpojeni(id, kod) {
  if (!confirm('Odebrat závislost?')) return;
  await api(`/api/materialy/spojeniky/${id}`, 'DELETE');
  materialDetail(kod);
}

function _spojSearch() {
  const q  = (document.getElementById('spoj-search')?.value || '').toLowerCase().trim();
  const dd = document.getElementById('spoj-dropdown');
  if (!dd) return;
  const mats = _cache.materialy || [];

  const filtered = q.length === 0
    ? mats.filter(m => m.oblibeny).slice(0, 30)           // prázdný = oblíbené
    : mats.filter(m =>
        m.kod.toLowerCase().includes(q) ||
        m.nazev.toLowerCase().includes(q) ||
        (m.typ  || '').toLowerCase().includes(q) ||
        (m.druh || '').toLowerCase().includes(q)
      ).slice(0, 50);

  if (!filtered.length) {
    dd.innerHTML = '<p class="text-gray-400 text-xs px-3 py-2">Nic nenalezeno</p>';
    return;
  }
  dd.innerHTML = filtered.map(m => {
    const star = m.oblibeny ? '<span class="text-amber-400 mr-1">★</span>' : '';
    return `<div class="flex justify-between items-center px-3 py-1.5 hover:bg-amber-50 cursor-pointer border-b border-gray-50"
                 onclick="_spojSelect('${m.kod.replace(/'/g,"\\'")}','${m.nazev.replace(/'/g,"\\'")}')">
      <span>${star}<span class="font-mono text-xs text-blue-600">${m.kod}</span> <span class="text-gray-700">${m.nazev}</span></span>
      <span class="text-xs text-gray-400 ml-2 shrink-0">${m.typ||''}</span>
    </div>`;
  }).join('');
}

function _spojSelect(kod, nazev) {
  const inp = document.getElementById('spoj-search');
  const hid = document.getElementById('spoj-kod');
  const dd  = document.getElementById('spoj-dropdown');
  if (inp) inp.value = `${kod} – ${nazev}`;
  if (hid) hid.value = kod;
  // Po výběru zobraz jen vybranou položku (potvrzení výběru)
  if (dd) dd.innerHTML = `<div class="px-3 py-1.5 text-sm text-green-700 bg-green-50">
    ✓ Vybráno: <strong>${kod}</strong> – ${nazev}
  </div>`;
  document.getElementById('spoj-mnoz')?.focus();
}

async function _detToggleOblibeny(kod) {
  const r = await api(`/api/materialy/${encodeURIComponent(kod)}/oblibeny`, 'POST');
  if (r.error) return;
  const fav = r.oblibeny == 1;
  const btn = document.getElementById('det-fav-btn');
  if (btn) {
    btn.textContent = fav ? '★' : '☆';
    btn.className = `text-3xl leading-none mt-0.5 transition-colors ${fav ? 'text-amber-400' : 'text-gray-300 hover:text-amber-300'}`;
    btn.title = fav ? 'Odebrat z oblíbených' : 'Přidat do oblíbených';
  }
  // Aktualizuj cache
  if (_cache.materialy) {
    const mat = _cache.materialy.find(m => m.kod === kod);
    if (mat) {
      mat.oblibeny = r.oblibeny;
      _cache.materialy.sort((a, b) =>
        (b.oblibeny||0) - (a.oblibeny||0) ||
        (a.typ||'').localeCompare(b.typ||'', 'cs') ||
        (a.nazev||'').localeCompare(b.nazev||'', 'cs')
      );
    }
  }
}

async function saveMaterial(existingKod) {
  const data = {
    kod: document.getElementById('m-kod').value.trim(),
    nazev: document.getElementById('m-nazev').value.trim(),
    typ: document.getElementById('m-typ').value,
    druh: document.getElementById('m-druh').value.trim(),
    nc_bez_dph: parseFloat(document.getElementById('m-nc').value) || 0,
    cas_s: parseFloat(document.getElementById('m-cas').value) || 0,
    dodavatel: document.getElementById('m-dod').value.trim(),
    umisteni: document.getElementById('m-umist').value.trim(),
    priorita: document.getElementById('m-prior').value,
    zobrazovat: document.getElementById('m-zob').checked ? 1 : 0,
    hmotnost: parseFloat(document.getElementById('m-hmotnost').value) || 0,
    master_baleni: parseInt(document.getElementById('m-master-baleni').value) || 1,
    balenf: parseFloat(document.getElementById('m-balenf').value) || 1
  };
  if (!data.kod || !data.nazev) return alert('Vyplňte kód a název!');
  const r = existingKod
    ? await api(`/api/materialy/${encodeURIComponent(existingKod)}`, 'PUT', data)
    : await api('/api/materialy', 'POST', data);
  if (r.error) return alert('Chyba: ' + r.error);
  _cache.materialy = null;
  closeModal();
  materialy();
}

  const rUz = await api('/api/uzivatele');

  openModal(`
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold">${typ === 'prijem' ? '↑ Příjem' : '↓ Výdej'} materiálu</h3>
      <button onclick="closeModal()" class="btn btn-secondary py-1 px-2">✕</button>
    </div>
    <p class="text-sm text-gray-600 mb-4"><strong>${kod}</strong> – ${nazev}</p>
    <div class="space-y-3">
      <div><label class="text-xs text-gray-500">Množství</label>
        <input class="input" id="poh-mnoz" type="number" step="0.001" min="0.001" autofocus></div>
      <div><label class="text-xs text-gray-500">Poznámka / doklad</label>
        <input class="input" id="poh-poz"></div>
      <div><label class="text-xs text-gray-500">Zapsal</label>

          <option value="">— bez přiřazení —</option>
          ${uzivList.map(u => `<option value="${u.jmeno}">${u.jmeno}${u.role ? ' · ' + u.role : ''}</option>`).join('')}
        </select>
      </div>
      <div class="flex gap-2 pt-2">
        <button class="btn ${typ==='prijem'?'btn-success':'btn-danger'} flex-1" onclick="savePohyb('${typ}','${kod}')">

async function savePohyb(typ, kod) {
  const mnozstvi = parseFloat(document.getElementById('poh-mnoz').value);
  if (!mnozstvi || mnozstvi <= 0) return alert('Zadejte množství!');
  const r = await api('/api/sklad/pohyb', 'POST', {
    material_kod: kod, typ, mnozstvi,
    poznamka: document.getElementById('poh-poz').value,
    uzivatel: document.getElementById('poh-uziv').value
  });
  if (r.error) return alert('Chyba: ' + r.error);
  _cache.sklad = null;
  closeModal();
  sklad();
}

  const vypocteny = i.naskladneno - i.pouzito;
  const kodEsc = i.kod.replace(/'/g, "\\'");

  return `<tr class="tr-hover${fav ? ' bg-amber-50' : ''}">
    <td class="w-8 text-center pr-0">

// ── FIFO DETAIL ───────────────────────────────────────────────────────────
async function fifoDetail(kod, nazev) {
  openModal(`<div class="text-center py-6 text-gray-400">Načítám FIFO dávky…</div>`);
  const d = await api(`/api/sklad/fifo/${encodeURIComponent(kod)}`);
  const davky = d.davky || [];

  if (davky.length === 0) {
    openModal(`
      <h3 class="text-lg font-semibold mb-2">FIFO – ${kod}</h3>
      <p class="text-gray-500">Žádné FIFO dávky nenalezeny. Proveď import naskladnění.</p>
      <div class="mt-4"><button class="btn btn-secondary" onclick="closeModal()">Zavřít</button></div>
    `);
    return;
  }

  // Celková hodnota + průměrná cena
  const celkemZbyla = d.celkem_zbyla;
  const prumernaCena = d.prumerna_cena;
  const celkemHodnota = celkemZbyla * prumernaCena;

  // Kolik dávek je plně vyčerpáno vs aktivních
  const aktivni = davky.filter(x => x.mnozstvi_zbyla > 0);
  const vycerpane = davky.filter(x => x.mnozstvi_zbyla <= 0);

  // Řádky tabulky
  let rows = '';
  for (let i = 0; i < davky.length; i++) {
    const dv = davky[i];
    const spotreba = dv.mnozstvi_orig - dv.mnozstvi_zbyla;
    const pctZbyla = dv.mnozstvi_orig > 0 ? (dv.mnozstvi_zbyla / dv.mnozstvi_orig * 100) : 0;
    const jePrvni = i === 0 && dv.mnozstvi_zbyla > 0;  // nejstarší aktivní = FIFO fronta
    const jeVycerpana = dv.mnozstvi_zbyla <= 0;

    let rowClass = jeVycerpana ? 'bg-gray-50 text-gray-400' : (jePrvni ? 'bg-green-50' : '');
    let stavBadge = jeVycerpana
      ? '<span class="text-xs bg-gray-200 text-gray-500 px-1.5 py-0.5 rounded">vyčerpáno</span>'
      : (jePrvni
          ? '<span class="text-xs bg-green-200 text-green-700 px-1.5 py-0.5 rounded font-medium">▶ FIFO první</span>'
          : '<span class="text-xs bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded">skladem</span>');

    // Progress bar zbývajícího množství
    const barColor = jeVycerpana ? 'bg-gray-300' : (pctZbyla < 20 ? 'bg-orange-400' : 'bg-green-400');
    const bar = `<div class="w-16 bg-gray-200 rounded-full h-1.5 inline-block align-middle ml-1">
      <div class="${barColor} h-1.5 rounded-full" style="width:${Math.min(pctZbyla,100).toFixed(0)}%"></div></div>`;

    rows += `<tr class="${rowClass}">
      <td class="py-1.5 px-2 text-xs font-mono ${jeVycerpana ? '' : 'text-gray-700'}">${dv.datum_prijmu}</td>
      <td class="py-1.5 px-2 text-xs ${jeVycerpana ? '' : 'text-gray-600'}">${dv.dodavatel||'–'}</td>
      <td class="py-1.5 px-2 text-xs ${jeVycerpana ? '' : 'text-gray-500'}">${dv.faktura||'–'}</td>
      <td class="py-1.5 px-2 text-xs text-right">${fmt(dv.mnozstvi_orig,2)}</td>
      <td class="py-1.5 px-2 text-xs text-right ${jeVycerpana ? '' : 'font-semibold'}">${fmt(dv.mnozstvi_zbyla,2)}${bar}</td>
      <td class="py-1.5 px-2 text-xs text-right text-gray-500">${fmt(spotreba,2)}</td>
      <td class="py-1.5 px-2 text-xs text-right">${dv.cena_jednotka > 0 ? fmtKc(dv.cena_jednotka) : '–'}</td>
      <td class="py-1.5 px-2 text-xs text-right font-medium">${dv.cena_jednotka > 0 ? fmtKc(dv.mnozstvi_zbyla * dv.cena_jednotka) : '–'}</td>
      <td class="py-1.5 px-2">${stavBadge}</td>
    </tr>`;
  }

  openModal(`
    <div style="min-width:min(90vw,860px)">
      <div class="flex items-start justify-between mb-4">
        <div>
          <h3 class="text-lg font-semibold">FIFO dávky – <span class="font-mono text-indigo-600">${kod}</span></h3>
          <p class="text-sm text-gray-500">${nazev}</p>
        </div>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
      </div>

      <!-- Shrnutí -->
      <div class="grid grid-cols-4 gap-3 mb-4">
        <div class="bg-indigo-50 rounded-lg p-3 text-center">
          <div class="text-xl font-bold text-indigo-700">${davky.length}</div>
          <div class="text-xs text-gray-500">Dávek celkem</div>
        </div>
        <div class="bg-green-50 rounded-lg p-3 text-center">
          <div class="text-xl font-bold text-green-700">${aktivni.length}</div>
          <div class="text-xs text-gray-500">Aktivní dávky</div>
        </div>
        <div class="bg-blue-50 rounded-lg p-3 text-center">
          <div class="text-xl font-bold text-blue-700">${fmt(celkemZbyla,2)}</div>
          <div class="text-xs text-gray-500">Zbývá celkem</div>
        </div>
        <div class="bg-purple-50 rounded-lg p-3 text-center">
          <div class="text-xl font-bold text-purple-700">${fmtKc(prumernaCena)}</div>
          <div class="text-xs text-gray-500">Průměrná cena/j</div>
        </div>
      </div>
      ${celkemHodnota > 0 ? `<p class="text-sm text-gray-600 mb-3">Celková hodnota skladu (FIFO): <strong>${fmtKc(celkemHodnota)}</strong></p>` : ''}

      <!-- Tabulka dávek -->
      <div class="overflow-auto max-h-96 border rounded-lg">
        <table class="w-full text-xs">
          <thead class="bg-gray-100 sticky top-0">
            <tr>
              <th class="py-2 px-2 text-left">Datum příjmu</th>
              <th class="py-2 px-2 text-left">Dodavatel</th>
              <th class="py-2 px-2 text-left">Faktura / č. dokladu</th>
              <th class="py-2 px-2 text-right">Přijato</th>
              <th class="py-2 px-2 text-right">Zbývá</th>
              <th class="py-2 px-2 text-right">Spotřeba</th>
              <th class="py-2 px-2 text-right">Cena/j</th>
              <th class="py-2 px-2 text-right">Hodnota zb.</th>
              <th class="py-2 px-2">Stav</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      ${vycerpane.length > 0 ? `<p class="text-xs text-gray-400 mt-2">Šedé řádky: ${vycerpane.length} plně vyčerpaných dávek</p>` : ''}
    </div>
  `);
}

// ── TYPY CASŮ / BOM ───────────────────────────────────────────────────────

// Výpočet správné MC: (cena_dilu + cas_h × sazba) × koef × (1 + DPH/100)
function _pocitejMC(cenaDilu, casH, cenyPar) {
  const sazba = parseFloat(cenyPar?.sazba_prace) || 300;
  const koef  = parseFloat(cenyPar?.koeficient_mc) || 2.2;
  const dph   = parseFloat(cenyPar?.dph) || 21;
  const cenaPrace = casH * sazba;
  return (cenaDilu + cenaPrace) * koef * (1 + dph / 100);
}

function _tcRow(i) {
  const hmotnost = i.hmotnost > 0 ? `${fmt(i.hmotnost,2)} kg` : '–';
  const cas = i.cas_narocnost > 0 ? `${fmt(i.cas_narocnost,1)} h` : '–';
  const cp = _cache.ceny_par || {};
  const mc = i.cena_dilu > 0 || i.cas_narocnost > 0
    ? _pocitejMC(i.cena_dilu || 0, i.cas_narocnost || 0, cp) : 0;
  const sazba = parseFloat(cp.sazba_prace)||300;
  const koef  = parseFloat(cp.koeficient_mc)||2.2;
  const dph   = parseFloat(cp.dph)||21;
  const mcTitle = `(${fmtKc(i.cena_dilu||0)} dílů + ${fmt(i.cas_narocnost||0,1)}h × ${sazba} Kč/h) × ${koef} × ${100+dph}%`;
  return `<tr class="tr-hover cursor-pointer" onclick="bomDetail(${i.id})">
    <td class="font-mono text-blue-600 text-xs font-semibold">${i.hn_cislo}</td>
    <td class="font-medium">${i.nazev}</td>
    <td class="text-xs text-gray-500">${i.typ_korpusu||'–'}</td>
    <td class="text-xs text-gray-500">${i.vnitrni_sirka||'?'}×${i.vnitrni_vyska||'?'}×${i.vnitrni_hloubka||'?'}</td>
    <td class="text-right text-gray-600" data-sort="${i.hmotnost||0}">${hmotnost}</td>
    <td class="text-right" data-sort="${i.cena_dilu||0}">${fmtKc(i.cena_dilu)}</td>
    <td class="text-right text-gray-500" data-sort="${i.cena_vyroby||0}">${i.cena_vyroby > 0 ? fmtKc(i.cena_vyroby) : '–'}</td>
    <td class="text-right text-gray-600" data-sort="${i.cas_narocnost||0}">${cas}</td>
    <td class="text-right font-semibold text-green-700" data-sort="${i.prodej_ap_bez_dph||0}">${i.prodej_ap_bez_dph > 0 ? fmtKc(i.prodej_ap_bez_dph) : '–'}</td>
    <td class="text-right font-semibold text-purple-700" data-sort="${mc}" title="${mcTitle}">${mc > 0 ? fmtKc(mc) : '–'}</td>
    <td onclick="event.stopPropagation()"><div class="flex gap-1">
      <button class="btn btn-primary py-1 px-2 text-xs" onclick="bomDetail(${i.id})">BOM</button>
      <button class="btn btn-secondary py-1 px-2 text-xs" onclick="editTypCasu(${i.id})">Upravit</button>
      <button class="btn btn-success py-1 px-2 text-xs" onclick="novaZakazkaZTypu(${i.id},'${i.hn_cislo}','${i.nazev.replace(/'/g,"\\'")}')">+ Zakázka</button>
    </div></td>
  </tr>`;
}

// Globální stav BOM editoru (musí přežít re-rendery modálu)
let _bomEditor = { typId: null, mats: [], staged: [] };

async function addBomItem(typId) {
  _bomEditor.typId = typId;
  _bomEditor.staged = [];

  // Načti materiály + existující BOM najednou
  const [matData, bomData] = await Promise.all([
    api('/api/materialy?limit=2000'),
    api(`/api/typy-casu/${typId}`)
  ]);
  _bomEditor.mats = matData.items || [];
  // Existující BOM položky (aby nešly přidat znovu)
  const existing = new Set((bomData.typ?.bom || []).map(b => b.material_kod));

  // Typy materiálů
  const typy = [...new Set(_bomEditor.mats.map(m => m.typ).filter(Boolean))].sort();

  _bomRender(typId, typy, existing, '');
}

function _bomRender(typId, typy, existing, filterTyp) {
  const mats = _bomEditor.mats;
  const staged = _bomEditor.staged;

  // Materiály dle filtru
  const filtered = mats.filter(m => !filterTyp || m.typ === filterTyp);
  const favs = filtered.filter(m => m.oblibeny == 1);
  const rest  = filtered.filter(m => m.oblibeny != 1);

  // Sestavení optgroup
  let opts = '<option value="">– Vyberte materiál –</option>';
  if (favs.length) {
    opts += '<optgroup label="⭐ Oblíbené">' + favs.map(m => {
      const dis = existing.has(m.kod) || staged.find(s => s.kod === m.kod) ? ' disabled' : '';
      return '<option value="' + m.kod + '"' + dis + '>★ ' + m.kod + ' – ' + m.nazev + (m.jednotka ? ' (' + m.jednotka + ')' : '') + '</option>';
    }).join('') + '</optgroup>';
  }
  if (rest.length) {
    opts += '<optgroup label="Všechny materiály">' + rest.map(m => {
      const dis = existing.has(m.kod) || staged.find(s => s.kod === m.kod) ? ' disabled' : '';
      return '<option value="' + m.kod + '"' + dis + '>' + m.kod + ' – ' + m.nazev + (m.jednotka ? ' (' + m.jednotka + ')' : '') + '</option>';
    }).join('') + '</optgroup>';
  }

  // Staged seznam
  let stagedHtml = '';
  if (staged.length) {
    stagedHtml = '<div class="mt-4">' +
      '<p class="text-xs font-semibold text-gray-600 mb-2">Připraveno k přidání (' + staged.length + ' položek):</p>' +
      '<div class="space-y-1">' +
      staged.map((s, idx) =>
        '<div class="flex items-center justify-between bg-green-50 border border-green-100 rounded-lg px-3 py-2">' +
          '<div class="flex-1">' +
            '<span class="text-xs font-mono text-gray-500">' + s.kod + '</span>' +
            '<span class="text-sm font-medium text-gray-800 ml-2">' + s.nazev + '</span>' +
          '</div>' +
          '<div class="flex items-center gap-2">' +
            '<span class="text-sm font-semibold text-blue-700">' + fmt(s.mnozstvi, 3) + ' ' + (s.jednotka || 'ks') + '</span>' +
            '<button onclick="_bomStagedRemove(' + idx + ')" class="text-red-400 hover:text-red-600 text-xs px-1" title="Odebrat">✕</button>' +
          '</div>' +
        '</div>'
      ).join('') +
      '</div></div>';
  }

  openModal(`
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold">Přidat položky do BOM</h3>
      <button onclick="_bomEditorClose()" class="btn btn-secondary py-1 px-2">✕</button>
    </div>

    <div class="space-y-3">
      <div>
        <label class="text-xs text-gray-500">Typ materiálu</label>
        <select class="select" id="bom-typ-filtr" onchange="_bomTypChange()">
          <option value="">– Všechny typy –</option>
          ${typy.map(tp => '<option value="' + tp + '"' + (filterTyp === tp ? ' selected' : '') + '>' + tp + '</option>').join('')}
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500">Materiál</label>
        <select class="select" id="bom-mat" onchange="_bomMatChange()">
          ${opts}
        </select>
      </div>
      <div id="bom-jednotka-info" style="display:none" class="text-xs text-blue-600 bg-blue-50 rounded-lg px-3 py-2"></div>
      <div>
        <label class="text-xs text-gray-500">Množství</label>
        <div class="flex gap-2">
          <input class="input flex-1" id="bom-mnoz" type="number" step="0.001" min="0.001" placeholder="0.000"
                 onkeydown="if(event.key==='Enter'){event.preventDefault();_bomStagedAdd();}">
          <button class="btn btn-success" onclick="_bomStagedAdd()">+ Přidat do seznamu</button>
        </div>
      </div>
    </div>

    ${stagedHtml}

    <div class="flex gap-2 pt-4 mt-2 border-t border-gray-100">
      <button class="btn btn-primary flex-1" onclick="_bomSaveAll()" ${staged.length === 0 ? 'disabled style="opacity:.5"' : ''}>
        💾 Uložit ${staged.length > 0 ? '(' + staged.length + ' položek)' : 'vše'}
      </button>
      <button class="btn btn-secondary" onclick="_bomEditorClose()">Hotovo bez uložení</button>
    </div>
  `, true);
}

function _bomTypChange() {
  const typEl = document.getElementById('bom-typ-filtr');
  const typ = typEl ? typEl.value : '';
  // Existující BOM znovu načíst není nutné, stačí ty co máme v _bomEditor
  const typy = [...new Set(_bomEditor.mats.map(m => m.typ).filter(Boolean))].sort();
  const existing = new Set(); // Nemáme je zde, ale staged postačí jako ochrana
  _bomRender(_bomEditor.typId, typy, existing, typ);
}

function _bomMatChange() {
  const matEl = document.getElementById('bom-mat');
  const infoEl = document.getElementById('bom-jednotka-info');
  if (!matEl || !infoEl) return;
  const kod = matEl.value;
  if (!kod) { infoEl.style.display = 'none'; return; }
  const mat = _bomEditor.mats.find(m => m.kod === kod);
  if (mat) {
    infoEl.style.display = '';
    infoEl.innerHTML = '<strong>' + mat.nazev + '</strong> · Typ: ' + (mat.typ || '–') + ' · Jednotka: <strong>' + (mat.jednotka || 'ks') + '</strong>';
    const mnozEl = document.getElementById('bom-mnoz');
    if (mnozEl) mnozEl.focus();
  }
}

function _bomStagedAdd() {
  const matEl  = document.getElementById('bom-mat');
  const mnozEl = document.getElementById('bom-mnoz');
  if (!matEl || !mnozEl) return;
  const kod  = matEl.value;
  const mnoz = parseFloat(mnozEl.value);
  if (!kod)        { alert('Vyberte materiál!'); return; }
  if (!mnoz || mnoz <= 0) { alert('Zadejte kladné množství!'); return; }
  if (_bomEditor.staged.find(s => s.kod === kod)) { alert('Tento materiál je již v seznamu!'); return; }

  const mat = _bomEditor.mats.find(m => m.kod === kod);
  _bomEditor.staged.push({ kod, nazev: mat?.nazev || kod, jednotka: mat?.jednotka || 'ks', mnozstvi: mnoz });

  // Re-render se zachováním filtru
  const typFiltr = document.getElementById('bom-typ-filtr')?.value || '';
  const typy = [...new Set(_bomEditor.mats.map(m => m.typ).filter(Boolean))].sort();
  _bomRender(_bomEditor.typId, typy, new Set(), typFiltr);
}

function _bomStagedRemove(idx) {
  _bomEditor.staged.splice(idx, 1);
  const typFiltr = document.getElementById('bom-typ-filtr')?.value || '';
  const typy = [...new Set(_bomEditor.mats.map(m => m.typ).filter(Boolean))].sort();
  _bomRender(_bomEditor.typId, typy, new Set(), typFiltr);
}

async function _bomSaveAll() {
  const staged = _bomEditor.staged;
  if (!staged.length) return;
  const typId = _bomEditor.typId;

  // Ulož všechny najednou (sekvenčně, API to tak chce)
  let ok = 0;
  for (const s of staged) {
    const r = await api('/api/typy-casu/' + typId + '/bom', 'POST', { material_kod: s.kod, mnozstvi: s.mnozstvi });
    if (!r.error) ok++;
  }
  _bomEditor.staged = [];
  _cache.typy = null;
  bomDetail(typId);
}

function _bomEditorClose() {
  _cache.typy = null;
  if (_bomEditor.typId) {
    bomDetail(_bomEditor.typId);
  } else {
    closeModal();
    typyCasu();
  }
}

async function saveBomItem(typId) {
  const mat = document.getElementById('bom-mat').value;

  if (!mat) return alert('Vyberte materiál!');
  if (!mnoz || mnoz <= 0) return alert('Zadejte množství!');

async function saveTypCasu(existingId) {
  const data = {
    hn_cislo:          document.getElementById('tc-hn').value.trim(),
    nazev:             document.getElementById('tc-nazev').value.trim(),
    typ_korpusu:       document.getElementById('tc-typ').value,
    vnitrni_sirka:     parseInt(document.getElementById('tc-s').value)||0,
    vnitrni_vyska:     parseInt(document.getElementById('tc-v').value)||0,
    vnitrni_hloubka:   parseInt(document.getElementById('tc-h').value)||0,
    poznamka:          document.getElementById('tc-poz').value
  };
  if (!data.hn_cislo || !data.nazev) return alert('Vyplňte HN číslo a název!');
  const r = existingId
    ? await api(`/api/typy-casu/${existingId}`, 'PUT', data)
    : await api('/api/typy-casu', 'POST', data);
  if (r.error) return alert('Chyba: ' + r.error);
  _cache.typy = null;
  if (existingId) {
    // Edit → stačí zavřít a obnovit seznam
    closeModal();
    typyCasu();
  } else {
    // Nový typ → rovnou otevřeme BOM editor
    const newId = r.id;
    addBomItem(newId);
  }
}

function _zakPracovnikBadge(pracovnik) {
  if (!pracovnik) return '<span class="text-gray-300">–</span>';
  const colors = ['bg-blue-100 text-blue-700','bg-green-100 text-green-700','bg-purple-100 text-purple-700',
                  'bg-orange-100 text-orange-700','bg-pink-100 text-pink-700','bg-teal-100 text-teal-700'];
  const idx = pracovnik.charCodeAt(0) % colors.length;
  return `<span class="text-xs px-2 py-0.5 rounded-full font-medium ${colors[idx]}">${pracovnik}</span>`;
}

async function toggleFoceni(zakId, hodnota) {
  await api('/api/zakazky/' + zakId, 'PUT', { foceni: hodnota ? 1 : 0 });
  const cacheKey = currentPage === 'dilna' ? 'dilna' : (currentPage === 'priprava-vyroby' ? 'priprava-vyroby' : 'zakazky');
  const cache = _cache[cacheKey] || [];
  const zak = cache.find(z => z.id === zakId);
  if (zak) {
    zak.foceni = hodnota ? 1 : 0;
    if (currentPage === 'dilna') _dilnaFilter();
    else if (currentPage === 'priprava-vyroby') _pripravaFilter();
    else _zakFilter();
  }
}

async function togglePriorita(zakId, hodnota, btn) {
  await api('/api/zakazky/' + zakId, 'PUT', { prioritni: hodnota });
  const cacheKey = currentPage === 'dilna' ? 'dilna' : (currentPage === 'priprava-vyroby' ? 'priprava-vyroby' : 'zakazky');
  const cache = _cache[cacheKey] || [];
  const zak = cache.find(z => z.id === zakId);
  if (zak) {
    zak.prioritni = hodnota;
    cache.sort((a, b) => (b.prioritni || 0) - (a.prioritni || 0));
    if (currentPage === 'dilna') _dilnaFilter();
    else if (currentPage === 'priprava-vyroby') _pripravaFilter();
    else _zakFilter();
  }
}

function _zakFilter() {
  const s = (document.getElementById('zak-search')||{value:''}).value.toLowerCase();
  const st = document.querySelector('#zak-stavy .tab-btn.active')?.dataset.stav ?? '';
  const data = _cache.zakazky || [];
  const filtered = data.filter(z =>
    (!s || (z.hn_cislo||'').toLowerCase().includes(s) || (z.zakaznik||'').toLowerCase().includes(s) || (z.case_nazev||z.nazev||'').toLowerCase().includes(s)) &&
    (!st || z.stav === st)
  );
  const tbody = document.getElementById('zak-tbody');
  const counter = document.getElementById('zak-count');
  if (tbody) tbody.innerHTML = filtered.map(_zakRow).join('') || '<tr><td colspan="8" class="text-center text-gray-400 py-8">Nic nenalezeno</td></tr>';
  if (counter) counter.textContent = filtered.length;
}

function _zakSetStav(btn, stav) {
  document.querySelectorAll('#zak-stavy .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.dataset.stav = stav;
  _zakFilter();
}

async function saveZakazka(existingId, typId) {
  const selTyp = document.getElementById('zak-typ');
  const finalTypId = selTyp.value ? parseInt(selTyp.value) : (typId || null);
  const data = {
    typ_casu_id: finalTypId,
    hn_cislo: document.getElementById('zak-hn').value.trim(),
    nazev: document.getElementById('zak-nazev').value.trim(),
    stav: document.getElementById('zak-stav').value,
    pocet_ks: 1,
    termin: document.getElementById('zak-termin').value,
    zakaznik: document.getElementById('zak-zak').value.trim(),
    pracovnik: document.getElementById('zak-prac').value.trim(),
    poznamka_dilna: document.getElementById('zak-poz-d').value,
    poznamka_cnc: document.getElementById('zak-poz-c').value,
    sn_cislo: document.getElementById('zak-sn').value
  };
  const r = existingId
    ? await api(`/api/zakazky/${existingId}`, 'PUT', data)
    : await api('/api/zakazky', 'POST', data);
  if (r.error) return alert('Chyba: ' + r.error);
  closeModal();
  if (currentPage === 'dilna') dilna();
  else pripravaVyroby();
}

function adamHallUrl(kod) {
  // Sestaví odkaz pro Adam Hall: https://www.adamhall.com/shop/de/marken/{kod}-{kod}
  const k = (kod || '').trim().replace(/\s+/g, '-');
  return k ? `https://www.adamhall.com/shop/de/marken/${k}-${k}` : null;
}

function vhwUrl(hn) {
  return hn ? `https://www.kytary.cz/${hn}` : null;
}

function rezIcon(zak) {
  // Zobrazí ikonku typu řezu pro profil (| \, / |, | |)
  if (!zak) return '';
  const icons = { '/ |': '⟋|', '| \\': '|⟍', '| |': '||', '\\ |': '⟍|', '/ \\': '⟋⟍' };
  return icons[zak] || zak;
}

async function zakazkaDetail(id) {

    data = await api(`/api/zakazky/${id}/vyrobni-list`);

    alert('Chyba sítě: ' + e.message);
    return;
  }
  if (!data || data.error || !data.zakazka) {
    alert('Chyba při načítání zakázky:\n' + (data?.error || 'Server neodpovídá – restartuj server.'));
    return;
  }
  const z = data.zakazka;
  const bom = data.bom || [];
  const profilyL = data.profily_l || [];
  const profilyH = data.profily_h || [];
  const spojeniky = data.spojeniky || [];
  const links = data.links || [];

  // Normalizace diakritiky pro porovnání typů (PÉNA = PĚNA = PENA atd.)
  function _normTyp(s) {
    return (s||'').toUpperCase()
      .replace(/[ÁÀÂÄ]/g,'A').replace(/[ÉÈÊËĚ]/g,'E').replace(/[ÍÌÎÏ]/g,'I')
      .replace(/[ÓÒÔÖŐ]/g,'O').replace(/[ÚÙÛÜŮ]/g,'U').replace(/[Ý]/g,'Y')
      .replace(/[Č]/g,'C').replace(/[Š]/g,'S').replace(/[Ž]/g,'Z').replace(/[Ř]/g,'R')
      .replace(/[Ď]/g,'D').replace(/[Ť]/g,'T').replace(/[Ň]/g,'N');
  }

  // Rozdělení BOM do sekcí podle normalizovaného typu
  function _sekce(b) {
    const t = _normTyp(b.typ);
    if (t.includes('PROFIL'))                           return 'profil';
    if (t.startsWith('HW') || t === 'PODVOZEK')        return 'hw';
    if (t === 'DESKA' || t.includes('PENA'))            return 'deska';
    return 'ostatni';
  }

  const profily_al = bom.filter(b => _sekce(b) === 'profil');
  const hw         = bom.filter(b => _sekce(b) === 'hw');
  const desky_peny = bom.filter(b => _sekce(b) === 'deska');

    : '–';

  function bomRow(b) {

      : '<td></td>';
    const fav = b.oblibeny == 1;

      <td class="py-1 text-center text-amber-400 text-sm">${fav ? '★' : ''}</td>

      <td class="py-1 text-right font-bold">${b.celkem % 1 === 0 ? b.celkem : fmt(b.celkem,2)}</td>

// Globální funkce pro zarážky (volány z onclick atributů v innerHTML)
async function _vlSaveZarazka(pid, field, val, el) {
  const num = parseFloat(val);
  if (isNaN(num)) return;
  el.style.borderColor = '#93c5fd';
  try {
    const r = await api(`/api/pruvodni-profily/${pid}`, 'PUT', { [field]: num });
    if (r.error) { el.style.borderColor = '#ef4444'; return; }
    el.style.borderColor = '#86efac';
    setTimeout(() => { el.style.borderColor = '#d1d5db'; }, 1200);
  } catch(e) { el.style.borderColor = '#ef4444'; }
}

async function _resetZarazky(zakId) {
  if (!confirm('Přepočítat zarážky děrovačky z rozměrů profilů?\nRuční úpravy budou ztraceny.')) return;
  const r = await api(`/api/zakazky/${zakId}/pruvodni-profily/reset`, 'POST', {});
  if (r.ok) zakazkaDetail(zakId);
}

// Výběr ŘEZ/ZAKONČENÍ – uložen v DOM přes data-active
function _pfsRezBtns(typeKey, idx, current, typeList) {
  return typeList.map(t => {
    const active = current === t.val;
    return `<button
      class="pfs-rez-btn"
      data-type="${typeKey}" data-idx="${idx}" data-val="${t.val.replace(/\\/g,'\\\\')}"
      data-active="${active?'1':''}"
      title="${t.title}"
      onclick="_pfsSetRez('${typeKey}',${idx},'${t.val.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}',this)"
      style="padding:2px 7px;font-size:.78rem;border-radius:4px;border:1px solid #d1d5db;cursor:pointer;font-family:monospace;
        background:${active?'#6b2040':'#f9fafb'};color:${active?'white':'#374151'};margin:1px">
      ${t.lbl}
    </button>`;
  }).join('');
}

function _pfsSetRez(typeKey, idx, val, clickedBtn) {
  // Deaktivuj všechna tlačítka v tomto řádku
  document.querySelectorAll(`.pfs-rez-btn[data-type="${typeKey}"][data-idx="${idx}"]`).forEach(b => {
    b.dataset.active = '';
    b.style.background = '#f9fafb';
    b.style.color = '#374151';
  });
  // Aktivuj kliknuté
  clickedBtn.dataset.active = '1';
  clickedBtn.style.background = '#6b2040';
  clickedBtn.style.color = 'white';
}

function _pfsPasteDistribute(event, typeKey, field, startIdx) {
  event.preventDefault();
  const text = (event.clipboardData || window.clipboardData).getData('text');
  const values = text.trim().split(/[\r\n]+/);
  values.forEach((v, i) => {
    const el = document.getElementById(`pfs-${typeKey}-${field}-${startIdx + i}`);
    if (!el) return;
    el.value = v.trim().replace(',', '.') || '';
  });
}

function _pfsProfilRows(typeKey, existing, slots, rezTypes) {
  let html = '';
  for (let i = 0; i < slots; i++) {
    const ex = existing[i] || {};
    const ks = ex.ks || '';
    const mm = ex.rozmer_mm || '';
    const cur = ex.zakonceni || (typeKey === 'l' ? '| |' : '');
    html += `<tr style="border-bottom:1px solid #f3f4f6">
      <td style="padding:3px 4px;text-align:center;color:#9ca3af;font-size:.7rem;width:24px">${i+1}</td>
      <td style="padding:3px 4px">
        <input id="pfs-${typeKey}-ks-${i}" type="number" min="0" step="1" value="${ks}"
          onpaste="_pfsPasteDistribute(event,'${typeKey}','ks',${i})"
          style="width:52px;text-align:right;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px;font-size:.82rem">
      </td>
      <td style="padding:3px 4px">
        <input id="pfs-${typeKey}-rozmer-${i}" type="number" min="0" step="0.5" value="${mm}"
          onpaste="_pfsPasteDistribute(event,'${typeKey}','rozmer',${i})"
          style="width:72px;text-align:right;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px;font-size:.82rem">
      </td>
      <td style="padding:3px 8px">${_pfsRezBtns(typeKey, i, cur, rezTypes)}</td>
    </tr>`;
  }
  return html;
}

async function _pfsSave(typId) {
  const profily = [];

  // L profily
  for (let i = 0; i < L_SLOTS; i++) {
    const ks = parseInt(document.getElementById(`pfs-l-ks-${i}`)?.value) || 0;
    const rozmer = parseFloat(document.getElementById(`pfs-l-rozmer-${i}`)?.value) || null;
    if (!ks && !rozmer) continue;
    const activeBtn = document.querySelector(`.pfs-rez-btn[data-type="l"][data-idx="${i}"][data-active="1"]`);
    const zakonceni = activeBtn ? activeBtn.dataset.val.replace(/\\\\/g, '\\') : '| |';
    profily.push({ typ_profilu: 'L', poradi: i + 1, ks, rozmer_mm: rozmer, zakonceni });
  }

  // H profily
  for (let i = 0; i < H_SLOTS; i++) {
    const ks = parseInt(document.getElementById(`pfs-h-ks-${i}`)?.value) || 0;
    const rozmer = parseFloat(document.getElementById(`pfs-h-rozmer-${i}`)?.value) || null;
    if (!ks && !rozmer) continue;
    const activeBtn = document.querySelector(`.pfs-rez-btn[data-type="h"][data-idx="${i}"][data-active="1"]`);
    const zakonceni = activeBtn ? activeBtn.dataset.val.replace(/\\\\/g, '\\') : null;
    profily.push({ typ_profilu: 'H', poradi: i + 1, ks, rozmer_mm: rozmer, zakonceni });
  }

  const r = await api(`/api/typy-casu/${typId}/profily-plan`, 'POST', { profily });
  if (r.error) { alert('Chyba: ' + r.error); return; }
  bomDetail(typId);
}

async function _setStav(id, stav) {
  await api(`/api/zakazky/${id}`, 'PUT', { stav });
  closeModal();
  // Aktualizuj v cache a překresli seznam
  const allCaches = [_cache['priprava-vyroby'], _cache.dilna, _cache.zakazky];
  let zak = null;
  for (const c of allCaches) { if (c) { zak = c.find(z => z.id === id); if (zak) break; } }
  if (zak) {
    zak.stav = stav;
    if (stav === 'Hotovo' && !zak.datum_dokonceni) zak.datum_dokonceni = new Date().toISOString().slice(0,10);
    if (currentPage === 'dilna') _dilnaFilter();
    else if (currentPage === 'priprava-vyroby') _pripravaFilter();
    else _zakFilter();
  } else {
    if (currentPage === 'dilna') { _cache.dilna = null; dilna(); }
    else if (currentPage === 'priprava-vyroby') { _cache['priprava-vyroby'] = null; pripravaVyroby(); }
    else { _cache.zakazky = null; zakazky(); }
  }
}

async function _smazatZakazku(id) {
  await api(`/api/zakazky/${id}`, 'DELETE');
  closeModal();
  _cache['priprava-vyroby'] = null;
  _cache.dilna = null;

function _bomStatusBadge(z) {
  if (!z.typ_casu_id) return '<span class="text-xs text-gray-300">—</span>';
  const w = [];
  if (z.bom_spec_ok === 0 || z.bom_spec_ok === null)
    w.push('<span style="background:#fff7ed;color:#c2410c;font-size:.68rem;padding:1px 5px;border-radius:4px;display:block;white-space:nowrap;font-weight:600">⚠ spec casu</span>');
  if (z.bom_mat_ok === 0 || z.bom_mat_ok === null)
    w.push('<span style="background:#fef2f2;color:#dc2626;font-size:.68rem;padding:1px 5px;border-radius:4px;display:block;white-space:nowrap;font-weight:600">⚠ materiál</span>');
  if (!w.length) return '<span style="color:#16a34a;font-weight:700;font-size:1rem">✓</span>';
  return w.join('');
}

function _pripravaRow(z) {
  const dnes = new Date().toISOString().slice(0,10);
  const isPrio = z.prioritni == 1;
  const prioBtn = `<button title="${isPrio ? 'Zrušit prioritu' : 'Označit jako prioritní'}"
    onclick="event.stopPropagation();togglePriorita(${z.id},${isPrio?0:1},this)"
    class="text-lg leading-none transition-colors ${isPrio ? 'text-amber-500' : 'text-gray-200 hover:text-amber-400'}">★</button>`;

  const stavColors = {
    'Čeká':         'background:#dbeafe;color:#1d4ed8',
    'CNC hotovo':   'background:#ede9fe;color:#7c3aed',
    'Výroba':       'background:#fef3c7;color:#92400e',
    'Hotovo':       'background:#dcfce7;color:#15803d',
    'Zkontrolováno':'background:#f0fdf4;color:#166534',
    'Expedováno':   'background:#f1f5f9;color:#475569'
  };
  const stavBadge = `<span style="${stavColors[z.stav]||'background:#f1f5f9;color:#475569'};font-size:.72rem;padding:2px 8px;border-radius:999px;font-weight:600;white-space:nowrap">${z.stav}</span>`;

  const terminCls = z.termin && z.termin < dnes && !['Hotovo','Zkontrolováno','Expedováno'].includes(z.stav)
    ? 'color:#dc2626;font-weight:600' : 'color:#6b7280';
  const odeslano = z.odeslano_do_vyroby == 1;
  const canDelete = z.stav === 'Čeká' && !odeslano;

  const dest = z.destinace || 'Zákazník';
  const destOpts = ['Zákazník','Sklad'].map(d =>
    `<option value="${d}" ${dest===d?'selected':''}>${d}</option>`).join('');

  return `<tr class="tr-hover${isPrio?' prioritni-row':''}">
    <td class="w-8 text-center pr-0">${prioBtn}</td>
    <td>
      <p class="font-mono text-xs text-blue-600 font-semibold">${z.hn_cislo||'–'}</p>
      <p class="text-xs text-gray-400">${z.typ_korpusu||''}</p>
    </td>
    <td class="text-gray-700 text-sm font-medium">${z.case_nazev||z.nazev||'–'}</td>
    <td>
      <select onchange="pripravaSetDestinace(${z.id}, this.value)"
        style="font-size:.75rem;padding:2px 6px;border-radius:6px;border:1.5px solid #e2e8f0;cursor:pointer;background:white">
        ${destOpts}
      </select>
    </td>
    <td class="text-center font-semibold">${z.pocet_ks}</td>
    <td class="text-center">${_bomStatusBadge(z)}</td>
    <td class="text-xs text-gray-400">${(z.datum_zapsani||'').slice(0,10)||'–'}</td>
    <td>
      <input type="date" value="${z.termin||''}"
        onchange="pripravaSetTermin(${z.id}, this.value)"
        style="font-size:.75rem;padding:2px 4px;border-radius:6px;border:1.5px solid #e2e8f0;background:white;${terminCls}">
    </td>
    <td class="text-center">
      <input type="checkbox" title="Focení" ${z.foceni ? 'checked' : ''}
        onchange="toggleFoceni(${z.id}, this.checked)"
        style="width:16px;height:16px;cursor:pointer">
    </td>
    <td>${stavBadge}</td>
    <td>${_zakPracovnikBadge(z.pracovnik)}</td>
    <td class="text-center">
      <input type="checkbox" title="Odeslat do Dílny" ${odeslano ? 'checked' : ''}
        onchange="toggleOdeslatDoVyroby(${z.id}, this.checked)"
        style="width:16px;height:16px;cursor:pointer;accent-color:#16a34a">
    </td>
    <td>
      <div class="flex gap-1">
        <button class="btn btn-primary py-1 px-2 text-xs" onclick="zakazkaDetail(${z.id})">Detail</button>
        ${canDelete ? `<button class="btn btn-secondary py-1 px-2 text-xs" style="color:#ef4444" onclick="zrusitZakazku(${z.id})" title="Smazat">✕</button>` : ''}
      </div>
    </td>
  </tr>`;
}

function _pripravaFilter() {
  const s  = (document.getElementById('prep-search')||{value:''}).value.toLowerCase();
  const st = document.querySelector('#prep-stavy .tab-btn.active')?.dataset.stav ?? '';
  const data = _cache['priprava-vyroby'] || [];
  const filtered = data.filter(z =>
    (!s  || (z.hn_cislo||'').toLowerCase().includes(s) || (z.zakaznik||'').toLowerCase().includes(s) || (z.case_nazev||z.nazev||'').toLowerCase().includes(s)) &&
    (!st || z.stav === st)
  );
  const tbody   = document.getElementById('prep-tbody');
  const counter = document.getElementById('prep-count');
  if (tbody)   tbody.innerHTML   = filtered.map(_pripravaRow).join('') || '<tr><td colspan="13" class="text-center text-gray-400 py-8">Nic nenalezeno</td></tr>';
  if (counter) counter.textContent = filtered.length;
}

function _pripravaSetStav(btn, stav) {
  document.querySelectorAll('#prep-stavy .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.dataset.stav = stav;
  _pripravaFilter();
}

async function toggleOdeslatDoVyroby(zakId, hodnota) {
  await api('/api/zakazky/' + zakId, 'PUT', { odeslano_do_vyroby: hodnota ? 1 : 0 });
  const zak = (_cache['priprava-vyroby'] || []).find(z => z.id === zakId);
  if (zak) { zak.odeslano_do_vyroby = hodnota ? 1 : 0; _pripravaFilter(); }
  _cache.dilna = null;
}

async function pripravaSetDestinace(zakId, hodnota) {
  await api('/api/zakazky/' + zakId, 'PUT', { destinace: hodnota });
  const zak = (_cache['priprava-vyroby'] || []).find(z => z.id === zakId);
  if (zak) zak.destinace = hodnota;
}

async function pripravaSetTermin(zakId, hodnota) {
  await api('/api/zakazky/' + zakId, 'PUT', { termin: hodnota });
  const zak = (_cache['priprava-vyroby'] || []).find(z => z.id === zakId);
  if (zak) { zak.termin = hodnota; _pripravaFilter(); } // re-render kvůli barvě termínu
}

      <tbody id="prep-tbody">${_cache['priprava-vyroby'].map(_pripravaRow).join('')}</tbody>

    </div>`);
}

function _dilnaRow(z) {
  const dnes = new Date().toISOString().slice(0,10);
  const isPrio = z.prioritni == 1;
  const prioBtn = `<button title="${isPrio ? 'Zrušit prioritu' : 'Označit jako prioritní'}"
    onclick="event.stopPropagation();togglePriorita(${z.id},${isPrio?0:1},this)"
    class="text-lg leading-none transition-colors ${isPrio ? 'text-amber-500' : 'text-gray-200 hover:text-amber-400'}">★</button>`;

  // CNC chipy — skutečný stav řezání z cnc_rezani (nezávislé na stavu zakázky)
  function _cncChip(label, ok) {
    return ok
      ? `<span style="background:#dcfce7;color:#15803d;font-size:.68rem;padding:1px 6px;border-radius:4px;font-weight:700;white-space:nowrap;display:block">✓ ${label}</span>`
      : `<span style="background:#f1f5f9;color:#94a3b8;font-size:.68rem;padding:1px 6px;border-radius:4px;white-space:nowrap;display:block">${label}</span>`;
  }
  const cncItems = [];
  if (z.cnc_has_desky)    cncItems.push(_cncChip('Desky',    z.cnc_desky_ok));
  if (z.cnc_has_podvozky) cncItems.push(_cncChip('Podvozky', z.cnc_podvozky_ok));
  if (z.cnc_has_peny)     cncItems.push(_cncChip('Pěny',     z.cnc_peny_ok));
  const cncBadge = cncItems.length
    ? `<div class="flex flex-col gap-0.5">${cncItems.join('')}</div>`
    : '<span style="color:#94a3b8;font-size:.7rem">–</span>';

  // Pracovník dropdown
  const users = _cache.dilnaUsers || [];
  const pracovnikOpts = `<option value="">– Nikdo –</option>` +
    users.map(u => `<option value="${u.jmeno}" ${z.pracovnik===u.jmeno?'selected':''}>${u.jmeno.split(' ')[0]}</option>`).join('');

  // Stav dropdown — bez CNC hotovo; zakázka v CNC hotovo se zobrazí jako Výroba (připraveno k sestavení)
  const stavProDropdown = (z.stav === 'CNC hotovo') ? 'Výroba' : z.stav;
  const stavOpts = ['Čeká','Výroba','Hotovo','Zkontrolováno','Expedováno'].map(s =>
    `<option value="${s}" ${stavProDropdown===s?'selected':''}>${s}</option>`
  ).join('');

  // Banner pro stav Hotovo
  const bannerRow = z.stav === 'Hotovo' ? `<tr><td colspan="8" style="padding:0">
    <div style="background:#fef3c7;color:#92400e;text-align:center;font-weight:800;font-size:.82rem;padding:5px 8px;letter-spacing:.08em;border-bottom:2px solid #fde68a">
      ⏳ VYČKEJTE NA KONTROLU CASE
    </div></td></tr>` : '';

  const terminCls = z.termin && z.termin < dnes && !['Hotovo','Zkontrolováno','Expedováno'].includes(z.stav)
    ? 'color:#dc2626;font-weight:600' : 'color:#6b7280';

  const mainRow = `<tr class="tr-hover cursor-pointer${isPrio?' prioritni-row':''}" onclick="zakazkaDetail(${z.id})">
    <td class="w-8 text-center pr-0" onclick="event.stopPropagation()">${prioBtn}</td>
    <td>
      <p class="font-mono text-xs text-blue-600 font-semibold">${z.hn_cislo||'–'}</p>
      <p class="text-xs text-gray-400">${z.typ_korpusu||''}</p>
    </td>
    <td>
      ${(() => { const d = z.destinace||'Zákazník'; return `<span style="font-size:.7rem;padding:1px 7px;border-radius:999px;font-weight:600;${d==='Sklad'?'background:#dbeafe;color:#1d4ed8':'background:#dcfce7;color:#15803d'}">${d}</span>`; })()}
      ${z.zakaznik ? `<p class="text-xs text-gray-400 mt-0.5">${z.zakaznik}</p>` : ''}
    </td>
    <td class="text-center font-semibold">${z.pocet_ks}</td>
    <td class="text-center">${cncBadge}</td>
    <td class="text-xs" style="${terminCls}">${z.termin||'–'}</td>
    <td onclick="event.stopPropagation()">
      <select onchange="_dilnaSetStav(${z.id}, this.value)"
        style="font-size:.75rem;padding:2px 4px;border-radius:6px;border:1.5px solid #e2e8f0;cursor:pointer;background:white;max-width:120px">
        ${stavOpts}
      </select>
    </td>
    <td onclick="event.stopPropagation()">
      <select onchange="_dilnaPracovnikChange(${z.id}, this.value)"
        style="font-size:.75rem;padding:2px 4px;border-radius:6px;border:1.5px solid #e2e8f0;cursor:pointer;background:white;max-width:110px">
        ${pracovnikOpts}
      </select>
    </td>
    <td onclick="event.stopPropagation()">
      <div class="flex gap-1">
        <button class="btn btn-primary py-1 px-2 text-xs" onclick="zakazkaDetail(${z.id})">Detail</button>
        <button class="btn btn-secondary py-1 px-2 text-xs" onclick="tiskVyrobniListZakazka(${z.id})">🖨</button>
      </div>
    </td>
  </tr>`;
  return mainRow + bannerRow;
}

function _dilnaFilter() {
  const s  = (document.getElementById('dilna-search')||{value:''}).value.toLowerCase();
  const st = document.querySelector('#dilna-stavy .tab-btn.active')?.dataset.stav ?? '';
  const data = _cache.dilna || [];
  const filtered = data.filter(z =>
    (!s  || (z.hn_cislo||'').toLowerCase().includes(s) || (z.zakaznik||'').toLowerCase().includes(s) || (z.case_nazev||z.nazev||'').toLowerCase().includes(s)) &&
    // Tab "Čeká" zobrazí i CNC hotovo (montér ještě nezačal)
    (!st || z.stav === st || (st === 'Čeká' && z.stav === 'CNC hotovo'))
  );
  const tbody   = document.getElementById('dilna-tbody');
  const counter = document.getElementById('dilna-count');
  if (tbody)   tbody.innerHTML   = filtered.map(_dilnaRow).join('') || '<tr><td colspan="9" class="text-center text-gray-400 py-8">Nic nenalezeno</td></tr>';
  if (counter) counter.textContent = filtered.length;
}

function _dilnaSetStavTab(btn, stav) {
  document.querySelectorAll('#dilna-stavy .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.dataset.stav = stav;
  _dilnaFilter();
}

async function _dilnaSetStav(id, stav) {
  await api(`/api/zakazky/${id}`, 'PUT', { stav });
  const zak = (_cache.dilna || []).find(z => z.id === id);
  if (zak) {
    zak.stav = stav;
    if (stav === 'Hotovo' && !zak.datum_dokonceni) zak.datum_dokonceni = new Date().toISOString().slice(0,10);
    _dilnaFilter();
    if (stav === 'Hotovo') _dilnaHotovoBanner(zak);
  } else {
    _cache.dilna = null;
    dilna();
  }
}

async function _dilnaPracovnikChange(id, pracovnik) {
  await api(`/api/zakazky/${id}`, 'PUT', { pracovnik });
  const zak = (_cache.dilna || []).find(z => z.id === id);
  if (zak) { zak.pracovnik = pracovnik; }
}

async function hlasitOdchylku(zakId, typId, hnCislo) {

// Piktogramy typů řezu L profilu
const REZ_TYPES = [
  { val: '| |', lbl: '| |',  title: 'Rovné oba konce' },
  { val: '/ |', lbl: '⟋ |', title: 'Levý šikmý, pravý rovný' },
  { val: '| \\', lbl: '| ⟍', title: 'Levý rovný, pravý šikmý' },
  { val: '/ \\', lbl: '⟋ ⟍', title: 'Oba šikmé (klín)' },
];

// Piktogramy zakončení H profilu
const ZAKONCENI_TYPES = [
  { val: '/ |', lbl: '⟋ |', title: '/ |' },
  { val: '| \\', lbl: '| ⟍', title: '| \\' },
  { val: '| |', lbl: '| |', title: '| |' },
  { val: '\\ |', lbl: '⟍ |', title: '\\ |' },
  { val: '/ \\', lbl: '⟋ ⟍', title: '/ \\' },
  { val: '\\ /', lbl: '⟍ ⟋', title: '\\ /' },
];

function _rezBtn(rowId, current, typeList, field) {
  return typeList.map(t => `
    <button title="${t.title}"
      style="padding:2px 6px;font-size:.75rem;border-radius:4px;border:1px solid #d1d5db;cursor:pointer;font-family:monospace;
        background:${current===t.val?'#6b2040':'#f9fafb'};color:${current===t.val?'white':'#374151'}"
      onclick="_pruvodkaSetField(${rowId},'${field}','${t.val.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      ${t.lbl}
    </button>`).join('');
}

function _drillPassesHtml(passes) {
  if (!passes || passes.length === 0) return '<span class="text-gray-300 text-xs">—</span>';
  return passes.map((p,i) => `
    <span class="inline-block bg-gray-100 rounded px-1.5 py-0.5 text-xs font-mono mr-1 mb-0.5"
          title="${p.count} díra(y): ${p.holes.join(', ')} mm">
      P${i+1}: ${p.zarazka} mm
    </span>`).join('');
}

let _pruvodkaZakId  = null;
let _pruvodkaNazev  = '';
let _pruvodkaHn     = '';
let _pruvodkaData   = { profily_l: [], profily_h: [] };

async function pruvodkaEdit(zakId) {
  _pruvodkaZakId = zakId;

function _renderPruvodka(zakId, nazev, hn) {
  const pl = _pruvodkaData.profily_l || [];
  const ph = _pruvodkaData.profily_h || [];

  function lRow(p) {

    return `<tr id="prow-${p.id}" class="border-b border-gray-100 align-top">
      <td class="py-2 pr-2 text-right font-bold text-sm">${p.ks}×</td>

          onchange="_pruvodkaSetField(${p.id},'zarazka',parseFloat(this.value))">
        <span class="text-xs text-gray-400 ml-1">mm</span>

    const drillHtml = _drillPassesHtml(p.drill_passes);
    return `<tr id="prow-${p.id}" class="border-b border-gray-100 align-top">
      <td class="py-2 pr-2 text-right font-bold text-sm">${p.ks}×</td>
      <td class="py-2 pr-3 text-right font-bold text-sm">${p.rozmer_mm ? fmt(p.rozmer_mm,0) : '–'}</td>
      <td class="py-2">
        <div class="flex gap-1 flex-wrap">${zakBtns}</div>
      </td>
      <td class="py-2 pl-2">
        <input type="number" step="0.5"
          value="${p.zarazka != null ? p.zarazka : (p.rozmer_mm||'')}"
          style="width:70px;text-align:right;padding:2px 4px;border:1px solid #d1d5db;border-radius:4px;font-size:.8rem"
          onchange="_pruvodkaSetField(${p.id},'zarazka',parseFloat(this.value))">
        <span class="text-xs text-gray-400 ml-1">mm</span>
      </td>

    @media print {

      .pruv-title { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      input[type=number] { border:none!important; background:transparent!important; font-size:.82rem; }
    }
  </style>

  <div class="pruv-header no-print">
    <div class="flex items-start justify-between">
      <div>
        <p class="text-xs opacity-60 font-mono">${hn} · Zakázka #${zakId}</p>
        <h2 class="text-lg font-bold mt-0.5">${nazev}</h2>
        <p class="text-xs opacity-60 mt-0.5">Průvodka montáže — formátování profilů</p>
      </div>
      <div class="text-right">
        <button onclick="zakazkaDetail(${zakId})" class="text-xs opacity-60 hover:opacity-100">← Zpět</button><br>
        <button onclick="window.print()" class="mt-2 text-xs bg-white text-gray-800 rounded px-2 py-1">🖨 Tisk</button>
        <button onclick="_pruvodkaReset(${zakId})"
          class="mt-2 ml-1 text-xs opacity-50 hover:opacity-100">↺ Reset</button>
      </div>
    </div>

  <!-- Print header (skrytý mimo tisk) -->
  <div class="print-only" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <p style="font-size:1.1rem;font-weight:700;margin:0">${nazev}</p>
        <p style="font-size:.75rem;color:#6b7280;margin:0">${hn} · Zakázka #${zakId}</p>
      </div>
      <p style="font-size:.75rem;color:#9ca3af;margin:0">Průvodka montáže</p>
    </div>
    <hr style="margin-top:8px;border-color:#e5e7eb">
  </div>

  ${pl.length ? `
  <div class="pruv-section">
    <div class="pruv-title">Hliníkový 'L' profil</div>
    <table class="pruv-table">
      <thead><tr>
        <th class="r" style="width:36px">Ks</th>
        <th class="r" style="width:70px">Délka (mm)</th>
        <th style="width:180px">Typ řezu</th>
        <th style="width:90px">Zarážka</th>
        <th>Vrtání – průchody</th>
      </tr></thead>
      <tbody>${pl.map(lRow).join('')}</tbody>
    </table>
  </div>` : ''}

  ${ph.length ? `
  <div class="pruv-section">
    <div class="pruv-title">Hybrid / H profil</div>
    <table class="pruv-table">
      <thead><tr>
        <th class="r" style="width:36px">Ks</th>
        <th class="r" style="width:70px">Délka (mm)</th>
        <th style="width:180px">Zakončení</th>
        <th style="width:90px">Zarážka</th>
        <th>Vrtání – průchody</th>
      </tr></thead>
      <tbody>${ph.map(hRow).join('')}</tbody>
    </table>
  </div>` : ''}

  ${!pl.length && !ph.length ? `
  <div class="text-center py-8 text-gray-400">
    <p class="text-3xl mb-2">📋</p>
    <p class="text-sm">Žádná data profilů pro tuto zakázku.</p>
    <p class="text-xs mt-1 text-gray-300">Profily se importují z VHW.</p>
  </div>` : ''}

  `, true);
}

async function _pruvodkaSetField(rowId, field, value) {
  const body = {};
  body[field] = value;
  const row = await api(`/api/pruvodni-profily/${rowId}`, 'PUT', body);
  if (row.error) { alert('Chyba: ' + row.error); return; }
  // Aktualizuj lokální data v obou polích
  for (const arr of [_pruvodkaData.profily_l, _pruvodkaData.profily_h]) {
    const found = (arr || []).find(r => r.id === rowId);
    if (found) { Object.assign(found, row); break; }
  }
  // Při změně rez/zakonceni: přerender celého modalu pro update tlačítek
  if (field === 'rez' || field === 'zakonceni') {
    _renderPruvodka(_pruvodkaZakId, _pruvodkaNazev, _pruvodkaHn);
    return;
  }

function updateInvRow(input, idx) {
  const fyzicky = parseFloat(input.value);
  const vypocteny = parseFloat(input.dataset.vypocteny) || 0;
  const diffEl = document.getElementById('inv-diff-' + idx);
  if (!isNaN(fyzicky)) {
    const diff = fyzicky - vypocteny;
    diffEl.textContent = (diff >= 0 ? '+' : '') + fmt(diff, 3);
    diffEl.className = 'text-right text-xs no-print ' + (diff < 0 ? 'text-red-500 font-semibold' : diff > 0 ? 'text-green-600' : 'text-gray-400');
  } else {
    diffEl.textContent = '–';
    diffEl.className = 'text-right text-xs no-print';
  }
}

async function ulozInventuru() {
  const inputs = document.querySelectorAll('.inv-fyzicky');
  const polozky = [];
  inputs.forEach(inp => {
    if (inp.value !== '') {
      polozky.push({ material_kod: inp.dataset.kod, stav_fyzicky: parseFloat(inp.value) });
    }
  });
  if (polozky.length === 0) return alert('Zadejte alespoň jednu hodnotu!');
  const nazev = prompt('Název inventury:', `Inventura ${new Date().toLocaleDateString('cs-CZ')}`);
  if (nazev === null) return;
  const uzivatel = document.getElementById('inv-uziv')?.value || '';
  const r = await api('/api/sklad/inventura', 'POST', { polozky, nazev, uzivatel });
  if (r.error) return alert('Chyba: ' + r.error);
  alert(`Inventura uložena! Aktualizováno ${polozky.length} položek.`);
  _cache.sklad = null;
  sklad();
}

let _prekladacTmpId = 0;
const _prekladacSaving = new Set();

function _prekladacAddRow() {
  const tbody = document.getElementById('prekladac-tbody');
  if (!tbody) return;
  // Odstraň placeholder "žádné záznamy"
  if (tbody.querySelector('td[colspan]')) tbody.innerHTML = '';
  const tid = 'new_' + (++_prekladacTmpId);
  const tmp = document.createElement('tbody');
  tmp.innerHTML = `<tr id="prekladac-row-${tid}" class="border-b border-gray-50 tr-hover">
    <td class="py-1.5 px-2"><input class="input input-sm font-mono" id="pk-ext-${tid}" placeholder="např. 0677"></td>
    <td class="py-1.5 px-2"><input class="input input-sm font-mono" id="pk-int-${tid}" placeholder="např. PW677"></td>
    <td class="py-1.5 px-2"><input class="input input-sm" id="pk-poz-${tid}" placeholder="(nepovinná poznámka)"></td>
    <td class="py-1.5 px-2 text-right flex items-center gap-1 justify-end">
      <button class="btn btn-primary btn-xs" onclick="_prekladacNewSave('${tid}')">✓ Uložit</button>
      <button class="btn btn-danger btn-xs" onclick="document.getElementById('prekladac-row-${tid}').remove()">🗑</button>
    </td>
  </tr>`;
  tbody.appendChild(tmp.firstChild);
  document.getElementById('pk-ext-' + tid)?.focus();
}

async function _prekladacNewSave(tid) {
  const row = document.getElementById('prekladac-row-' + tid);
  if (!row || row.dataset.saving) return;   // už se ukládá nebo neexistuje
  const ext  = (document.getElementById('pk-ext-' + tid)?.value || '').trim();
  const int_ = (document.getElementById('pk-int-' + tid)?.value || '').trim();
  const poz  = (document.getElementById('pk-poz-' + tid)?.value || '').trim();
  if (!ext || !int_) { alert('Vyplňte prosím oba kódy (externí i interní).'); return; }
  row.dataset.saving = '1';   // zablokuj další pokusy ihned
  const btn = row.querySelector('button');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  const r = await api('/api/nabidky/prekladac', 'POST', { externi_kod: ext, interni_kod: int_, poznamka: poz });
  if (r.error) {
    delete row.dataset.saving;
    if (btn) { btn.disabled = false; btn.textContent = '✓ Uložit'; }
    alert('Chyba: ' + r.error);
    return;
  }
  // Nahraď dočasný řádek trvalým (s id)
  const tmp = document.createElement('tbody');
  tmp.innerHTML = _prekladacRow({ id: r.id, externi_kod: ext, interni_kod: int_, poznamka: poz });
  row.replaceWith(tmp.firstChild);
}

  await api('/api/nabidky/prekladac/' + pid, 'DELETE');

async function _hromadneNyty() {
  const kod = (document.getElementById('nyty-kod')?.value || '').trim();
  if (!kod) return alert('Zadejte kód materiálu NYTY');
  const prepsat = document.getElementById('nyty-prepsat')?.checked || false;
  const el = document.getElementById('nyty-result');
  el.innerHTML = '<span class="text-gray-400">Zpracovávám…</span>';
  const r = await api('/api/materialy/spojeniky/hromadne', 'POST', { nyty_kod: kod, prepsat });
  if (r.error) {
    el.innerHTML = `<span class="text-red-500">Chyba: ${r.error}</span>`;
  } else {
    el.innerHTML = `<span class="text-green-600 font-semibold">✓ Hotovo – zpracováno ${r.pocet} materiálů</span>`;
  }
}

// ── STATISTIKY ────────────────────────────────────────────────────────────
async function statistiky() {
  setContent('<div class="text-center py-16 text-gray-400">Načítám statistiky…</div>');
  const dnes = new Date();
  const rokA = dnes.getFullYear(), mesicA = dnes.getMonth()+1;
  const prevDate = new Date(dnes.getFullYear(), dnes.getMonth()-1, 1);
  const rokB = prevDate.getFullYear(), mesicB = prevDate.getMonth()+1;

  const [d, dochA, dochB] = await Promise.all([
    api('/api/statistiky/sklad'),
    api(`/api/dochazka-live/mesic?rok=${rokA}&mesic=${mesicA}`),
    api(`/api/dochazka-live/mesic?rok=${rokB}&mesic=${mesicB}`),
  ]);
  const s = d.souhrn || {};
  const typy = d.typy || [];
  const top10 = d.top10 || [];
  const p30 = d.pohyby30 || {};
  const mrtvy = d.mrtvy_sklad || {};

  const hodnotaCelkem = s.hodnota_celkem || 0;
  const prijem30 = p30.prijem?.hodnota || 0;
  const vydej30  = p30.vydej?.hodnota  || 0;

  // ── Docházka – výpočet per pracovník ─────────────────────────────────
  const mesNazvy = ['','Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
  function _dochSumPerUser(mesicData) {
    const uMap = {}, sekMap = {};
    (mesicData.zaznamy||[]).forEach(z => {
      if (!uMap[z.uzivatel_id]) uMap[z.uzivatel_id] = {id:z.uzivatel_id, jmeno:z.jmeno, barva:z.barva};
      sekMap[z.uzivatel_id] = (sekMap[z.uzivatel_id]||0) + (z.sekund||0);
    });
    return Object.values(uMap).sort((a,b)=>a.jmeno.localeCompare(b.jmeno,'cs'))
      .map(u => ({...u, sek: sekMap[u.id]||0}));
  }
  const dochUsersA = _dochSumPerUser(dochA);
  const dochUsersB = _dochSumPerUser(dochB);

  function _dochMesicKarty(users, rok, mesic) {
    if (!users.length) return '<p style="color:#9ca3af;font-size:.8rem">Žádné záznamy</p>';
    return users.map(u => {
      const h = Math.floor(u.sek/3600), m = Math.floor((u.sek%3600)/60);
      const init = u.jmeno.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
        <div style="width:32px;height:32px;border-radius:50%;background:${u.barva};display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7rem;font-weight:700;flex-shrink:0">${init}</div>
        <div style="flex:1">
          <div style="font-size:.85rem;font-weight:600">${u.jmeno}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:1rem;font-weight:800;color:${u.barva}">${h} h ${m} min</div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Barevná paleta pro typy ───────────────────────────────────────────
  const COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16','#ec4899','#6366f1','#14b8a6','#a78bfa'];
  const maxHodnota = typy[0]?.hodnota || 1;

  // ── Řádky tabulky typů ────────────────────────────────────────────────
  const typyRows = typy.map((t, idx) => {
    const pct = hodnotaCelkem > 0 ? (t.hodnota / hodnotaCelkem * 100) : 0;
    const barPct = maxHodnota > 0 ? (t.hodnota / maxHodnota * 100) : 0;
    const color = COLORS[idx % COLORS.length];
    return `<tr class="tr-hover">
      <td class="flex items-center gap-2">
        <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${color};flex-shrink:0"></span>
        ${t.typ}
      </td>
      <td class="text-right text-gray-600">${t.pocet}</td>
      <td class="text-right font-semibold">${fmtKc(t.hodnota)}</td>
      <td class="text-right text-gray-500">${fmt(pct,1)} %</td>
      <td style="width:160px">
        <div style="background:#f1f5f9;border-radius:4px;height:8px;overflow:hidden">
          <div style="background:${color};width:${barPct.toFixed(1)}%;height:100%;border-radius:4px;transition:width .4s"></div>
        </div>
      </td>
    </tr>`;
  }).join('');

  // ── Top 10 řádky ─────────────────────────────────────────────────────
  const top10Rows = top10.map((i, idx) => `<tr class="tr-hover">
    <td class="text-gray-400 text-xs w-6">${idx+1}.</td>
    <td class="font-mono text-xs text-blue-600">${i.kod}</td>
    <td class="font-medium">${i.nazev}</td>
    <td class="text-xs text-gray-500">${i.typ||'–'}</td>
    <td class="text-right text-gray-500">${fmt(i.stav,2)}</td>
    <td class="text-right text-gray-400">${fmtKc(i.nc_bez_dph)}</td>
    <td class="text-right font-semibold text-blue-700">${fmtKc(i.hodnota)}</td>
  </tr>`).join('');

  setContent(`
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Statistiky</h2>

  <!-- DOCHÁZKA – měsíční přehled -->
  <h3 class="text-lg font-semibold text-gray-700 mb-3">👷 Docházka</h3>
  <div class="grid gap-4 mb-8" style="grid-template-columns:1fr 1fr">
    <div class="card p-5">
      <div class="text-xs text-gray-400 uppercase tracking-wide mb-3">${mesNazvy[mesicA]} ${rokA} <span style="font-size:.65rem;background:#eff6ff;color:#3b82f6;border-radius:4px;padding:1px 6px">aktuální</span></div>
      ${_dochMesicKarty(dochUsersA, rokA, mesicA)}
      ${!dochUsersA.length?'':'<div style="text-align:right;margin-top:6px"><button style="font-size:.72rem;color:#6366f1;background:none;border:none;cursor:pointer;text-decoration:underline" onclick="navigate(\'dochazka\');setTimeout(()=>{_dochTab=\'mesic\';_dochMesicLoad()},200)">Zobrazit detail →</button></div>'}
    </div>
    <div class="card p-5">
      <div class="text-xs text-gray-400 uppercase tracking-wide mb-3">${mesNazvy[mesicB]} ${rokB} <span style="font-size:.65rem;background:#f8fafc;color:#94a3b8;border-radius:4px;padding:1px 6px">minulý</span></div>
      ${_dochMesicKarty(dochUsersB, rokB, mesicB)}
    </div>
  </div>

  <h3 class="text-lg font-semibold text-gray-700 mb-3">📦 Sklad</h3>

  <!-- KPI karty -->
  <div class="grid grid-cols-2 gap-4 mb-6" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">
    <div class="card p-5">
      <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Celková hodnota skladu</div>
      <div class="text-2xl font-bold text-blue-700">${fmtKc(hodnotaCelkem)}</div>
      <div class="text-xs text-gray-400 mt-1">${s.polozek_na_sklade||0} položek s kladným stavem</div>
    </div>
    <div class="card p-5">
      <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Položky celkem</div>
      <div class="text-2xl font-bold text-gray-800">${s.pocet_polozek||0}</div>
      <div class="text-xs text-gray-400 mt-1">evidovaných materiálů</div>
    </div>
    <div class="card p-5 ${s.pod_minimem > 0 ? 'border-l-4 border-red-400' : ''}">
      <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Pod minimem</div>
      <div class="text-2xl font-bold ${s.pod_minimem > 0 ? 'text-red-600' : 'text-green-600'}">${s.pod_minimem||0}</div>
      <div class="text-xs text-gray-400 mt-1">položek vyžaduje doplnění</div>
    </div>
    <div class="card p-5 ${mrtvy.pocet > 0 ? 'border-l-4 border-amber-400' : ''}">
      <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Mrtvý sklad (90+ dní)</div>
      <div class="text-2xl font-bold ${mrtvy.pocet > 0 ? 'text-amber-600' : 'text-gray-400'}">${mrtvy.pocet||0}</div>
      <div class="text-xs text-gray-400 mt-1">${fmtKc(mrtvy.hodnota||0)} vázáno bez pohybu</div>
    </div>
  </div>

  <!-- Pohyby 30 dní -->
  <div class="grid gap-4 mb-6" style="grid-template-columns:1fr 1fr">
    <div class="card p-5">
      <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Příjmy za posledních 30 dní</div>
      <div class="text-xl font-bold text-green-600">${fmtKc(prijem30)}</div>
      <div class="text-xs text-gray-400 mt-1">${p30.prijem?.pocet_pohybu||0} pohybů</div>
    </div>
    <div class="card p-5">
      <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Výdeje za posledních 30 dní</div>
      <div class="text-xl font-bold text-orange-500">${fmtKc(vydej30)}</div>
      <div class="text-xs text-gray-400 mt-1">${p30.vydej?.pocet_pohybu||0} pohybů</div>
    </div>
  </div>

  <!-- Rozdělení dle typů -->
  <div class="card mb-6">
    <div class="px-5 py-4 border-b border-gray-100">
      <h3 class="font-semibold text-gray-800">Hodnota skladu dle typu materiálu</h3>
    </div>
    <table class="w-full tbl-sort">
      <thead><tr>
        <th>Typ</th>
        <th class="text-right">Položek</th>
        <th class="text-right">Hodnota</th>
        <th class="text-right">Podíl</th>
        <th style="width:160px"></th>
      </tr></thead>
      <tbody>${typyRows || '<tr><td colspan="5" class="text-center text-gray-400 py-6">Žádná data</td></tr>'}</tbody>
    </table>
  </div>

  <!-- Top 10 -->
  <div class="card">
    <div class="px-5 py-4 border-b border-gray-100">
      <h3 class="font-semibold text-gray-800">Top 10 nejhodnotnějších položek</h3>
    </div>
    <table class="w-full tbl-sort">
      <thead><tr>
        <th class="no-sort w-6">#</th>
        <th>Kód</th><th>Název</th><th>Typ</th>
        <th class="text-right">Stav</th>
        <th class="text-right">NC/j.</th>
        <th class="text-right">Hodnota</th>
      </tr></thead>
      <tbody>${top10Rows || '<tr><td colspan="7" class="text-center text-gray-400 py-6">Žádná data</td></tr>'}</tbody>
    </table>
  </div>
  `);
  _initSortable();
}

function chybyVBom() {

        <h2 class="text-2xl font-bold text-gray-800">⚠ Chyby v BOM</h2>
        <p class="text-sm text-gray-500 mt-0.5">Hlášení odchylek z dílny – nesoulad výrobní karty se skutečností</p>

      <div id="odchylky-panel"><p class="text-gray-400 text-sm">Načítám…</p></div>
