async function _renderOdchylky() {
  const el = document.getElementById('odchylky-panel');
  if (!el) return;
  el.innerHTML = '<p class="text-gray-400 text-sm">Načítám…</p>';
  const data = await api('/api/odchylky');
  const items = data.items || [];
  const nove   = items.filter(o => o.stav !== 'Vyřešeno');
  const vyres  = items.filter(o => o.stav === 'Vyřešeno');

  const row = o => `<div class="rounded-lg border p-3 mb-2 ${o.stav === 'Vyřešeno' ? 'border-gray-100 bg-gray-50 opacity-60' : 'border-orange-200 bg-orange-50'}">
    <div class="flex items-start justify-between gap-2">
      <div class="flex-1">
        <p class="text-xs font-mono text-gray-400 mb-0.5">${o.hn_cislo||'–'} · ${(o.created_at||'').slice(0,16).replace('T',' ')}</p>
        <p class="text-sm text-gray-800 whitespace-pre-wrap">${o.text}</p>
      </div>
      ${o.stav !== 'Vyřešeno' ? `
        <button class="btn btn-success text-xs whitespace-nowrap" onclick="_odchylkaVyresit(${o.id})">✓ Vyřešeno</button>
      ` : '<span class="text-xs text-green-600 whitespace-nowrap">✓ Vyřešeno</span>'}
    </div>
  </div>`;

  el.innerHTML = `
    <div>
      <h3 class="font-semibold text-gray-700 mb-3">Nové
        ${nove.length ? `<span class="ml-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">${nove.length}</span>` : '<span class="ml-2 text-gray-400 text-xs">vše vyřešeno</span>'}
      </h3>
      ${nove.length ? nove.map(row).join('') : '<p class="text-gray-400 text-sm mb-4">Žádné nové hlášení.</p>'}
      ${vyres.length ? `
        <details class="mt-4">
          <summary class="text-xs text-gray-400 cursor-pointer">Zobrazit vyřešené (${vyres.length})</summary>
          <div class="mt-2">${vyres.map(row).join('')}</div>
        </details>` : ''}
    </div>`;
}

async function _odchylkaVyresit(id) {
  await api(`/api/odchylky/${id}`, 'PUT', { stav: 'Vyřešeno' });
  _renderOdchylky();
  _refreshOdchylkyBadge();
}

// ── PARAMETRY VÝPOČTU ČASŮ ────────────────────────────────────────────────
async function _renderCasParametry() {
  const [parData, typyData] = await Promise.all([
    api('/api/cas-parametry'),
    api('/api/typy-casu?limit=200'),
  ]);
  const pars = parData.parametry || [];
  const typy = typyData.items || [];

  // Krátké jednořádkové popisky (náhrada za dlouhý popis z DB)
  const LABELS = {
    'CNC.setup':           ['Příprava prostoru',    's', false],
    'CNC.data_prep':       ['Příprava dat / prog.',  's', false],
    'CNC.fix_per_mat':     ['Overhead / deska',      's', false],
    'CNC.ref_sirka':       ['Ref. šířka case',      'mm', false],
    'CNC.ref_hloubka':     ['Ref. hloubka case',    'mm', false],
    'CNC.deska_default_s': ['↩ Záložní / deska',     's', true ],
    'Montaz.setup':        ['Příprava / sbírání',    's', false],
    'Montaz.cleanup':      ['Úklid pracoviště',      's', false],
    'Montaz.kontrola':     ['Závěrečná kontrola',    's', false],
    'Montaz.cas_na_nyt':   ['Čas / 1 nýt',           's', false],
    'Montaz.ref_vyska':    ['Ref. výška case',       'mm', false],
    'Montaz.hw_default_s': ['↩ Záložní / HW',        's', true ],
    'Peny.pistole':        ['Nahřívání pistole',     's', false],
    'Peny.cleanup':        ['Úklid po pěnách',       's', false],
    'Peny.fix_session':    ['Zahájení práce',        's', false],
    'Peny.pena_default_s': ['↩ Záložní / pěna',      's', true ],
  };

  const sekceConf = {
    CNC:    { label: 'CNC',   icon: '🔵', color: 'purple' },
    Montaz: { label: 'Montáž', icon: '🔧', color: 'blue'   },
    Peny:   { label: 'Pěny',  icon: '🟢', color: 'green'  },
  };

  const renderSekce = (sekce) => {
    const conf = sekceConf[sekce];
    const items = pars.filter(p => p.sekce === sekce);
    const normal  = items.filter(p => !LABELS[`${p.sekce}.${p.klic}`]?.[2]);
    const fallback = items.filter(p =>  LABELS[`${p.sekce}.${p.klic}`]?.[2]);

    const row = (par) => {
      const [label, unit] = LABELS[`${par.sekce}.${par.klic}`] || [par.klic, 's'];
      return `<tr>
        <td class="py-1.5 pr-3 text-xs text-gray-600 whitespace-nowrap" title="${par.popis||''}">${label}</td>
        <td class="py-1.5">
          <input class="border border-gray-200 rounded px-2 py-1 text-right text-sm w-20 focus:outline-none focus:ring-1 focus:ring-blue-400"
                 id="cp-${par.sekce}-${par.klic}"
                 type="number" step="1" min="0"
                 value="${par.hodnota}"
                 data-sekce="${par.sekce}" data-klic="${par.klic}"
                 oninput="_casSimPreview()">
        </td>
        <td class="py-1.5 pl-1.5 text-xs text-gray-400">${unit}</td>
      </tr>`;
    };

    return `<div class="card p-4">
      <p class="font-semibold text-${conf.color}-700 mb-3 text-sm">${conf.icon} ${conf.label}</p>
      <table class="w-full">
        <tbody>
          ${normal.map(row).join('')}
          ${fallback.length ? `
          <tr><td colspan="3" class="pt-3 pb-1">
            <div class="flex items-center gap-2">
              <div class="flex-1 h-px bg-amber-200"></div>
              <span class="text-xs text-amber-600 whitespace-nowrap">záložní časy</span>
              <div class="flex-1 h-px bg-amber-200"></div>
            </div>
          </td></tr>
          ${fallback.map(par => {
            const [label, unit] = LABELS[`${par.sekce}.${par.klic}`] || [par.klic, 's'];
            return `<tr class="bg-amber-50">
              <td class="py-1.5 pr-3 text-xs text-amber-700 whitespace-nowrap rounded-l" title="${par.popis||''}">${label}</td>
              <td class="py-1.5">
                <input class="border border-amber-200 bg-white rounded px-2 py-1 text-right text-sm w-20 focus:outline-none focus:ring-1 focus:ring-amber-400"
                       id="cp-${par.sekce}-${par.klic}"
                       type="number" step="1" min="0"
                       value="${par.hodnota}"
                       data-sekce="${par.sekce}" data-klic="${par.klic}"
                       oninput="_casSimPreview()">
              </td>
              <td class="py-1.5 pl-1.5 text-xs text-amber-500 rounded-r">${unit}</td>
            </tr>`;
          }).join('')}` : ''}
        </tbody>
      </table>
    </div>`;
  };

  document.getElementById('cas-param-panel').innerHTML = `
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-3">
      ${renderSekce('CNC')}
      ${renderSekce('Montaz')}
      ${renderSekce('Peny')}
    </div>
    <div class="flex items-center gap-3 mb-5">
      <button class="btn btn-primary" onclick="_saveCasParametry()">💾 Uložit a přepočítat vše</button>
      <button class="btn btn-secondary text-xs" onclick="_prepocitatVsechnyBOM(true)">🔄 Přepočítat vše (bez uložení)</button>
      <span id="cas-param-msg" class="text-sm text-green-600"></span>
      <p class="text-xs text-gray-400 ml-auto">
        Záložní časy (jantarové) se použijí, pokud materiál nemá nastaven vlastní <em>cas_s</em>.
        Přepočet nastaví <strong>Čas výroby</strong> u všech BOM.
      </p>
    </div>

    <!-- SPRÁVNÁ MC – cenové koeficienty -->
    ${(() => {
      const cenyPars = pars.filter(p => p.sekce === 'Ceny');
      const CLABELS = {
        'sazba_prace':   ['Hodinová sazba práce',     'Kč/h'],
        'koeficient_mc': ['Koeficient (náklady × ?)', '×'   ],
        'dph':           ['DPH',                      '%'   ],
      };
      const rows = cenyPars.map(par => {
        const [label, unit] = CLABELS[par.klic] || [par.klic, ''];
        return `<tr>
          <td class="py-1.5 pr-3 text-xs text-gray-600 whitespace-nowrap">${label}</td>
          <td class="py-1.5">
            <input class="border border-gray-200 rounded px-2 py-1 text-right text-sm w-24 focus:outline-none focus:ring-1 focus:ring-purple-400"
                   id="cp-Ceny-${par.klic}" type="number" step="0.01" min="0"
                   value="${par.hodnota}"
                   data-sekce="Ceny" data-klic="${par.klic}">
          </td>
          <td class="py-1.5 pl-1.5 text-xs text-gray-400">${unit}</td>
        </tr>`;
      }).join('');
      const exampleDilu = 5000, exampleH = 3;
      const sazba = parseFloat(cenyPars.find(p=>p.klic==='sazba_prace')?.hodnota)||300;
      const koef  = parseFloat(cenyPars.find(p=>p.klic==='koeficient_mc')?.hodnota)||2.2;
      const dph   = parseFloat(cenyPars.find(p=>p.klic==='dph')?.hodnota)||21;
      const exMC  = (exampleDilu + exampleH*sazba) * koef * (1+dph/100);
      return `<div class="card p-4 mb-5 border-2 border-purple-100">
        <div class="flex items-start justify-between gap-6">
          <div>
            <p class="font-semibold text-purple-700 mb-1 text-sm">🟣 Správná MC – cenové parametry</p>
            <p class="text-xs text-gray-400 mb-3">Vzorec: <code class="bg-gray-100 px-1 rounded">(cena dílů + hodiny × sazba) × koeficient × (1 + DPH/100)</code></p>
            <table><tbody>${rows}</tbody></table>
          </div>
          <div class="bg-purple-50 rounded-lg p-3 text-center min-w-32">
            <p class="text-xs text-gray-400 mb-1">Příklad (5 000 Kč dílů + 3 h práce)</p>
            <p class="text-lg font-bold text-purple-700">${fmtKc(exMC)}</p>

async function _casSimPreview() {
  const sel = document.getElementById('cas-sim-bom');
  if (!sel || !sel.value) return;
  const typId = sel.value;
  const el = document.getElementById('cas-sim-result');
  if (!el) return;
  el.innerHTML = '<span class="text-gray-400">Počítám…</span>';

  // Nejdřív ulož aktuální hodnoty z formuláře do dočasné proměnné (ne do DB)
  // Přečteme live hodnoty z inputů a simulujeme
  const inputs = document.querySelectorAll('#cas-param-panel input[data-sekce]');
  const overrides = {};
  inputs.forEach(inp => {
    overrides[`${inp.dataset.sekce}.${inp.dataset.klic}`] = parseFloat(inp.value) || 0;
  });

  // Zavolej server s uloženými hodnotami — note: server používá uložené DB hodnoty
  // Pro živou simulaci s neuloženými hodnotami musíme nejdříve dočasně uložit
  // Alternativa: simulujeme rovnou na klientovi pomocí výsledku z API
  const casData = await api(`/api/typy-casu/${typId}/cas-vypocet`).catch(() => null);
  if (!casData) { el.innerHTML = '<span class="text-red-500">Chyba načítání</span>'; return; }

  const fmtMin = s => `<strong>${Math.round(s/60)} min</strong>`;
  const fmtS   = s => `${Math.round(s)}s`;
  const defBadge = cnt => cnt > 0 ? `<span class="bg-amber-200 text-amber-800 rounded px-1 text-xs ml-1">~${cnt}× záložní</span>` : '';

  el.innerHTML = `
    <div class="grid grid-cols-4 gap-3 text-center mb-3">
      <div class="bg-purple-50 rounded-lg p-3">
        <p class="text-xs text-gray-400">🔵 CNC ${defBadge(casData.cnc.defaults_cnt)}</p>
        <p class="text-lg font-bold text-purple-700">${casData.cnc.celkem_fmt}</p>
        <p class="text-xs text-gray-400">size×${casData.size_factor}</p>
      </div>
      <div class="bg-blue-50 rounded-lg p-3">
        <p class="text-xs text-gray-400">🔧 Montáž ${defBadge(casData.montaz.defaults_cnt)}</p>
        <p class="text-lg font-bold text-blue-700">${casData.montaz.celkem_fmt}</p>
        <p class="text-xs text-gray-400">${casData.montaz.polozky.length} HW pol.</p>
      </div>
      <div class="bg-green-50 rounded-lg p-3">
        <p class="text-xs text-gray-400">🟢 Pěny ${defBadge(casData.peny.defaults_cnt)}</p>
        <p class="text-lg font-bold text-green-700">${casData.peny.celkem_fmt}</p>
        <p class="text-xs text-gray-400">${casData.peny.polozky.length} pěn. pol.</p>
      </div>
      <div class="bg-orange-100 rounded-lg p-3 border border-orange-300">
        <p class="text-xs text-gray-500">⏱ CELKEM</p>
        <p class="text-xl font-bold text-orange-700">${casData.celkem_fmt}</p>
        ${casData.ma_defaults ? `<p class="text-xs text-amber-600">⚠ ${casData.defaults_cnt}× odhad</p>` : '<p class="text-xs text-green-600">✓ přesné časy</p>'}
      </div>
    </div>
    ${casData.ma_defaults ? `
    <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-800 mb-2">
      <strong>Záložní časy</strong> – ${casData.defaults_cnt} položek nemá nastaven vlastní <code>cas_s</code> a používá záložní hodnoty z parametrů výše.
      Pro přesný výpočet nastavte čas zpracování u těchto materiálů v přehledu materiálů:
      <div class="mt-1.5 space-y-0.5">
        ${[...casData.cnc.polozky,...casData.montaz.polozky,...casData.peny.polozky]
          .filter(p => p.pouzit_default)
          .map(p => `<span class="inline-block bg-white border border-amber-200 rounded px-1.5 py-0.5 mr-1 mb-1 font-mono">${p.material_kod} <span class="text-gray-500">${p.nazev.substring(0,20)}${p.nazev.length>20?'…':''}</span></span>`)
          .join('')}
      </div>
    </div>` : ''}
    <div class="grid grid-cols-3 gap-3 text-xs">
      ${['cnc','montaz','peny'].map(sekce => {
        const s = casData[sekce];
        return `<div>
          <p class="font-semibold text-gray-500 mb-1">Rozpis ${sekce === 'cnc' ? 'CNC' : sekce === 'montaz' ? 'Montáž' : 'Pěny'}:</p>
          ${s.polozky.map(pol => `
            <div class="flex justify-between py-0.5 ${pol.pouzit_default ? 'text-amber-600' : 'text-gray-500'}">
              <span class="truncate" title="${pol.nazev}">${pol.pouzit_default?'~':''}${pol.nazev.substring(0,22)}${pol.nazev.length>22?'…':''}</span>
              <span class="font-mono ml-1 whitespace-nowrap">${fmtS(pol.cas_celkem_s)}</span>
            </div>`).join('') || '<p class="text-gray-300 italic">–</p>'}
        </div>`;
      }).join('')}
    </div>
  `;
}

async function _saveCasParametry() {
  const inputs = document.querySelectorAll('#cas-param-panel input[data-sekce]');
  const updates = Array.from(inputs).map(el => ({
    sekce: el.dataset.sekce,
    klic: el.dataset.klic,
    hodnota: parseFloat(el.value) || 0,
  }));
  const msg = document.getElementById('cas-param-msg');
  if (msg) msg.textContent = 'Ukládám…';
  await api('/api/cas-parametry', 'PUT', updates);
  // Automaticky přepočítej časy u všech BOM
  await _prepocitatVsechnyBOM(false);
  _casSimPreview();
}

async function _saveCenyParametry() {
  const inputs = document.querySelectorAll('#cas-param-panel input[data-sekce="Ceny"]');

async function _prepocitatVsechnyBOM(showConfirm = true) {
  if (showConfirm && !confirm('Přepočítat čas výroby u všech BOM dle aktuálních parametrů?')) return;
  const msg = document.getElementById('cas-param-msg');
  if (msg) msg.innerHTML = '<span class="text-blue-600 animate-pulse">⏳ Přepočítávám…</span>';
  const r = await api('/api/cas-parametry/prepocitat-vse', 'POST', {});
  if (msg) {
    msg.innerHTML = `<span class="text-green-600">✓ Uloženo · přepočítáno ${r.updated} BOM${r.errors?.length ? ` · ⚠ ${r.errors.length} chyb` : ''}</span>`;
    setTimeout(() => { if (msg) msg.textContent = ''; }, 5000);
  }
}

async function _renderProrez() {
  const r = await api('/api/prorez');
  const items = r.prorez || [];

  const rows = items.map(p => `
    <tr class="tr-hover">
      <td class="font-medium text-gray-700">${p.typ}</td>
      <td style="width:180px">
        <div class="flex items-center gap-2">
          <input type="range" min="0" max="50" step="1"
            value="${p.procento}"
            style="flex:1;accent-color:#2563eb"
            oninput="this.nextElementSibling.textContent=this.value+' %'; _prorezChanged()">
          <span class="text-sm font-mono w-12 text-right" id="prorez-val-${_slugify(p.typ)}">${p.procento} %</span>
        </div>
      </td>
      <td style="width:80px">
        <input type="number" min="0" max="100" step="0.5"
          class="input text-right" style="padding:4px 8px"
          value="${p.procento}"
          data-typ="${p.typ}"
          id="prorez-inp-${_slugify(p.typ)}"
          oninput="_syncSlider(this); _prorezChanged()">
      </td>
      <td class="text-xs text-gray-400">
        ${p.procento > 0
          ? `BOM × ${(1 + p.procento/100).toFixed(3)} při odpisu`
          : 'Bez přirážky'}
      </td>
    </tr>`).join('') ||
    `<tr><td colspan="4" class="text-center text-gray-400 py-8">
      Nejprve importuj materiály — typy se načtou automaticky.
    </td></tr>`;

  const panel = document.getElementById('prorez-panel');
  if (!panel) return;
  panel.innerHTML = `
    <div class="card overflow-hidden">
      <div class="p-4 border-b border-gray-100 flex items-center justify-between">
        <div>
          <span class="font-semibold text-gray-700">Prořez / ztráty materiálu dle typu</span>
          <p class="text-xs text-gray-400 mt-0.5">Přičítá se automaticky při odpisu ze skladu. V BOM a výrobním listu se vždy zobrazuje přesná hodnota z kusovníku.</p>
        </div>
        <button id="prorez-save-btn" class="btn btn-primary hidden" onclick="_saveProrez()">💾 Uložit změny</button>
      </div>
      <table class="w-full">
        <thead class="bg-gray-50">
          <tr>
            <th>Typ materiálu</th>
            <th>Prořez</th>
            <th style="width:80px">%</th>
            <th>Koeficient</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="text-xs text-gray-400 mt-3 px-1">
      Příklad: BOM = 1,00 m² · Prořez DESKA = 20 % → Ze skladu se odepíše <strong>1,20 m²</strong>
    </p>`;
}

function _slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]/g, '_');
}

function _syncSlider(inp) {
  // Synchronizuje number input ↔ range slider ve stejném řádku
  const tr = inp.closest('tr');
  if (!tr) return;
  const slider = tr.querySelector('input[type=range]');
  const label  = tr.querySelector('span[id^="prorez-val-"]');
  if (slider) slider.value = inp.value;
  if (label)  label.textContent = inp.value + ' %';
  // Aktualizuj koeficient text
  const koef = tr.querySelector('td:last-child');
  const pct  = parseFloat(inp.value) || 0;
  if (koef) koef.textContent = pct > 0
    ? `BOM × ${(1 + pct/100).toFixed(3)} při odpisu`
    : 'Bez přirážky';
}

function _prorezChanged() {
  const btn = document.getElementById('prorez-save-btn');
  if (btn) btn.classList.remove('hidden');
}

async function _saveProrez() {
  const inputs = document.querySelectorAll('input[data-typ]');
  const items = [...inputs].map(inp => ({
    typ: inp.dataset.typ,
    procento: parseFloat(inp.value) || 0,
  }));
  const r = await api('/api/prorez', 'POST', { items });
  if (r.error) return alert('Chyba: ' + r.error);
  const btn = document.getElementById('prorez-save-btn');
  if (btn) { btn.textContent = '✓ Uloženo'; btn.classList.add('btn-success'); btn.classList.remove('btn-primary'); }
  setTimeout(() => _renderProrez(), 1000);
}

function _textColor(hex) {
  // Vrátí tmavou nebo světlou barvu textu dle jasu pozadí
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 160 ? '#374151' : '#ffffff';
}

async function _updateStitek(id, data) {
  await api(`/api/kancelar/stitky/${id}`, 'POST', data);
  _renderStitky();
}

async function _stitkyPosun(id, smer) {
  const r = await api('/api/kancelar/stitky');
  const stitky = r.stitky || [];
  const idx = stitky.findIndex(s => s.id === id);
  const swapIdx = idx + smer;
  if (swapIdx < 0 || swapIdx >= stitky.length) return;
  await Promise.all([
    api(`/api/kancelar/stitky/${id}`, 'POST', {poradi: stitky[swapIdx].poradi}),
    api(`/api/kancelar/stitky/${stitky[swapIdx].id}`, 'POST', {poradi: stitky[idx].poradi}),
  ]);
  _renderStitky();
}

async function _deleteStitek(id) {
  if (!confirm('Smazat štítek?')) return;
  await api(`/api/kancelar/stitky/${id}`, 'DELETE');
  _renderStitky();
}

async function importCsv(type) {
  const fileInput = document.getElementById('file-' + type);
  const resultEl = document.getElementById('import-' + type + '-result');
  if (!fileInput.files.length) return alert('Vyberte soubor!');

  resultEl.innerHTML = '<span class="text-blue-600">Importuji... (může trvat minutu)</span>';

  const fd = new FormData();
  fd.append('file', fileInput.files[0]);
  fd.append('type', type);

  try {
    const r = await fetch('/api/import', { method: 'POST', body: fd });
    const data = await r.json();
    if (data.error) {
      resultEl.innerHTML = `<span class="text-red-600">Chyba: ${data.error}</span>`;
    } else {
      resultEl.innerHTML = `<span class="text-green-600">✓ Importováno ${data.imported} záznamů</span>`;
    }
  } catch(e) {
    resultEl.innerHTML = `<span class="text-red-600">Chyba: ${e.message}</span>`;
  }
}

  _prDodId = p.dodavatel_id || null;

  // Výpočet dopravného + live náhled
  function _prNahledy(dopravne) {
    const total = polozky.reduce((s, pol) => s + (pol.cena_celkem||0), 0);
    return polozky.map(pol => {
      const cj = parseFloat(pol.cena_jednotka || 0);
      const cc = parseFloat(pol.cena_celkem || 0);
      const mn = parseFloat(pol.mnozstvi || 0);
      // EUR přepočet
      const cj_czk = mena === 'EUR' ? cj * kurz : cj;
      const cc_czk = mena === 'EUR' ? cc * kurz : cc;
      // Dopravné
      let cj_fin = cj_czk;
      if (dopravne > 0 && total > 0 && mn > 0) {
        const share = dopravne * (cc / total);   // původní cc pro poměr
        cj_fin = cj_czk + share / mn;
      }
      return { ...pol, cj_fin: Math.round(cj_fin * 100) / 100 };
    });
  }

  function _prRenderNahled() {
    const dopravne = parseFloat(document.getElementById('pr-dopravne')?.value) || 0;
    const rows = _prNahledy(dopravne);
    const tbl = document.getElementById('pr-tbl');
    if (!tbl) return;
    const total_czk = rows.reduce((s, r) => s + r.cj_fin * parseFloat(r.mnozstvi||0), 0);
    const hasDopravne = dopravne > 0 || mena === 'EUR';
    tbl.innerHTML = rows.length === 0
      ? `<tr><td colspan="8" class="text-center text-gray-400 py-4">Žádné položky</td></tr>`
      : rows.map(pol => {
          const ccPuv = parseFloat(pol.cena_celkem||0);
          const ccFin = pol.cj_fin * parseFloat(pol.mnozstvi||0);
          return `<tr class="tr-hover border-b border-gray-50">
            <td class="font-mono text-xs text-blue-600">${pol.material_kod}</td>
            <td class="font-medium text-sm">${pol.material_nazev}</td>
            <td class="text-xs text-gray-500">${pol.umisteni||'–'}</td>
            <td class="text-right font-semibold">${fmt(pol.mnozstvi,3)}</td>
            <td class="text-right text-gray-500">${pol.cena_jednotka > 0 ? fmt(pol.cena_jednotka,2)+' '+mena : '–'}</td>
            ${hasDopravne
              ? `<td class="text-right font-semibold text-blue-700">${fmt(pol.cj_fin,2)} Kč</td>
                 <td class="text-right font-semibold text-blue-700">${fmt(ccFin,2)} Kč</td>`
              : `<td class="text-right font-semibold">${ccPuv > 0 ? fmt(ccPuv,2)+' Kč' : '–'}</td>
                 <td></td>`}
            ${!zauctovano
              ? `<td><button class="btn btn-danger py-0.5 px-2 text-xs" onclick="odebratPolozkuPrijemky(${id},'${pol.material_kod}')">✕</button></td>`
              : '<td></td>'}
          </tr>`;
        }).join('') +
        `<tr class="bg-gray-50 font-bold">
          <td colspan="5" class="text-right text-sm text-gray-500">Celkem k zaúčtování:</td>
          <td class="text-right text-blue-700">${fmt(total_czk / (rows[0]?.mnozstvi > 0 ? 1 : 1), 2)} Kč</td>
          <td colspan="2"></td>
        </tr>`;
  }

  openModal(`
    <div class="flex items-start justify-between mb-3">
      <div>
        <p class="text-xs text-gray-400 font-mono">Příjemka #${p.id} · ${p.datum}</p>
        <h3 class="text-xl font-bold text-gray-800">${p.cislo||'Bez čísla'}</h3>
        <p class="text-sm text-gray-500">${p.dodavatel_nazev||'Bez dodavatele'}
          ${mena === 'EUR' ? `<span class="badge ml-2" style="background:#fef3c7;color:#b45309">EUR · kurz ${kurz}</span>` : ''}
        </p>
      </div>
      <div class="flex items-center gap-2">
        <span class="badge ${zauctovano ? 'stav-Hotovo' : 'stav-Čeká'}">${p.stav}</span>
        <button onclick="smazatPrijemku(${id},'${(p.cislo||'#'+p.id).replace(/'/g,"\\'")}',${zauctovano?1:0})"
          class="btn btn-danger py-1 px-2 text-xs" title="Smazat příjemku">🗑 Smazat</button>
        <button onclick="closeModal()" class="btn btn-secondary py-1 px-2">✕</button>
      </div>
    </div>

    ${!zauctovano ? `
    <!-- Přidat položku -->
    <div class="card p-3 mb-3 bg-blue-50 border border-blue-100">
      <div class="flex items-center justify-between mb-2">
        <p class="text-sm font-semibold text-blue-800">Přidat položku</p>
        <button id="pr-filtr-btn" class="btn btn-primary text-xs"
          onclick="_prToggleDodFilter(${id})">☑ Pouze od dodavatele</button>
      </div>
      <div class="flex gap-2 flex-wrap">
        <select class="select flex-1" id="pr-mat-sel" style="min-width:220px">
          <option value="">Načítám…</option>
        </select>
        <input class="input w-24" id="pr-mnozstvi" type="number" step="0.001" min="0" placeholder="Množ.">
        <input class="input w-28" id="pr-cena-j" type="number" step="0.01" min="0" placeholder="Cena/j (${mena})">
        <button class="btn btn-primary" onclick="pridatPolozkuPrijemky(${id})">+ Přidat</button>
      </div>
    </div>

    <!-- Dopravné + měna -->
    <div class="grid grid-cols-3 gap-3 mb-3">
      <div class="col-span-2">
        <label class="text-xs text-gray-500 block mb-1">Dopravné (Kč) — rozpuštěno do cen materiálu</label>
        <input id="pr-dopravne" type="number" step="1" min="0" class="input"
          value="${p.dopravne||0}"
          placeholder="0"
          oninput="_prUlozDopravne(${id})">
        <p class="text-xs text-gray-400 mt-1" id="pr-dopravne-info">${p.dopravne > 0 ? `Uloženo: ${p.dopravne} Kč` : 'Zadejte dopravné, uloží se automaticky'}</p>
      </div>
      <div>
        <label class="text-xs text-gray-500 block mb-1">Kurz CZK/EUR</label>
        <input id="pr-kurz-edit" type="number" step="0.01" min="0" class="input ${mena==='EUR'?'':'bg-gray-50'}"
          value="${kurz}" ${mena!=='EUR'?'disabled title="Platí jen pro EUR"':''}
          oninput="_prUlozKurz(${id})">
      </div>
    </div>
    ${mena==='EUR' || (p.dopravne > 0) ? `
    <div class="bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-xs text-blue-700 mb-3">
      💡 <strong>Modré ceny</strong> = finální CZK hodnota po přepočtu měny a rozpuštění dopravného, která se zapíše do skladu
    </div>` : ''}
    ` : ''}

    <!-- Tabulka položek -->
    <table class="w-full mb-3">
      <thead class="bg-gray-50 border-b border-gray-100"><tr>
        <th>Kód</th><th>Materiál</th><th>Umístění</th>
        <th class="text-right">Množ.</th>
        <th class="text-right">Cena/j</th>
        <th class="text-right">${mena==='EUR'||(p.dopravne>0) ? 'Fin. cena/j' : 'Celkem'}</th>
        <th class="text-right">${mena==='EUR'||(p.dopravne>0) ? 'Fin. celkem' : ''}</th>
        <th></th>
      </tr></thead>
      <tbody id="pr-tbl"></tbody>
    </table>

    ${!zauctovano && polozky.length > 0 ? `
    <div class="flex gap-2 mt-3 pt-3 border-t border-gray-100">
      <button class="btn btn-primary flex-1 text-base" onclick="nahledPrijemky(${id})">
        👁 Náhled před naskladněním
      </button>
    </div>
    <p class="text-xs text-gray-400 text-center mt-1">Zkontrolujte finální ceny s dopravným před zápisem do skladu.</p>` : ''}
  `, true);

  // Inicializuj materiály a render
  window._prRenderNahled = _prRenderNahled;
  window._prUlozDopravne = async (pid) => {
    const v = parseFloat(document.getElementById('pr-dopravne')?.value) || 0;
    const info = document.getElementById('pr-dopravne-info');
    if (info) info.textContent = 'Ukládám…';
    await api(`/api/prijemky/${pid}/nastaveni`, 'POST', {dopravne: v});
    if (info) info.textContent = v > 0 ? `Uloženo: ${v} Kč` : 'Zadejte dopravné, uloží se automaticky';
  };
  window._prUlozKurz = async (pid) => {
    const v = parseFloat(document.getElementById('pr-kurz-edit')?.value) || 1;
    await api(`/api/prijemky/${pid}/nastaveni`, 'POST', {kurz: v});
  };

  try { _prRenderNahled(); } catch(e) { console.error('prRenderNahled:', e); }

  if (!zauctovano) {
    await _prNactiMaty(_prDodId, _prDodFilter);
  }
}

async function pridatPolozkuPrijemky(prijemkaId) {
  const matKod   = document.getElementById('pr-mat-sel').value;
  const mnozstvi = parseFloat(document.getElementById('pr-mnozstvi').value);
  const cenaJ    = parseFloat(document.getElementById('pr-cena-j').value) || 0;
  if (!matKod) return alert('Vyberte materiál!');
  if (!mnozstvi || mnozstvi <= 0) return alert('Zadejte množství!');
  const r = await api(`/api/prijemky/${prijemkaId}/polozka`, 'POST',
    { material_kod: matKod, mnozstvi, cena_jednotka: cenaJ });
  if (r.error) return alert('Chyba: ' + r.error);
  prijemkaDetail(prijemkaId);
}

async function odebratPolozkuPrijemky(prijemkaId, matKod) {
  if (!confirm('Odebrat položku?')) return;
  await api(`/api/prijemky/${prijemkaId}/polozka/${encodeURIComponent(matKod)}`, 'DELETE');
  prijemkaDetail(prijemkaId);
}

async function zauctovatPrijemku(id) {
  const r = await api(`/api/prijemky/${id}/zauctovat`, 'POST');
  if (r.error) return alert('Chyba: ' + r.error);
  alert(`✓ Naskladněno ${r.naskladneno} položek`);
  closeModal();
  prijemky();
}

async function smazatPrijemku(id, cislo, zauctovano) {
  const msg = zauctovano
    ? `POZOR: Příjemka "${cislo}" je zaúčtovaná.\n\nSmazání obrátí naskladnění — materiály budou odečteny ze skladu.\n\nOpravdu smazat?`
    : `Smazat příjemku "${cislo}"? Akce je nevratná.`;
  if (!confirm(msg)) return;
  const r = await api(`/api/prijemky/${id}`, 'DELETE');
  if (r.error) return alert('Chyba: ' + r.error);
  closeModal();
  prijemky();
}

async function nahledPrijemky(id) {
  const r = await api(`/api/prijemky/${id}/nahled`);
  if (r.error) return alert('Chyba: ' + r.error);

  const hasDopravne = r.dopravne > 0;
  const hasEur = r.mena === 'EUR';
  const hasExtra = hasDopravne || hasEur;

  const rows = r.polozky.map(p => {
    const origLabel = hasEur ? `${fmt(p.cena_j_orig,2)} EUR` : `${fmt(p.cena_j_orig,2)} Kč`;
    const czk = hasEur ? `<td class="text-right text-xs text-gray-500">${fmt(p.cena_j_czk,2)} Kč</td>` : '<td></td>';
    const freight = hasDopravne
      ? `<td class="text-right text-xs text-orange-500">+${fmt(p.freight_share,2)} Kč</td>`
      : '<td></td>';
    return `<tr class="border-b border-gray-50">
      <td class="font-mono text-xs text-blue-600">${p.material_kod}</td>
      <td class="text-sm font-medium">${p.material_nazev}</td>
      <td class="text-right text-gray-500 text-xs">${fmt(p.mnozstvi,3)}</td>
      <td class="text-right">${origLabel}</td>
      ${czk}
      ${freight}
      <td class="text-right font-bold text-green-700">${fmt(p.cena_j_fin,2)} Kč</td>
      <td class="text-right text-gray-500 text-xs">${fmt(p.cena_celkem_fin,2)} Kč</td>
    </tr>`;
  }).join('');

  openModal(`
    <div class="flex items-center justify-between mb-3">
      <div>
        <h3 class="text-xl font-bold text-gray-800">Náhled naskladnění</h3>
        <p class="text-xs text-gray-400">Takto budou ceny zapsány do katalogu materiálů</p>
      </div>
      <button onclick="closeModal()" class="btn btn-secondary py-1 px-2">✕</button>
    </div>

    ${hasExtra ? `<div class="bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-xs text-blue-700 mb-3 flex flex-wrap gap-4">
      ${hasEur ? `<span>💱 Kurz: <strong>${r.kurz} CZK/EUR</strong></span>` : ''}
      ${hasDopravne ? `<span>🚚 Dopravné: <strong>${fmt(r.dopravne,2)} Kč</strong> rozpuštěno váženým průměrem</span>` : ''}
    </div>` : ''}

    <div style="max-height:50vh;overflow-y:auto">
    <table class="w-full text-sm mb-3">
      <thead class="bg-gray-50 border-b border-gray-100 sticky top-0"><tr>
        <th>Kód</th><th>Materiál</th>
        <th class="text-right">Množ.</th>
        <th class="text-right">Orig. cena/j</th>
        ${hasEur ? '<th class="text-right">CZK/j</th>' : '<th></th>'}
        ${hasDopravne ? '<th class="text-right">Dopravné/j</th>' : '<th></th>'}
        <th class="text-right">Fin. cena/j</th>
        <th class="text-right">Fin. celkem</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot class="bg-gray-50 border-t-2 border-gray-200">
        <tr>
          <td colspan="7" class="text-right font-semibold text-sm text-gray-600">Celkem k naskladnění:</td>
          <td class="text-right font-bold text-green-700">${fmt(r.total_fin,2)} Kč</td>
        </tr>
      </tfoot>
    </table>
    </div>

    <div class="flex gap-2 pt-3 border-t border-gray-100">
      <button class="btn btn-secondary flex-1" onclick="prijemkaDetail(${id})">← Zpět k úpravám</button>
      <button class="btn btn-success flex-1 text-base font-bold" onclick="zauctovatPrijemku(${id})">
        ✓ Zaúčtovat a naskladnit
      </button>
    </div>
    <p class="text-xs text-gray-400 text-center mt-1">Ceny materiálů v katalogu se aktualizují. Akce je nevratná.</p>
  `, true);
}

let _odFilter = { typ: '', material_kod: '', od: '', do: '' };

async function opravneDoklady() {
  setContent('<div class="text-center py-16 text-gray-400">Načítám...</div>');

  // Filtry
  const fp = document.getElementById('page-filter');
  fp.style.display = '';
  fp.innerHTML = `
    <div class="p-3 flex flex-wrap gap-2 items-center">
      <select class="select text-sm" onchange="_odSetFilter('typ',this.value)">
        <option value="">Vše typy</option>
        <option value="manko" ${_odFilter.typ==='manko'?'selected':''}>Manko</option>
        <option value="prebytek" ${_odFilter.typ==='prebytek'?'selected':''}>Přebytek</option>
      </select>
      <input class="input text-sm w-36" type="date" placeholder="Od data"
        value="${_odFilter.od}" onchange="_odSetFilter('od',this.value)">
      <input class="input text-sm w-36" type="date" placeholder="Do data"
        value="${_odFilter.do}" onchange="_odSetFilter('do',this.value)">
      <button class="btn btn-secondary text-sm" onclick="_odClearFilter()">✕ Vše</button>
      <div class="flex-1"></div>
      <button class="btn btn-success" onclick="novyOpravnyDoklad()">+ Nový opravný doklad</button>
    </div>`;

  const params = new URLSearchParams();
  if (_odFilter.typ) params.set('typ', _odFilter.typ);
  if (_odFilter.od)  params.set('od',  _odFilter.od);
  if (_odFilter.do)  params.set('do',  _odFilter.do);

  const data = await api('/api/opravne-doklady?' + params.toString());
  const items = data.items || [];

  if (items.length === 0) {
    setContent(`
      <div class="p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-1">Opravné doklady</h2>
        <p class="text-sm text-gray-400 mb-6">Manko a Přebytek — korekce stavu skladu</p>
        <div class="text-center py-16 text-gray-400">
          <p class="text-4xl mb-4">📋</p>
          <p>Žádné záznamy. Použijte tlačítko <strong>+ Nový opravný doklad</strong> vpravo nahoře.</p>
        </div>
      </div>`);
    return;
  }

  // Sumarizace
  const sumManko    = items.filter(i=>i.typ==='manko').reduce((s,i)=>s+i.mnozstvi*i.cena_bez_dph,0);
  const sumPrebytek = items.filter(i=>i.typ==='prebytek').reduce((s,i)=>s+i.mnozstvi*i.cena_bez_dph,0);

  const rows = items.map(i => `
    <tr class="tr-hover border-b border-gray-50 cursor-pointer">
      <td class="font-mono text-xs text-gray-400">${i.datum}</td>
      <td>${_odBadge(i.typ)}</td>
      <td class="font-mono text-xs text-blue-600">${i.material_kod}</td>
      <td class="font-medium text-sm">${i.material_nazev}</td>
      <td class="text-xs text-gray-400">${i.material_typ||''}</td>
      <td class="text-right font-semibold ${i.typ==='manko'?'text-red-600':'text-green-600'}">
        ${i.typ==='manko'?'−':'+'}${fmt(i.mnozstvi,3)} ${i.jednotka||''}
      </td>
      <td class="text-right text-sm">${fmtKc(i.cena_bez_dph)}/j</td>
      <td class="text-right font-semibold">${fmtKc(i.mnozstvi * i.cena_bez_dph)}</td>
      <td class="text-sm text-gray-500 max-w-xs truncate">${i.poznamka||'–'}</td>
      <td><button class="btn btn-danger py-0.5 px-2 text-xs"
        onclick="smazatOpravnyDoklad(${i.id},'${i.datum}',event)">✕</button></td>
    </tr>`).join('');

  setContent(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-xl font-bold text-gray-800">Opravné doklady</h2>
          <p class="text-sm text-gray-400">Manko a Přebytek — korekce stavu skladu</p>
        </div>
        <div class="flex gap-4 text-sm text-gray-600">
          <span class="bg-red-50 text-red-700 px-3 py-1 rounded-lg">
            Manko celkem: <strong>−${fmtKc(sumManko)}</strong>
          </span>
          <span class="bg-green-50 text-green-700 px-3 py-1 rounded-lg">
            Přebytek celkem: <strong>+${fmtKc(sumPrebytek)}</strong>
          </span>
        </div>
      </div>
      <div class="card">
        <table class="w-full tbl-sort">
          <thead>
            <tr>
              <th>Datum</th><th>Typ</th><th>Kód</th><th>Materiál</th><th>Druh</th>
              <th class="text-right">Množství</th>
              <th class="text-right">Cena/j</th>
              <th class="text-right">Hodnota</th>
              <th>Poznámka</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`);
}

function _odBadge(typ) {
  if (typ === 'manko')
    return '<span class="badge" style="background:#fee2e2;color:#b91c1c">▼ Manko</span>';
  return '<span class="badge" style="background:#dcfce7;color:#166534">▲ Přebytek</span>';
}

function _odSetFilter(key, val) {
  _odFilter[key] = val;
  opravneDoklady();
}

function _odClearFilter() {
  _odFilter = { typ: '', material_kod: '', od: '', do: '' };
  opravneDoklady();
}

function _odVyberTyp(typ) {
  document.querySelectorAll('[id^=od-lbl-]').forEach(el => {

  if (lbl) lbl.style.borderColor = typ === 'manko' ? '#ef4444' : '#22c55e';
  const radio = document.querySelector(`input[name="od-typ"][value="${typ}"]`);
  if (radio) radio.checked = true;
}

async function _odNactiCenu(kod) {
  if (!kod) return;
  const info = document.getElementById('od-fifo-info');
  if (info) info.textContent = 'Načítám…';
  const r = await api(`/api/materialy/${encodeURIComponent(kod)}/fifo-cena`);
  const cenaEl = document.getElementById('od-cena');
  if (r.cena !== undefined && cenaEl) {
    cenaEl.value = r.cena;
    if (info) info.textContent = `(FIFO: ${fmt(r.cena,2)} Kč)`;
  } else {
    if (info) info.textContent = '';
  }
}

async function _odUloz() {
  const typ = document.querySelector('input[name="od-typ"]:checked')?.value;
  const mat = document.getElementById('od-mat')?.value;
  const mn  = parseFloat(document.getElementById('od-mnozstvi')?.value);
  const cena = parseFloat(document.getElementById('od-cena')?.value) || 0;
  const datum = document.getElementById('od-datum')?.value;
  const poz   = document.getElementById('od-poznamka')?.value || '';

  if (!typ)       return alert('Vyberte typ korekce (Manko nebo Přebytek).');
  if (!mat)       return alert('Vyberte materiál.');
  if (!mn || mn <= 0) return alert('Zadejte platné množství.');

  const uzivatel = document.getElementById('od-uzivatel')?.value || '';
  const r = await api('/api/opravne-doklady', 'POST', {
    typ, material_kod: mat, mnozstvi: mn, cena_bez_dph: cena,
    datum, poznamka: poz, uzivatel
  });
  if (r.error) return alert('Chyba: ' + r.error);
  closeModal();
  opravneDoklady();
}

async function smazatOpravnyDoklad(id, datum, evt) {
  evt.stopPropagation();
  if (!confirm(`Smazat opravný doklad ze dne ${datum}?\nPohyb skladu bude stornován.`)) return;
  const r = await api(`/api/opravne-doklady/${id}`, 'DELETE');
  if (r.error) return alert('Chyba: ' + r.error);
  opravneDoklady();
}

// ── DOCHÁZKA NA DÍLNĚ ─────────────────────────────────────────────────────

const DOCH_CASY = ['','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];

function _dochCasOpts(selected) {
  return DOCH_CASY.map(c => `<option value="${c}" ${c===selected?'selected':''}>${c||'—'}</option>`).join('');
}

function _dochHodiny(od, doo) {
  if (!od || !doo) return 0;
  const [hO,mO] = od.split(':').map(Number);
  const [hD,mD] = doo.split(':').map(Number);
  return Math.max(0, (hD + mD/60) - (hO + mO/60));
}

// Výpočet týdne: Po-Ne
function _dochDayLabel(iso) {
  const d = new Date(iso + 'T00:00:00');
  const dny = ['ne','po','út','st','čt','pá','so'];
  const mes = ['led','úno','bře','dub','kvě','čvn','čvc','srp','zář','říj','lis','pro'];
  return `${dny[d.getDay()]} – ${d.getDate()}.${mes[d.getMonth()]}.${String(d.getFullYear()).slice(2)}`;
}

function _dochIsWeekend(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.getDay() === 0 || d.getDay() === 6;
}

let _dochData      = null;   // data plánu (stávající modul)
let _dochLiveUsers = null;   // živý stav uživatelů
let _dochTab       = 'live'; // aktuální záložka: 'live' | 'plan' | 'mesic'

// Formátuje sekundy → "2 h 35 min"
/** Převede jméno na 5. pád (vokativ) — křestní jméno */
function _dochVokativ(jmeno) {
  const p = (jmeno||'').trim().split(/\s+/)[0];
  if (!p) return jmeno;
  // Ženská jména na -a → -o  (Jana→Jano, Eva→Evo, Petra→Petro, Kateřina→Kateřino)
  if (/a$/i.test(p)) return p.slice(0,-1) + 'o';
  // Zůstane (Irene, Renate, …)
  if (/e$/i.test(p)) return p;
  // -áš → -áši  (Tomáš→Tomáši, Lukáš→Lukáši)
  if (/áš$/i.test(p)) return p + 'i';
  // -el → -le  (Karel→Karle)
  if (/el$/i.test(p)) return p.slice(0,-2) + 'le';
  // -ek → -ku  (Marek→Marku, Patrik→Patriku)
  if (/[eé]k$/i.test(p)) return p.slice(0,-2) + 'ku';
  if (/k$/i.test(p)) return p + 'u';
  // -r / -n / -t → přidej -e  (Petr→Petre, Jan→Jane, Martin→Martine)
  if (/[rnt]$/i.test(p)) return p + 'e';
  // Jiří, Ondřej apod. — nezměněno
  return p;
}

/** Zobrazí velký overlay zprávu, která po 3 s zmizí */
function _dochToast(html, barva) {
  const el = document.createElement('div');
  el.style.cssText = [
    'position:fixed','top:50%','left:50%',
    'transform:translate(-50%,-50%)',
    `background:${barva}`,
    'color:#fff','padding:32px 52px','border-radius:20px',
    'font-size:1.3rem','font-weight:700','z-index:9999',
    'text-align:center','box-shadow:0 20px 60px rgba(0,0,0,.3)',
    'max-width:500px','line-height:1.6','pointer-events:none'
  ].join(';');
  el.innerHTML = html;
  document.body.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .6s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 600);
  }, 3000);
}

function _dochFmtSek(sek) {
  if (!sek || sek < 0) return '0 min';
  const h = Math.floor(sek / 3600);
  const m = Math.floor((sek % 3600) / 60);
  return h > 0 ? `${h} h ${m} min` : `${m} min`;
}
// Formátuje datetime "2026-04-16 07:30:00" → "07:30"
function _dochFmtCas(ts) {
  if (!ts) return '—';
  return String(ts).slice(11,16);
}
// Formátuje datetime → "16.4. 07:30"
function _dochFmtDT(ts) {
  if (!ts) return '—';
  const d = new Date(String(ts).replace(' ','T'));
  return `${d.getDate()}.${d.getMonth()+1}. ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

  if (r.error) return alert(r.error);
  closeModal();
  _dochLiveLoad();
}

async function _dochMesicLoad(defaultUid) {
  const dnes = new Date();
  let rok = dnes.getFullYear(), mesic = dnes.getMonth()+1;
  // Pokud jsme přišli z modalu s konkrétním uzivatelem, předvyber ho
  _dochMesicRender(rok, mesic, defaultUid||null);
}

async function _dochMesicRender(rok, mesic, filterUid) {

  zaznamy.forEach(z=>{ if (!uMap[z.uzivatel_id]) uMap[z.uzivatel_id]={id:z.uzivatel_id,jmeno:z.jmeno,barva:z.barva}; });
  const users = Object.values(uMap).sort((a,b)=>a.jmeno.localeCompare(b.jmeno,'cs'));

  const mesNazvy = ['','Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];

// ─── PLÁN záložka (stávající logika) ─────────────────────────────────────────
async function _dochPlanLoad() {
  setContent('<div class="text-center py-16 text-gray-400">Načítám plán…</div>');
  const dnes = new Date();
  const od = new Date(dnes); od.setDate(od.getDate() - 3);
  const doo = new Date(dnes); doo.setDate(doo.getDate() + 60);
  const toISO = d => d.toISOString().slice(0,10);
  const r = await api(`/api/dochazka?od=${toISO(od)}&do=${toISO(doo)}`);
  if (r.error) return setContent(`<p class="text-red-500 p-6">${r.error}</p>`);
  _dochData = r;
  _dochPlanRender();
}

function _dochPlanRender() {
  const { users, records } = _dochData;
  if (!users || users.length === 0) {
    setContent(_dochTabBar('plan') + '<div class="p-8 text-gray-400 text-center">Nejprve přidejte uživatele v Nastavení → Uživatelé.</div>');
    return;
  }

  const dnes = new Date().toISOString().slice(0,10);
  const dnes3ago = new Date(); dnes3ago.setDate(dnes3ago.getDate() - 3);
  const datumOd = dnes3ago.toISOString().slice(0,10);
  const datumDo = new Date(); datumDo.setDate(datumDo.getDate() + 60);

  // Sestaví mapu: recMap[uid][datum] = {cas_od, cas_do}
  const recMap = {};
  users.forEach(u => recMap[u.id] = {});
  records.forEach(rec => {
    if (recMap[rec.uzivatel_id]) recMap[rec.uzivatel_id][rec.datum] = rec;
  });

  // Sestaví seznam dat
  const dates = [];
  const cur = new Date(datumOd + 'T00:00:00');
  const end = new Date(datumDo.toISOString().slice(0,10) + 'T00:00:00');
  while (cur <= end) {
    dates.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate() + 1);
  }

  // Spočítej člověkohodiny za den (jen přítomní s vyplněným časem)
  const denHodiny = {};
  dates.forEach(d => {
    let sum = 0;
    users.forEach(u => {
      const rec = recMap[u.id][d];
      if (rec && rec.cas_od && rec.cas_do) sum += _dochHodiny(rec.cas_od, rec.cas_do);
    });
    denHodiny[d] = sum;
  });

  // Záhlaví tabulky – jméno uživatele přes 2 sloupce
  const headCols = users.map(u => {
    const initials = u.jmeno.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
    return `<th colspan="2" style="min-width:118px;background:${u.barva}22;border-left:3px solid ${u.barva};padding:6px 4px;font-size:.72rem;white-space:nowrap">
      <div style="display:flex;align-items:center;gap:4px;justify-content:center">
        <span style="background:${u.barva};color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0">${initials}</span>
        <span style="overflow:hidden;text-overflow:ellipsis;max-width:80px">${u.jmeno}</span>
      </div>
    </th>`;
  }).join('');

  // Podřádek záhlaví – od/do
  const subHeadCols = users.map(u =>
    `<th style="padding:2px 4px;font-size:.65rem;color:#6b7280;background:${u.barva}11;border-left:3px solid ${u.barva}">od</th>` +
    `<th style="padding:2px 4px;font-size:.65rem;color:#6b7280;background:${u.barva}11">do</th>`
  ).join('');

  // Řádky dat
  const rows = dates.map(datum => {
    const isPast = datum < dnes;
    const isToday = datum === dnes;
    const isWe = _dochIsWeekend(datum);
    const hod = denHodiny[datum];

    const rowBg = isToday
      ? 'background:#eff6ff;'
      : isPast
        ? 'background:#e0f2fe;opacity:.7;'
        : isWe
          ? 'background:#fafaf9;'
          : '';

    const datLabel = _dochDayLabel(datum);
    const todayMark = isToday ? ' <span style="font-size:.6rem;background:#2563eb;color:#fff;border-radius:4px;padding:0 4px">dnes</span>' : '';
    const hodLabel = hod > 0
      ? `<span style="font-size:.6rem;color:#059669;font-weight:600;margin-left:4px">${hod.toFixed(1)}h</span>`
      : '';

    const cells = users.map(u => {
      const rec = recMap[u.id][datum] || {};
      const od_v  = rec.cas_od || '';
      const do_v  = rec.cas_do || '';
      const sel = `style="padding:1px 2px;font-size:.7rem;border:1px solid #e2e8f0;border-radius:4px;height:24px;background:${isPast?'#e0f2fe':'#fff'};width:55px"`;
      if (isPast) {
        // Minulé dny — jen zobrazit, ne editovat
        const odTxt = od_v ? `<span style="font-size:.7rem;color:#1e40af">${od_v}</span>` : '<span style="color:#cbd5e1;font-size:.7rem">–</span>';
        const doTxt = do_v ? `<span style="font-size:.7rem;color:#1e40af">${do_v}</span>` : '<span style="color:#cbd5e1;font-size:.7rem">–</span>';
        return `<td style="text-align:center;padding:2px 3px;border-left:3px solid ${u.barva}">${odTxt}</td>` +
               `<td style="text-align:center;padding:2px 3px">${doTxt}</td>`;
      }
      return `<td style="padding:2px 3px;border-left:3px solid ${u.barva}">
        <select ${sel} onchange="_dochSave(${u.id},'${datum}','od',this.value)">${_dochCasOpts(od_v)}</select>
      </td><td style="padding:2px 3px">
        <select ${sel} onchange="_dochSave(${u.id},'${datum}','do',this.value)">${_dochCasOpts(do_v)}</select>
      </td>`;
    }).join('');

    return `<tr id="doch-row-${datum}" style="${rowBg}">
      <td style="padding:3px 10px;font-size:.72rem;white-space:nowrap;font-weight:${isToday?700:400};color:${isPast?'#1e40af':isWe?'#94a3b8':'#374151'};position:sticky;left:0;background:inherit;min-width:120px;border-right:1px solid #e2e8f0">
        ${datLabel}${todayMark}${hodLabel}
      </td>
      ${cells}
    </tr>`;
  }).join('');

  setContent(`
    ${_dochTabBar('plan')}
    <div class="flex items-center justify-between mb-4">
      <div>
        <h2 class="text-xl font-bold text-gray-800">📅 Plán docházky</h2>
        <p class="text-xs text-gray-400 mt-0.5">Plánovaná přítomnost · zelené číslo = součet člověkohodin za den</p>
      </div>
      <button class="btn btn-secondary" onclick="_dochPlanLoad()">⟳ Obnovit</button>
    </div>
    <div style="overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 165px)">
      <table style="border-collapse:collapse;width:100%;min-width:max-content">
        <thead style="position:sticky;top:0;z-index:10;background:#fff">
          <tr>
            <th style="padding:6px 10px;font-size:.7rem;text-align:left;position:sticky;left:0;background:#fff;border-right:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0">Datum</th>
            ${headCols}
          </tr>
          <tr style="background:#f8fafc">
            <th style="position:sticky;left:0;background:#f8fafc;border-right:1px solid #e2e8f0;border-bottom:2px solid #e2e8f0"></th>
            ${subHeadCols}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `);
}

// Stav buňky pro optimistic update
const _dochPending = {};   // klíč = uid+datum

async function _dochSave(uid, datum, field, value) {
  const key = `${uid}_${datum}`;
  // Ulož hodnotu do lokální mapy
  const rec = _dochData.records.find(r => r.uzivatel_id === uid && r.datum === datum);
  const local = _dochData.records.find(r => r.uzivatel_id === uid && r.datum === datum) || {};
  if (!_dochData.records.find(r => r.uzivatel_id === uid && r.datum === datum)) {
    _dochData.records.push({ uzivatel_id: uid, datum, cas_od: '', cas_do: '' });
  }
  const target = _dochData.records.find(r => r.uzivatel_id === uid && r.datum === datum);
  target[field === 'od' ? 'cas_od' : 'cas_do'] = value;

  // Debounce save
  clearTimeout(_dochPending[key]);
  _dochPending[key] = setTimeout(async () => {
    const cas_od = target.cas_od || '';
    const cas_do = target.cas_do || '';
    const r = await api('/api/dochazka', 'POST', { uzivatel_id: uid, datum, cas_od, cas_do });
    if (r.error) { console.warn('Dochazka save err:', r.error); return; }
    // Aktualizuj součet hodin v řádku
    const hod = _dochData.records
      .filter(x => x.datum === datum && x.cas_od && x.cas_do)
      .reduce((s, x) => s + _dochHodiny(x.cas_od, x.cas_do), 0);
    const row = document.getElementById('doch-row-' + datum);
    if (row) {
      const firstTd = row.querySelector('td');
      if (firstTd) {
        // Aktualizuj hodiny label v prvním sloupci
        const noHod = firstTd.innerHTML.replace(/<span[^>]*color:#059669[^>]*>.*?<\/span>/g,'');
        firstTd.innerHTML = noHod + (hod > 0 ? `<span style="font-size:.6rem;color:#059669;font-weight:600;margin-left:4px">${hod.toFixed(1)}h</span>` : '');
      }
    }
  }, 600);
}

async function _kanSaveField(id, field, value) {
  const body = { [field]: value === '' ? null : value };
  const r = await api(`/api/kancelar/zakazky/${id}`, 'POST', body);
  if (r.error) alert('Chyba: ' + r.error);
  else {
    // aktualizuj lokální data
    const d = window._kanData;
    if (d) {
      const z = d.zakazky.find(x => x.id === id);
      if (z) z[field] = value || null;
    }
  }
}

async function _kanSaveStitky(id, stitkyIds) {
  const r = await api(`/api/kancelar/zakazky/${id}`, 'POST', { stitky: stitkyIds });
  if (r.error) alert('Chyba: ' + r.error);
  else {
    const d = window._kanData;
    if (d) {
      const z = d.zakazky.find(x => x.id === id);
      if (z) z.stitky = r.zakazka.stitky;
    }
  }
}

// ── KANCELÁŘ – SEZNAM ─────────────────────────────────────────────────────

async function kancelar() {
  setFilter('');
  setContent(`<div class="flex items-center justify-center h-32"><div class="text-gray-400">Načítám…</div></div>`);

  const aktivniParam = _kanShowInactive ? '0' : '1';
  const [rZak, rSt, rUz, rStav] = await Promise.all([
    api('/api/kancelar/zakazky?aktivni=' + aktivniParam),
    api('/api/kancelar/stitky'),
    api('/api/uzivatele'),
    api('/api/kancelar/stav-hotovo'),
  ]);

  const zakazky  = rZak.zakazky || [];
  const stitky   = (rSt.stitky  || []).filter(s => s.aktivni);
  const uzivatele = rUz.uzivatele || [];
  const stavList  = rStav.items || [];

  const filterBtns = stitky.map(s =>
    `<button onclick="_kanToggleFilter(${s.id})" id="kan-sf-${s.id}"
       class="badge" style="background:${_kanStitkFilter.includes(s.id) ? s.barva : '#f1f5f9'};color:${_kanStitkFilter.includes(s.id) ? _textColor(s.barva) : '#6b7280'};cursor:pointer;font-size:.7rem;padding:3px 10px;border:1.5px solid ${_kanStitkFilter.includes(s.id) ? s.barva : '#e2e8f0'}"
       title="Filtrovat: ${s.nazev}">${s.nazev.replace(/_/g,' ')}</button>`
  ).join('');

  setFilter(`
    <div class="flex items-center gap-2 flex-wrap py-2 px-4">
      <span class="text-xs text-gray-400 font-semibold mr-1">ŠTÍTEK:</span>
      ${filterBtns}
      ${_kanStitkFilter.length ? `<button class="btn btn-secondary" style="padding:2px 10px;font-size:.75rem" onclick="_kanClearFilter()">✕ Filtr</button>` : ''}
      <div class="flex-1"></div>
      <input id="kan-search" class="input" style="max-width:180px;padding:4px 10px" placeholder="Hledat…" oninput="_kanRender()">
      <label class="flex items-center gap-1 text-xs text-gray-500 cursor-pointer">
        <input type="checkbox" ${_kanShowInactive?'checked':''} onchange="_kanToggleInactive(this.checked)"> Neaktivní
      </label>
      <button class="btn btn-primary" onclick="kanNovaModal()">+ Nová zakázka</button>
    </div>`);

  window._kanData = { zakazky, stitky, uzivatele, stavList };
  _kanRender();
}

function _kanToggleFilter(id) {
  const idx = _kanStitkFilter.indexOf(id);
  if (idx >= 0) _kanStitkFilter.splice(idx, 1); else _kanStitkFilter.push(id);
  kancelar();
}
function _kanClearFilter() { _kanStitkFilter = []; kancelar(); }
function _kanToggleInactive(v) { _kanShowInactive = v; _cache.kancelar = null; kancelar(); }

function _kanEsc(s) { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function _kanInlineText(id, field, val, placeholder='') {
  return `<input class="kan-input" value="${_kanEsc(val)}" placeholder="${placeholder}"
    data-id="${id}" data-field="${field}"
    onblur="_kanBlur(this)" onkeydown="if(event.key==='Enter')this.blur()">`;
}

function _kanInlineSel(id, field, val, opts) {
  const optsHtml = opts.map(o => `<option value="${o.v}" ${val==o.v?'selected':''}>${o.l}</option>`).join('');
  return `<select class="kan-input" data-id="${id}" data-field="${field}" onchange="_kanBlur(this)">${optsHtml}</select>`;
}

function _kanBlur(el) {
  const id    = parseInt(el.dataset.id);
  const field = el.dataset.field;
  const val   = el.value;
  _kanSaveField(id, field, val);
}

function _kanRender() {
  const { zakazky, stitky, uzivatele, stavList } = window._kanData || {};
  if (!zakazky) return;
  const q = (document.getElementById('kan-search')?.value || '').toLowerCase();

  const filtered = zakazky.filter(z => {
    if (q && ![z.nazev, z.zakaznik, z.hn_kod, z.tel, z.mail].some(v => (v||'').toLowerCase().includes(q))) return false;
    if (_kanStitkFilter.length) {
      const ids = (z.stitky||[]).map(s => s.id);
      if (!_kanStitkFilter.every(f => ids.includes(f))) return false;
    }
    return true;
  });

  // Inline selecty
  const uzOpts = [{v:'',l:'—'}].concat(uzivatele.filter(u=>u.aktivni).map(u=>({v:u.id,l:u.jmeno})));
  const prioOpts = ['Řešit okamžitě','Vysoká','Střední','Nízká'].map(p=>({v:p,l:p}));
  const stavOpts = [{v:'',l:'—'}].concat(stavList.map(s=>({v:s.nazev,l:s.nazev})));

  const rows = filtered.map(z => {
    const sB = (z.stitky||[]).map(s => `<span class="badge" style="background:${s.barva};color:${_textColor(s.barva)};font-size:.65rem;padding:1px 6px;cursor:pointer" onclick="event.stopPropagation();_kanRemoveStitok(${z.id},${s.id})" title="Odebrat štítek">${s.nazev.replace(/_/g,' ')} ×</span>`).join('');
    const addSt = stitky.filter(s => !(z.stitky||[]).find(x=>x.id===s.id)).map(s =>
      `<option value="${s.id}">${s.nazev}</option>`).join('');
    const stPick = addSt ? `<select class="kan-input" style="width:auto;font-size:.65rem;padding:1px 4px" onchange="_kanAddStitok(${z.id},this)"><option value="">+ štítek</option>${addSt}</select>` : '';
    const hotovo = z.vyrobni_zakazka_id;
    const datum = (z.created_at||'').slice(0,10);
    const prioStyle = (_KAN_PRIO[z.priorita]||{bg:'#e5e7eb',fg:'#374151'});

    return `<tr class="border-b border-gray-50 hover:bg-gray-50/50" style="${!z.aktivni?'opacity:.5':''}">
      <td class="text-xs text-gray-400 whitespace-nowrap">${datum}</td>
      <td style="min-width:160px">
        <span class="font-medium text-blue-600 hover:underline cursor-pointer" onclick="kanDetail(${z.id})" title="Otevřít detail">${z.nazev||'<em class=text-gray-400>bez názvu</em>'}</span>
      </td>
      <td style="min-width:130px">
        ${_kanInlineText(z.id,'zakaznik',z.zakaznik,'Zákazník')}
        <div class="flex gap-1 mt-0.5">
          ${_kanInlineText(z.id,'tel',z.tel,'Tel')}
          ${_kanInlineText(z.id,'mail',z.mail,'Mail')}
        </div>
      </td>
      <td style="min-width:90px">${_kanInlineText(z.id,'hn_kod',z.hn_kod,'HN kód')}</td>
      <td>${_kanInlineSel(z.id,'resitel_id',z.resitel_id,uzOpts)}</td>
      <td>
        <select class="kan-input" data-id="${z.id}" data-field="priorita" onchange="_kanBlur(this)"
          style="background:${prioStyle.bg};color:${prioStyle.fg};font-weight:600;font-size:.72rem;border-radius:6px;padding:2px 6px">
          ${prioOpts.map(o=>`<option value="${o.v}" ${z.priorita==o.v?'selected':''}>${o.l}</option>`).join('')}
        </select>
      </td>
      <td>
        <div class="flex flex-wrap gap-1 items-center">${sB}${stPick}</div>
      </td>
      <td>${_kanInlineSel(z.id,'co_hotovo',z.co_hotovo||'',stavOpts)}</td>
      <td>
        <input type="checkbox" ${z.aktivni!=0?'checked':''} title="Aktivní"
          onchange="_kanSaveField(${z.id},'aktivni',this.checked?1:0)">
      </td>
      <td onclick="event.stopPropagation()" class="whitespace-nowrap">
        ${hotovo
          ? `<span class="badge" style="background:#dcfce7;color:#15803d;font-size:.65rem">Výroba #${z.vyrobni_zakazka_id}</span>`
          : `<button class="btn btn-success" style="padding:2px 8px;font-size:.72rem" onclick="kanPrevestModal(${z.id})">→ Výroba</button>`}
        <button class="btn btn-primary" style="padding:2px 8px;font-size:.72rem" onclick="kanDetail(${z.id})">Detail</button>
        <button class="btn btn-danger" style="padding:2px 8px;font-size:.72rem" onclick="_kanDelete(${z.id})">✕</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="10" class="text-center text-gray-400 py-10">Žádné záznamy${_kanStitkFilter.length?' pro vybraný filtr':''}</td></tr>`;

  setContent(`
    <style>
      .kan-input{width:100%;background:transparent;border:1px solid transparent;border-radius:4px;padding:2px 5px;font-size:.8rem;color:inherit;font-family:inherit}
      .kan-input:hover{border-color:#d1d5db;background:white}
      .kan-input:focus{border-color:#3b82f6;background:white;outline:none}
    </style>
    <div class="flex items-center justify-between mb-3">
      <div>
        <h2 class="text-xl font-bold text-gray-800">${_kanShowInactive ? 'Neaktivní zakázky' : 'Příprava zakázek'}</h2>
        <p class="text-sm text-gray-400">${filtered.length} z ${zakazky.length} záznamů</p>
      </div>
    </div>
    <div class="card" style="overflow-x:auto">
      <table class="w-full tbl-sort" style="min-width:900px">
        <thead><tr>
          <th>Datum</th><th>Název zakázky</th><th>Zákazník / Kontakt</th><th>HN kód</th>
          <th>Řeší</th><th>Priorita</th><th class="no-sort">Štítky</th>
          <th>Stav</th><th class="no-sort">✓</th><th class="no-sort">Akce</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`);
}

async function _kanRemoveStitok(zakId, stitokId) {
  const z = window._kanData?.zakazky?.find(x => x.id === zakId);
  if (!z) return;
  const ids = (z.stitky||[]).map(s=>s.id).filter(id => id !== stitokId);
  await _kanSaveStitky(zakId, ids);
  _kanRender();
}

async function _kanAddStitok(zakId, sel) {
  const stitokId = parseInt(sel.value);
  if (!stitokId) return;
  sel.value = '';
  const z = window._kanData?.zakazky?.find(x => x.id === zakId);
  if (!z) return;
  const ids = [...new Set([...(z.stitky||[]).map(s=>s.id), stitokId])];
  await _kanSaveStitky(zakId, ids);
  _kanRender();
}

// ── KANCELÁŘ – NOVÁ ZAKÁZKA ──────────────────────────────────────────────

async function kanNovaModal() {
  const { stitky, uzivatele, stavList } = window._kanData || {};
  const allSt = stitky || (await api('/api/kancelar/stitky')).stitky || [];
  const allUz = uzivatele || (await api('/api/uzivatele')).uzivatele || [];
  const allStav = stavList || (await api('/api/kancelar/stav-hotovo')).items || [];

  const uzEl = `<option value="">— Nepřiřazeno —</option>` +
    allUz.filter(u=>u.aktivni).map(u=>`<option value="${u.id}">${u.jmeno}</option>`).join('');
  const prioEl = ['Řešit okamžitě','Vysoká','Střední','Nízká'].map(p=>
    `<option value="${p}" ${p==='Střední'?'selected':''}>${p}</option>`).join('');
  const stavEl = `<option value="">—</option>` + allStav.map(s=>`<option value="${s.nazev}">${s.nazev}</option>`).join('');
  const stEl = allSt.filter(s=>s.aktivni).map(s=>`
    <label class="flex items-center gap-2 cursor-pointer py-1 px-2 rounded hover:bg-gray-50">
      <input type="checkbox" class="kan-st-chk" value="${s.id}"> ${_kanStitkBadge(s)}
    </label>`).join('');

  openModal(`
    <h3 class="text-lg font-bold mb-4">Nová kancelářská zakázka</h3>
    <div class="grid grid-cols-2 gap-3 mb-3">
      <div class="col-span-2"><label class="text-xs text-gray-500 block mb-1">Název zakázky *</label>
        <input id="kf-nazev" class="input" placeholder="Např. Rack 12U – Divadlo Brno"></div>
      <div><label class="text-xs text-gray-500 block mb-1">Zákazník</label>
        <input id="kf-zakaznik" class="input" placeholder="Firma / jméno"
          oninput="_kanZakaznikAutofill(this.value)" list="kan-zakaznici-list">
        <datalist id="kan-zakaznici-list"></datalist></div>
      <div><label class="text-xs text-gray-500 block mb-1">HN kód</label>
        <input id="kf-hn" class="input" placeholder="HN123456"></div>
      <div><label class="text-xs text-gray-500 block mb-1">Telefon</label>
        <input id="kf-tel" class="input" placeholder="+420…"></div>
      <div><label class="text-xs text-gray-500 block mb-1">E-mail</label>
        <input id="kf-mail" class="input" placeholder="email@…"></div>
      <div><label class="text-xs text-gray-500 block mb-1">Priorita</label>
        <select id="kf-priorita" class="select">${prioEl}</select></div>
      <div><label class="text-xs text-gray-500 block mb-1">Řeší</label>
        <select id="kf-resitel" class="select">${uzEl}</select></div>
      <div><label class="text-xs text-gray-500 block mb-1">Termín</label>
        <input id="kf-termin" type="date" class="input"></div>
      <div><label class="text-xs text-gray-500 block mb-1">Stav (co je hotovo)</label>
        <select id="kf-stav" class="select">${stavEl}</select></div>
    </div>
    <div class="mb-3"><label class="text-xs text-gray-500 block mb-2">Štítky</label>
      <div class="flex flex-wrap gap-1 max-h-32 overflow-y-auto border border-gray-100 rounded-lg p-2">
        ${stEl || '<span class="text-gray-400 text-xs">Žádné štítky</span>'}
      </div>
    </div>
    <div class="flex gap-3 justify-end mt-4">
      <button class="btn btn-secondary" onclick="closeModal()">Zrušit</button>
      <button class="btn btn-primary" onclick="_kanSaveNew()">Uložit a otevřít detail</button>
    </div>`, true);

  // Načti zákazníky pro autocomplete
  _kanLoadZakaznici();
}

async function _kanLoadZakaznici() {
  const r = await api('/api/kancelar/zakaznici');
  const list = document.getElementById('kan-zakaznici-list');
  if (list) list.innerHTML = (r.zakaznici||[]).map(z=>`<option value="${_kanEsc(z.nazev)}" data-tel="${_kanEsc(z.tel||'')}" data-mail="${_kanEsc(z.mail||'')}">`).join('');
}

async function _kanZakaznikAutofill(val) {
  const opts = document.querySelectorAll('#kan-zakaznici-list option');
  for (const o of opts) {
    if (o.value === val) {
      const tel  = document.getElementById('kf-tel');
      const mail = document.getElementById('kf-mail');
      if (tel  && !tel.value  && o.dataset.tel)  tel.value  = o.dataset.tel;
      if (mail && !mail.value && o.dataset.mail) mail.value = o.dataset.mail;
      break;
    }
  }
}

async function _kanSaveNew() {
  const nazev = document.getElementById('kf-nazev')?.value?.trim();
  if (!nazev) return alert('Zadej název zakázky.');
  const body = {
    nazev,
    zakaznik:   document.getElementById('kf-zakaznik')?.value?.trim() || '',
    tel:        document.getElementById('kf-tel')?.value?.trim() || '',
    mail:       document.getElementById('kf-mail')?.value?.trim() || '',
    hn_kod:     document.getElementById('kf-hn')?.value?.trim() || '',
    priorita:   document.getElementById('kf-priorita')?.value || 'Střední',
    resitel_id: parseInt(document.getElementById('kf-resitel')?.value) || null,
    termin:     document.getElementById('kf-termin')?.value || null,
    co_hotovo:  document.getElementById('kf-stav')?.value || null,
    stitky:     [...document.querySelectorAll('.kan-st-chk:checked')].map(c=>parseInt(c.value)),
  };
  const r = await api('/api/kancelar/zakazky', 'POST', body);
  if (r.error) return alert('Chyba: ' + r.error);
  closeModal();
  _cache.kancelar = null;
  kanDetail(r.zakazka.id);
}

async function _kanDelete(id) {
  if (!confirm('Smazat zakázku včetně poznámek a příloh? Nelze vzít zpět.')) return;
  await api(`/api/kancelar/zakazky/${id}`, 'DELETE');
  _cache.kancelar = null;
  kancelar();
}

async function kanDetail(id) {
  setFilter('');
  setContent('<div class="text-center py-16 text-gray-400">Načítám detail…</div>');

  const [rZ, rPoz, rPril, rUz, rSt, rStav, rTypy] = await Promise.all([
    api(`/api/kancelar/zakazky/${id}`),
    api(`/api/kancelar/zakazky/${id}/poznamky`),
    api(`/api/kancelar/zakazky/${id}/prilohy`),
    api('/api/uzivatele'),
    api('/api/kancelar/stitky'),
    api('/api/kancelar/stav-hotovo'),
    api('/api/typy-casu?limit=2000'),
  ]);

  const z       = rZ.zakazka;
  const poznamky = rPoz.poznamky || [];
  const prilohy  = rPril.prilohy || [];
  const uzivatele = rUz.uzivatele || [];
  const stitky   = (rSt.stitky||[]).filter(s=>s.aktivni);
  const stavList  = rStav.items || [];
  // HN z BOM — seřazeno podle hn_cislo
  const hnTypy   = (rTypy.items || []).sort((a,b)=>(a.hn_cislo||'').localeCompare(b.hn_cislo||''));

  if (!z) return setContent('<div class="text-center py-16 text-red-400">Zakázka nenalezena</div>');

  const uzEl = `<option value="">—</option>` +
    uzivatele.filter(u=>u.aktivni).map(u=>`<option value="${u.id}" ${z.resitel_id==u.id?'selected':''}>${u.jmeno}</option>`).join('');
  const prioEl = ['Řešit okamžitě','Vysoká','Střední','Nízká'].map(p=>
    `<option value="${p}" ${z.priorita==p?'selected':''}>${p}</option>`).join('');
  const stavEl = `<option value="">—</option>` +
    stavList.map(s=>`<option value="${s.nazev}" ${z.co_hotovo==s.nazev?'selected':''}>${s.nazev}</option>`).join('');
  const selSt = new Set((z.stitky||[]).map(s=>s.id));
  const stEl = stitky.map(s=>`
    <label class="flex items-center gap-2 cursor-pointer py-0.5 px-2 rounded hover:bg-gray-50">
      <input type="checkbox" class="kd-st-chk" value="${s.id}" ${selSt.has(s.id)?'checked':''}> ${_kanStitkBadge(s)}
    </label>`).join('');

  const pozHtml = poznamky.map(p => `
    <div class="border border-gray-100 rounded-xl p-4 mb-3 relative group" id="poz-${p.id}">
      <div class="text-xs text-gray-400 mb-2">${p.uzivatel||''} ${(p.updated_at||p.created_at||'').slice(0,16)}</div>
      <div class="prose text-sm" id="poz-obsah-${p.id}" contenteditable="true"
        style="min-height:40px;outline:none;border-radius:6px;padding:4px"
        onblur="_kanSavePoz(${p.id}, this)"
        onpaste="_kanHandlePaste(event, this)">${p.obsah||''}</div>
      <button class="btn btn-danger absolute top-2 right-2 opacity-0 group-hover:opacity-100"
        style="padding:2px 8px;font-size:.72rem" onclick="_kanDeletePoz(${p.id})">✕</button>
    </div>`).join('');

  const prilohaHtml = prilohy.map(f => {
    const kb = Math.round((f.velikost||0)/1024);
    const isImg = (f.mime_type||'').startsWith('image/');
    return `<div class="flex items-center gap-2 py-2 border-b border-gray-50 group">
      ${isImg ? `<img src="/api/kancelar/prilohy/${f.id}/download" class="w-10 h-10 object-cover rounded cursor-pointer" onclick="window.open('/api/kancelar/prilohy/${f.id}/download')">` : `<div class="w-10 h-10 bg-gray-100 rounded flex items-center justify-center text-gray-400 text-xl">📎</div>`}
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate">${f.filename}</div>
        <div class="text-xs text-gray-400">${kb} KB · ${(f.created_at||'').slice(0,10)}</div>
      </div>
      <a href="/api/kancelar/prilohy/${f.id}/download" class="btn btn-secondary" style="padding:2px 10px;font-size:.75rem">↓</a>
      <button class="btn btn-danger opacity-0 group-hover:opacity-100" style="padding:2px 8px;font-size:.72rem"
        onclick="_kanDeletePriloha(${f.id})">✕</button>
    </div>`;
  }).join('');

  const prio = _KAN_PRIO[z.priorita] || {bg:'#e5e7eb',fg:'#374151'};

  // HN select options — prázdná volba + všechny typy z BOM
  const hnOptions = `<option value="">— bez HN —</option>` +
    hnTypy.map(t => {
      const val = _kanEsc(t.hn_cislo||'');
      const sel = (z.hn_kod||'') === (t.hn_cislo||'') ? 'selected' : '';
      return `<option value="${val}" ${sel}>${t.hn_cislo} – ${_kanEsc(t.nazev||'')}</option>`;
    }).join('');

  setContent(`
    <div class="max-w-4xl mx-auto">
      <!-- Záhlaví -->
      <div class="flex items-center gap-3 mb-4">
        <button class="btn btn-secondary" onclick="_cache.kancelar=null;kancelar()">← Zpět</button>
        ${z.nabidka_id
          ? `<button class="btn text-sm flex-shrink-0" style="background:#dbeafe;color:#1d4ed8"
               onclick="nabidkaDetail(${z.nabidka_id})" title="Otevřít nabídku">
               💰 Nabídka #${z.nabidka_id}</button>`
          : ''}
        <div class="flex-1">
          <input id="kd-nazev" class="text-2xl font-bold text-gray-800 w-full border-0 border-b-2 border-transparent hover:border-gray-200 focus:border-blue-400 focus:outline-none bg-transparent"
            value="${_kanEsc(z.nazev)}" onblur="_kanSaveDetailField(${id},'nazev',this.value)">
        </div>
        <span class="text-xs text-gray-400">#${z.id} · ${(z.created_at||'').slice(0,10)}</span>
      </div>

      <!-- Přílohy — nahoře v hlavičce -->
      <div class="card p-4 mb-4" style="border-left:4px solid #3b82f6">
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-bold text-gray-800">📎 Přílohy <span class="text-xs font-normal text-gray-400">(${prilohy.length})</span></h3>
          <label class="btn btn-secondary cursor-pointer" style="padding:4px 14px;font-size:.8rem">
            + Nahrát <input type="file" multiple class="hidden" onchange="_kanUploadPriloha(${id}, this)">
          </label>
        </div>
        <div id="kan-pril-list">
          ${prilohy.length ? prilohaHtml : '<p class="text-gray-400 text-sm py-1">Žádné přílohy.</p>'}
        </div>
      </div>

      <!-- Pole zakázky -->
      <div class="card p-5 mb-4">
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="text-xs text-gray-500 block mb-1">Zákazník</label>
            <input class="input" value="${_kanEsc(z.zakaznik||'')}" list="kd-zakaznici-list"
              onblur="_kanSaveDetailField(${id},'zakaznik',this.value)">
            <datalist id="kd-zakaznici-list"></datalist>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Telefon</label>
            <input class="input" value="${_kanEsc(z.tel||'')}"
              onblur="_kanSaveDetailField(${id},'tel',this.value)">
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">E-mail</label>
            <input class="input" value="${_kanEsc(z.mail||'')}"
              onblur="_kanSaveDetailField(${id},'mail',this.value)">
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">HN (z BOM)</label>
            <select class="select" id="kd-hn-select"
              onchange="_kanSaveDetailField(${id},'hn_kod',this.value||null)">
              ${hnOptions}
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Termín</label>
            <input type="date" class="input" value="${z.termin||''}"
              onchange="_kanSaveDetailField(${id},'termin',this.value)">
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Aktivní</label>
            <label class="flex items-center gap-2 mt-2 cursor-pointer">
              <input type="checkbox" ${z.aktivni!=0?'checked':''} onchange="_kanSaveDetailField(${id},'aktivni',this.checked?1:0)">
              <span class="text-sm">${z.aktivni!=0?'Aktivní':'Neaktivní'}</span>
            </label>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Priorita</label>
            <select class="select" onchange="_kanSaveDetailField(${id},'priorita',this.value)"
              style="background:${prio.bg};color:${prio.fg};font-weight:600">
              ${prioEl}
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Řeší</label>
            <select class="select" onchange="_kanSaveDetailField(${id},'resitel_id',this.value||null)">${uzEl}</select>
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Stav (co je hotovo)</label>
            <select class="select" onchange="_kanSaveDetailField(${id},'co_hotovo',this.value||null)">${stavEl}</select>
          </div>
          <div class="col-span-3">
            <label class="text-xs text-gray-500 block mb-2">Štítky</label>
            <div class="flex flex-wrap gap-1 border border-gray-100 rounded-lg p-2">${stEl||'<span class="text-gray-400 text-xs">Žádné štítky</span>'}</div>
          </div>
          <div class="col-span-3 flex gap-3">
            ${!z.vyrobni_zakazka_id
              ? `<button class="btn btn-success" onclick="kanPrevestModal(${id})">→ Převést na výrobní zakázku</button>`
              : `<span class="badge" style="background:#dcfce7;color:#15803d">→ Výrobní zakázka #${z.vyrobni_zakazka_id}</span>`}
            <button class="btn btn-danger" onclick="_kanDeleteDetail(${id})">🗑 Smazat zakázku</button>
          </div>
        </div>
      </div>

      <!-- Poznámky -->
      <div class="card p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-bold text-gray-800">📝 Poznámky</h3>
          <button class="btn btn-primary" style="padding:4px 14px;font-size:.8rem" onclick="_kanAddPoz(${id})">+ Přidat poznámku</button>
        </div>
        <div id="kan-poz-list">${pozHtml || '<p class="text-gray-400 text-sm text-center py-4">Zatím žádné poznámky. Klikněte na + Přidat poznámku.</p>'}</div>
      </div>
    </div>`);

  // Autocomplete zákazníků

function _kanHandlePaste(e, el) {
  const items = (e.clipboardData || window.clipboardData).items;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const reader = new FileReader();
      reader.onload = ev => {
        const img = document.createElement('img');
        img.src = ev.target.result;
        img.style.maxWidth = '100%';
        img.style.borderRadius = '6px';
        img.style.margin = '4px 0';
        const sel = window.getSelection();
        if (sel.rangeCount) {
          const range = sel.getRangeAt(0);
          range.collapse(false);
          range.insertNode(img);
        } else {
          el.appendChild(img);
        }
      };
      reader.readAsDataURL(item.getAsFile());
      return;
    }
  }
}

async function _kanUploadPriloha(zakId, input) {
  const files = input.files;
  if (!files.length) return;
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    const r = await fetch(`/api/kancelar/zakazky/${zakId}/prilohy`, { method: 'POST', body: fd });
    const data = await r.json();
    if (data.error) { alert('Chyba: ' + data.error); continue; }
    const f = data.priloha;
    const kb = Math.round((f.velikost||0)/1024);
    const isImg = (f.mime_type||'').startsWith('image/');
    const list = document.getElementById('kan-pril-list');
    const empty = list.querySelector('p');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.innerHTML = `<div class="flex items-center gap-2 py-2 border-b border-gray-50 group">
      ${isImg ? `<img src="/api/kancelar/prilohy/${f.id}/download" class="w-10 h-10 object-cover rounded cursor-pointer" onclick="window.open('/api/kancelar/prilohy/${f.id}/download')">` : `<div class="w-10 h-10 bg-gray-100 rounded flex items-center justify-center text-gray-400 text-xl">📎</div>`}
      <div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">${f.filename}</div><div class="text-xs text-gray-400">${kb} KB</div></div>
      <a href="/api/kancelar/prilohy/${f.id}/download" class="btn btn-secondary" style="padding:2px 10px;font-size:.75rem">↓</a>
      <button class="btn btn-danger opacity-0 group-hover:opacity-100" style="padding:2px 8px;font-size:.72rem" onclick="_kanDeletePriloha(${f.id})">✕</button>
    </div>`;
    list.appendChild(div);
  }
  input.value = '';
}

async function _fakAresLookup() {
  const ico = (document.getElementById('fak-ico-input')?.value || '').trim().replace(/\D/g,'');
  if (!ico) return;
  const st = document.getElementById('fak-ares-status');
  if (st) st.innerHTML = '<span class="text-blue-500">Hledám v ARES…</span>';

  if (r.error) {
    if (st) st.innerHTML = `<span class="text-red-500">❌ ${r.error}</span>`;
    return;
  }
  document.getElementById('fak-odb-nazev').value = r.nazev || '';
