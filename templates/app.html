function _fakRowToggle(idx) {
  _fakUpdateSouhrn();
}

function _fakRecalcRow(idx) {
  const ksEl = document.getElementById(`fak-ks-${idx}`);
  if (!ksEl) return;
  const ks = parseInt(ksEl.value) || 1;
  const cd = parseFloat(ksEl.dataset.cena_dilu) || 0;
  const cv = parseFloat(ksEl.dataset.cena_vyroby) || 0;
  const mj   = (cd + cv) * 1.047;
  const zak  = mj * ks;
  const cel  = zak * 1.21;
  const mje = document.getElementById(`fak-mj-${idx}`);
  const zake = document.getElementById(`fak-zaklad-${idx}`);
  const cele = document.getElementById(`fak-celkem-${idx}`);
  if (mje) mje.textContent = fmt(mj) + ' Kč';
  if (zake) zake.textContent = fmt(zak) + ' Kč';
  if (cele) cele.textContent = fmt(cel) + ' Kč';
  _fakUpdateSouhrn();
}

function _fakUpdateSouhrn() {
  const rows = document.querySelectorAll('.fak-chk');
  let bezDph = 0, dphSuma = 0, sCelkem = 0;
  rows.forEach(chk => {
    if (!chk.checked) return;
    const idx = chk.dataset.idx;
    const ksEl = document.getElementById(`fak-ks-${idx}`);
    const ks = parseInt(ksEl?.value || 1);
    const cd = parseFloat(ksEl?.dataset.cena_dilu || 0);
    const cv = parseFloat(ksEl?.dataset.cena_vyroby || 0);
    const mj  = (cd + cv) * 1.047;
    const zak = mj * ks;
    const dph = zak * 0.21;
    bezDph  += zak;
    dphSuma += dph;
    sCelkem += zak + dph;
  });
  const el = id => document.getElementById(id);
  if (el('fak-s-bezDph')) el('fak-s-bezDph').textContent = fmt(bezDph) + ' Kč';
  if (el('fak-s-dph'))    el('fak-s-dph').textContent    = fmt(dphSuma) + ' Kč';
  if (el('fak-s-celkem')) el('fak-s-celkem').textContent = fmt(sCelkem) + ' Kč';
}

async function _odesliFakturu() {
  const rows = document.querySelectorAll('.fak-chk');
  const polozky = [];
  rows.forEach(chk => {
    if (!chk.checked) return;
    const idx = chk.dataset.idx;
    const ksEl = document.getElementById(`fak-ks-${idx}`);
    polozky.push({
      zakazka_id:  parseInt(ksEl?.dataset.zak_id || 0) || null,
      hn_cislo:    ksEl?.dataset.hn || '',
      nazev:       ksEl?.dataset.nazev || '',
      ks:          parseInt(ksEl?.value || 1),
      cena_dilu:   parseFloat(ksEl?.dataset.cena_dilu || 0),
      cena_vyroby: parseFloat(ksEl?.dataset.cena_vyroby || 0),
    });
  });
  if (polozky.length === 0) return alert('Vyberte alespoň jednu zakázku.');
  const poznamka = document.getElementById('fak-poznamka')?.value || '';
  const odberatel = {
    nazev: document.getElementById('fak-odb-nazev')?.value || '',
    ulice: document.getElementById('fak-odb-ulice')?.value || '',
    mesto: document.getElementById('fak-odb-mesto')?.value || '',
    ic:    document.getElementById('fak-odb-ic')?.value    || '',
    dic:   document.getElementById('fak-odb-dic')?.value   || '',
  };
  const r = await api('/api/faktury', 'POST', { polozky, poznamka, odberatel });
  if (r.error) return alert('Chyba: ' + r.error);
  closeModal();
  // Otevři PDF v nové záložce
  window.open(`/api/faktury/${r.faktura.id}/pdf`, '_blank');
  // Obnov seznam
  _cache.fakturace = null;
  fakturace();
}

async function fakturaMenStav(id, stav) {
  if (!confirm(`Změnit stav faktury na "${stav}"?`)) return;
  const r = await api(`/api/faktury/${id}/stav`, 'POST', { stav });
  if (r.error) return alert('Chyba: ' + r.error);
  closeModal();
  _cache.fakturace = null;
  fakturace();
}

// ── AKTUALIZACE SYSTÉMU ───────────────────────────────────────────────────

async function spustAktualizaci() {
  const btn = document.getElementById('update-btn');
  const log = document.getElementById('update-log');
  if (!btn || !log) return;

  if (!confirm('Spustit aktualizaci systému?\n\nServer se krátce restartuje — stránka se sama obnoví.')) return;

  // UI: spouštíme
  btn.disabled = true;
  btn.innerHTML = '⏳ Spouštím…';
  log.className = 'mt-4';
  log.innerHTML = `
    <div class="bg-gray-900 text-green-400 rounded-lg p-4 font-mono text-xs space-y-1">
      <div>▶ Spouštím databázové migrace…</div>
    </div>`;

  const addLog = (text, cls='text-green-400') => {
    const box = log.querySelector('div');
    if (box) box.innerHTML += `<div class="${cls}">${text}</div>`;
  };

  let migraceOk = false;
  try {
    const r = await fetch('/api/aktualizace', { method: 'POST',
      headers: {'Content-Type':'application/json'}, body: '{}' });
    const data = await r.json();
    migraceOk = data.ok;
    // Zobraz výstup migrace
    (data.vystup || '').split('\n').filter(l => l.trim()).forEach(line => {
      const cls = line.includes('✓') ? 'text-green-400'
                : line.includes('Chyba') || line.includes('Error') ? 'text-red-400'
                : 'text-gray-400';
      addLog(line, cls);
    });
    if (migraceOk) {
      addLog('✓ Migrace dokončena', 'text-green-300 font-bold');
      addLog('🔄 Restartuji server…', 'text-yellow-400');
    } else {
      addLog('✗ Migrace selhala!', 'text-red-400 font-bold');
    }
  } catch(e) {
    addLog('Server se restartuje…', 'text-yellow-400');
    migraceOk = true; // server mohl zastavit dřív než odeslal odpověď
  }

  if (!migraceOk) {
    btn.disabled = false;
    btn.innerHTML = '🔄 Aktualizovat systém';
    return;
  }

  // Čekej než server naběhne zpět
  addLog('⏳ Čekám na obnovení serveru…', 'text-yellow-400');
  btn.innerHTML = '⏳ Čekám na server…';

  let pokusy = 0;
  const maxPokusu = 30;  // max 15 sekund
  const interval = setInterval(async () => {
    pokusy++;
    try {
      const ping = await fetch('/api/ping', {cache:'no-store'});
      if (ping.ok) {
        clearInterval(interval);
        addLog('✓ Server běží!', 'text-green-300 font-bold');
        addLog('↺ Obnuji stránku…', 'text-blue-400');
        setTimeout(() => location.reload(), 800);
      }
    } catch(_) {
      // server ještě neběží, čekáme dál
    }
    if (pokusy >= maxPokusu) {
      clearInterval(interval);
      addLog('⚠ Server nereaguje — obnovte stránku ručně (F5)', 'text-red-400');
      btn.disabled = false;
      btn.innerHTML = '🔄 Aktualizovat systém';
    }
  }, 500);
}

let _cncStavFiltr = 'Čeká';

async function cnc() {
  setContent('<div class="text-center py-16 text-gray-400">⏳ Načítám CNC přehled...</div>');

  setFilter(`
    <div class="flex flex-wrap items-center gap-3 px-6 py-3">
      <span class="text-sm font-medium text-gray-600">Zobrazit:</span>
      <div id="cnc-stavy" class="flex gap-1 flex-wrap">
        ${[
          ['Čeká',                    'Čeká na řezání'],
          ['CNC hotovo,Výroba',       'CNC hotovo'],
          ['Čeká,CNC hotovo,Výroba',  'Všechny casy'],
        ].map(([val, label]) =>
          '<button class="tab-btn' + (val === _cncStavFiltr ? ' active' : '') + '" ' +
          'onclick="_cncSetStav(this,\'' + val + '\')">' + label + '</button>'
        ).join('')}
      </div>
      <button class="btn btn-primary ml-auto" onclick="cnc()">🔄 Obnovit</button>
    </div>
  `);

  await _cncLoad();
}

async function _cncSetStav(btn, val) {
  document.querySelectorAll('#cnc-stavy .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _cncStavFiltr = val;
  await _cncLoad();
}

async function _cncLoad() {
  const url = '/api/cnc?stav=' + encodeURIComponent(_cncStavFiltr);
  const r = await api(url).catch(err => ({ error: String(err) }));
  if (r.error) {
    setContent('<div class="text-center py-16 text-red-400">⚠ Chyba serveru: ' + r.error +
      '<br><small class="text-gray-400 mt-2 block">Zkuste restartovat server (Nastavení → Aktualizovat systém)</small></div>');
    return;
  }
  const items = r.items || [];

  if (items.length === 0) {
    setContent('<div class="text-center py-16 text-gray-400">Žádné zakázky v tomto stavu ✓</div>');
    return;
  }

  // Barva chipu podle názvu materiálu
  function _cncMatStyle(nazev) {
    const n = (nazev || '').toLowerCase();
    if (n.includes('prémio') || n.includes('premium')) return 'background:#fee2e2;color:#991b1b'; // prémiové — červená
    if (n.includes('natural'))  return 'background:#fed7aa;color:#c2410c';   // natural — žluto-oranžová
    if (n.includes('plast'))    return 'background:#fef9c3;color:#854d0e';   // plastové — žlutá
    if (n.includes('fenol'))    return 'background:#f5dfc0;color:#7c2d12';   // fenol — hnědá
    if (n.includes('pěna') || n.includes('pena')) return 'background:#e2e8f0;color:#475569'; // pěny — šedá
    return 'background:#dbeafe;color:#1d4ed8'; // ostatní desky — modrá
  }

  const rows = items.map(z => {
    const dnes = new Date().toISOString().slice(0,10);
    const isPrio = z.prioritni == 1;
    const prioIcon = isPrio ? '<span class="text-amber-500 font-bold mr-1" title="Prioritní">★</span>' : '';
    const terminClass = z.termin && z.termin < dnes && !['Hotovo','Expedováno'].includes(z.stav)
      ? 'text-red-600 font-bold' : 'text-gray-500';

    // Materiály – informativní seznam (jen desky a pěny, bez zaškrtávání)
    const deskyChips = (z.desky_mats||[]).map(n => '<span style="' + _cncMatStyle(n) + ';font-size:.72rem;padding:2px 7px;border-radius:4px;font-weight:500">' + n + '</span>');
    const penyChips  = (z.peny_mats  ||[]).map(n => '<span style="' + _cncMatStyle(n) + ';font-size:.72rem;padding:2px 7px;border-radius:4px;font-weight:500">' + n + '</span>');
    const allChips = [...deskyChips, ...penyChips];
    const matInfo = allChips.length === 0
      ? '<span class="text-xs text-gray-400 italic">BOM nenastaven</span>'
      : '<div class="flex flex-wrap gap-1">' + allChips.join('') + '</div>';

    // Checklist – 3 podmíněné položky (Desky / Podvozky / Pěny)
    const cl = z.checklist || {};
    const checkItems = [];
    if (z.has_desky)    checkItems.push({ label: 'Desky',    key: '_DESKY_',    val: cl.desky });
    if (z.has_podvozky) checkItems.push({ label: 'Podvozky', key: '_PODVOZKY_', val: cl.podvozky });
    if (z.has_peny)     checkItems.push({ label: 'Pěny',     key: '_PENY_',     val: cl.peny });

    const checklistHtml = checkItems.length === 0
      ? '<span class="text-xs text-gray-400 italic">–</span>'
      : checkItems.map(item => {
          const chk = item.val ? 'checked' : '';
          const lbl = item.val ? 'line-through text-gray-400' : 'text-gray-700';
          return '<label class="flex items-center gap-1.5 cursor-pointer select-none">' +
            '<input type="checkbox" ' + chk + ' onchange="cncToggle(' + z.id + ',\'' + item.key + '\',this.checked)">' +
            '<span class="text-sm ' + lbl + '">' + item.label + '</span>' +
          '</label>';
        }).join('');

    // Progress
    const celkem = z.cnc_celkem;
    const hotovo = z.cnc_hotovo;
    const allDone = celkem > 0 && hotovo === celkem;
    const noBom   = celkem === 0;
    const progressTxt = noBom
      ? '<span class="text-xs text-gray-400">bez BOM</span>'
      : '<span class="text-xs ' + (allDone ? 'text-green-600 font-semibold' : 'text-gray-500') + '">' + hotovo + '/' + celkem + '</span>';

    // Tlačítka akcí — bez hromadného "Vše vyřezáno"
    // "CNC hotovo" se zpřístupní jen když jsou všechny položky zaškrtnuté (nebo BOM není nastaven)
    const cncReadyToFinish = noBom || allDone;
    const btnCncHotovo = z.stav === 'Čeká'
      ? cncReadyToFinish
        ? '<button class="btn text-xs py-1 px-2" style="background:#f3e8ff;color:#7c3aed" ' +
          'onclick="cncZmenaStavu(' + z.id + ',\'CNC hotovo\')">⚙ CNC hotovo</button>'
        : '<button class="btn text-xs py-1 px-2" disabled title="Nejprve zaškrtněte všechny kategorie" ' +
          'style="background:#f1f5f9;color:#94a3b8;cursor:not-allowed;opacity:.5">⚙ CNC hotovo</button>'
      : z.stav === 'CNC hotovo'
      ? '<button class="btn text-xs py-1 px-2 btn-warning" onclick="cncZmenaStavu(' + z.id + ',\'Výroba\')">→ Výroba</button>'
      : '';

    const cncPozn = z.poznamka_cnc
      ? '<p class="text-xs text-blue-600 mt-1">⚙ ' + z.poznamka_cnc + '</p>' : '';

    // Stav badge — viditelný přímo v řádku, aby bylo jasné v jakém stavu case je
    const stavColors = {'Čeká':'background:#dbeafe;color:#1d4ed8','CNC hotovo':'background:#ede9fe;color:#7c3aed','Výroba':'background:#fef3c7;color:#92400e','Hotovo':'background:#dcfce7;color:#15803d','Zkontrolováno':'background:#f0fdf4;color:#166534','Expedováno':'background:#f1f5f9;color:#475569'};
    const stavBadgeCnc = '<span style="' + (stavColors[z.stav]||'background:#f1f5f9;color:#475569') + ';font-size:.68rem;padding:2px 7px;border-radius:999px;font-weight:600;white-space:nowrap">' + (z.stav||'?') + '</span>';

    return '<tr class="' + (isPrio ? 'prioritni-row' : '') + '">' +
      '<td class="font-mono text-xs text-blue-600 font-semibold">' + prioIcon + (z.hn_cislo||'–') + '<br>' + stavBadgeCnc + '</td>' +
      '<td class="font-medium text-gray-800">' + (z.case_nazev||z.nazev||'–') +
        (z.zakaznik ? '<p class="text-xs text-gray-400">' + z.zakaznik + '</p>' : '') + cncPozn + '</td>' +
      '<td class="text-center font-semibold">' + z.pocet_ks + '</td>' +
      '<td class="text-xs ' + terminClass + '">' + (z.termin||'–') + '</td>' +
      '<td class="max-w-xs">' + matInfo + '</td>' +
      '<td><div class="flex flex-col gap-1.5 py-0.5">' + checklistHtml + '</div></td>' +
      '<td class="text-center">' + progressTxt + '</td>' +
      '<td class="text-right"><div class="flex gap-1 justify-end flex-wrap">' + btnCncHotovo + '</div></td>' +
    '</tr>';
  });

  setContent(`
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-2xl font-bold text-gray-800">CNC přehled
        <span class="text-base font-normal text-gray-400 ml-2">${items.length} zakázek</span>
      </h2>
    </div>
    <div class="card overflow-auto">
      <table class="w-full">
        <thead><tr>
          <th>HN</th><th>Název / Zákazník</th><th class="text-center">Ks</th>
          <th>Termín</th><th>Materiály (info)</th>
          <th>Checklist</th><th class="text-center">Splněno</th><th class="text-right">Akce</th>
        </tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    </div>
    <p class="text-xs text-gray-400 mt-2">
      Zaškrtávejte kategorie po dokončení řezání. Stav zakázky měňte tlačítkem – nebo přes Detail zakázky.
    </p>
  `);
}

async function cncToggle(zakId, matKod, rezano) {
  await api('/api/cnc/' + zakId + '/toggle', 'POST', { material_kod: matKod, rezano: rezano ? 1 : 0 });
  await _cncLoad();
}

async function cncToggleAll(zakId, kody, rezano, btn) {
  btn.disabled = true;
  await api('/api/cnc/' + zakId + '/toggle-all', 'POST', { rezano: rezano ? 1 : 0, material_kody: kody });
  await _cncLoad();
}

async function cncZmenaStavu(zakId, novyStav) {
  const r = await api('/api/zakazky/' + zakId, 'PUT', { stav: novyStav });
  if (r && r.error) {
    alert('Chyba při změně stavu: ' + r.error);
    return;
  }
  await _cncLoad();
}

async function nakupy() {
  setContent('<div class="text-center py-16 text-gray-400">Načítám...</div>');
  const dods = await api('/api/dodavatele');
  const dodItems = (dods.items || []).sort((a, b) => a.nazev.localeCompare(b.nazev));

      </select>
      <span class="text-sm font-medium text-gray-600 ml-4">Zásoby na:</span>
      <input type="number" class="input" style="width:80px" id="nak-dni" value="${_nakupyState.dni}" min="1" max="365"
             onchange="_nakupyLoad()" oninput="_nakupyLoad()">
      <span class="text-sm text-gray-500">dní</span>
      <span class="text-sm font-medium text-gray-600 ml-4">Okno spotřeby:</span>
      <select class="select" style="width:130px" id="nak-okno" onchange="_nakupyLoad()">
        <option value="30" ${_nakupyState.okno==30?'selected':''}>30 dní</option>
        <option value="60" ${_nakupyState.okno==60?'selected':''}>60 dní</option>
        <option value="90" ${_nakupyState.okno==90?'selected':''}>90 dní</option>
        <option value="180" ${_nakupyState.okno==180?'selected':''}>180 dní</option>
      </select>
      <button class="btn btn-primary ml-2" onclick="_nakupyLoad()">🔄 Načíst</button>
    </div>
  `);

  await _nakupyLoad();
}

async function _nakupyLoad() {
  // Načti hodnoty filtrů
  const dodEl  = document.getElementById('nak-dod');
  const dniEl  = document.getElementById('nak-dni');
  const oknoEl = document.getElementById('nak-okno');
  if (dodEl)  _nakupyState.dodavatel_id = dodEl.value;
  if (dniEl)  _nakupyState.dni  = parseInt(dniEl.value) || 30;
  if (oknoEl) _nakupyState.okno = parseInt(oknoEl.value) || 90;

  const { dni, okno, dodavatel_id } = _nakupyState;

  let url = '/api/nakupy/navrh?dni=' + dni + '&okno=' + okno;
  if (dodavatel_id) url += '&dodavatel_id=' + dodavatel_id;

  setContent('<div class="text-center py-16 text-gray-400">⏳ Počítám návrh objednávky...</div>');

  const r = await api(url).catch(() => ({ items: [] }));
  const items = r.items || [];
  _nakupyState.data = items;

  // Součty
  const celkemKusu = items.reduce((s, i) => s + (i.navrh_qty || 0), 0);
  const besSpotreby = items.filter(i => i.bez_spotreby).length;
  const podMin = items.filter(i => i.pod_min && !i.bez_spotreby).length;

  function urgBadge(dnu) {
    if (dnu === null || dnu === undefined) return '<span class="badge" style="background:#f1f5f9;color:#6b7280">bez dat</span>';
    if (dnu < 3)  return '<span class="badge" style="background:#fee2e2;color:#b91c1c">' + Math.round(dnu) + ' dní</span>';
    if (dnu < 7)  return '<span class="badge" style="background:#fee2e2;color:#dc2626">' + Math.round(dnu) + ' dní</span>';
    if (dnu < 14) return '<span class="badge" style="background:#fef3c7;color:#b45309">' + Math.round(dnu) + ' dní</span>';
    if (dnu < dni) return '<span class="badge" style="background:#fefce8;color:#ca8a04">' + Math.round(dnu) + ' dní</span>';
    return '<span class="badge" style="background:#dcfce7;color:#16a34a">' + Math.round(dnu) + ' dní</span>';
  }

  function rowColor(i) {
    if (i.bez_spotreby && i.pod_min) return 'bg-orange-50';
    if (i.bez_spotreby) return '';
    if (i.dnu_zasoby === null || i.dnu_zasoby < 3) return 'bg-red-50';
    if (i.dnu_zasoby < 7) return 'bg-red-50';
    if (i.dnu_zasoby < 14) return 'bg-orange-50';
    return '';
  }

  const tableRows = items.length === 0
    ? '<tr><td colspan="8" class="text-center text-gray-400 py-10">Vše v pořádku – zásoby jsou dostatečné ✓</td></tr>'
    : items.map(i => {
        const kodEsc = (i.kod || '').replace(/'/g, "\\'");
        const navrhKusu = i.navrh_qty > 0 ? '<strong>' + fmt(i.navrh_qty, 2) + '</strong> ' + (i.jednotka || '') : '<span class="text-gray-300">–</span>';
        const avgDen = i.avg_den > 0 ? fmt(i.avg_den, 3) + ' ' + (i.jednotka || '') + '/den' : '<span class="text-gray-400 text-xs">bez spotřeby</span>';
        return '<tr class="tr-hover ' + rowColor(i) + '">' +
          '<td class="font-mono text-xs text-gray-400">' + (i.kod || '') + '</td>' +
          '<td class="font-medium text-gray-800">' + (i.nazev || '') + '</td>' +
          '<td class="text-gray-500 text-sm">' + (i.dodavatel || '<span class="text-gray-300">–</span>') + '</td>' +
          '<td class="text-right">' + fmt(i.stav, 2) + ' ' + (i.jednotka || '') + '</td>' +
          '<td class="text-right text-sm">' + avgDen + '</td>' +
          '<td class="text-center">' + urgBadge(i.dnu_zasoby) + '</td>' +
          '<td class="text-right font-semibold text-blue-700">' + navrhKusu + '</td>' +
          '<td>' +
            (i.pod_min ? '<span class="badge text-xs" style="background:#fee2e2;color:#b91c1c">pod min.</span>' : '') +
            (i.bez_spotreby ? '<span class="badge text-xs ml-1" style="background:#f1f5f9;color:#6b7280">bez pohybu</span>' : '') +
          '</td>' +
        '</tr>';
      }).join('');

  setContent(`
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-2xl font-bold text-gray-800">Nákupy – návrh objednávky</h2>
      <div class="flex gap-2">

function _nakupyExport() {
  const items = _nakupyState.data;
  if (!items.length) return;
  const lines = ['SKU\tNázev\tDodavatel\tSkladem\tSpotřeba/den\tDní zásoby\tNavrhnout obj.\tJednotka'];
  items.forEach(i => {
    lines.push([
      i.kod,
      i.nazev,
      i.dodavatel || '',
      fmt(i.stav, 2),
      i.avg_den > 0 ? fmt(i.avg_den, 3) : '0',
      i.dnu_zasoby !== null ? Math.round(i.dnu_zasoby) : 'bez dat',
      i.navrh_qty > 0 ? fmt(i.navrh_qty, 2) : '0',
      i.jednotka || ''
    ].join('\t'));
  });
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('[onclick="_nakupyExport()"]');
    if (btn) { const orig = btn.innerHTML; btn.innerHTML = '✅ Zkopírováno!'; setTimeout(() => btn.innerHTML = orig, 2000); }
  }).catch(() => {
    openModal('<div class="p-4"><h3 class="font-semibold mb-3">Seznam k objednání</h3><textarea class="input font-mono text-xs" style="height:300px;resize:vertical">' + text + '</textarea></div>');
  });
}

// ── NABÍDKY ───────────────────────────────────────────────────────────────
let _nb = null; // aktuálně otevřená nabídka
let _nbMatsAll = []; // všechny materiály pro dropdown

// Pomocná normalizace pro filtrování typů
function _nbNormTyp(t) {
  return (t || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
}

async function nabidky() {
  setContent('<div class="text-center py-16 text-gray-400">Načítám...</div>');
  const r = await api('/api/nabidky');
  const items = r.items || [];

  const stavBadge = s => {
    const cls = s === 'Odeslaná' ? 'bg-green-100 text-green-700'
      : s === 'Schválená' ? 'bg-blue-100 text-blue-700'
      : s === 'Zamítnutá' ? 'bg-red-100 text-red-700'
      : 'bg-gray-100 text-gray-600';
    return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${s}</span>`;
  };

  const rows = items.map(n => `
    <tr class="cursor-pointer hover:bg-blue-50" onclick="nabidkaDetail(${n.id})">
      <td class="font-medium text-gray-800">${n.nazev}</td>
      <td class="text-gray-600">${n.zakaznik}${n.email ? '<br><span class="text-xs text-gray-400">' + n.email + '</span>' : ''}</td>
      <td class="text-center font-semibold">${n.pocet_ks}</td>
      <td>${stavBadge(n.stav)}</td>
      <td class="text-xs text-gray-400">${(n.created_at||'').slice(0,10)}</td>
      <td class="text-right">
        <button class="btn text-xs py-1 px-2" onclick="event.stopPropagation();nabidkaDelete(${n.id},this)">Smazat</button>
      </td>

  `).join('');

  setContent(`
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-2xl font-bold text-gray-800">Nabídky
        <span class="text-base font-normal text-gray-400 ml-2">${items.length}</span>
      </h2>
      <button class="btn btn-primary" onclick="nabidkaNew()">+ Nová nabídka</button>
    </div>
    ${items.length === 0
      ? '<div class="text-center py-16 text-gray-400">Žádné nabídky. Vytvořte první pomocí tlačítka výše.</div>'
      : `<div class="card overflow-auto">
          <table class="w-full">
            <thead><tr>
              <th>Výrobek</th><th>Zákazník</th><th class="text-center">Ks</th>
              <th>Stav</th><th>Vytvořeno</th><th></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`
    }
  `);
}

function nabidkaNew() {
  openModal(`
    <div class="p-6" style="width:460px">
      <h3 class="text-lg font-bold mb-4">Nová nabídka</h3>
      <div class="space-y-3">
        <div>
          <label class="label">Název výrobku *</label>
          <input class="input w-full" id="nb-nazev" placeholder="např. Kufr pro kytaru" onkeydown="if(event.key==='Enter')nabidkaSaveNew()">
        </div>
        <div>
          <label class="label">Zákazník *</label>
          <input class="input w-full" id="nb-zakaznik" placeholder="Jméno / firma">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="label">E-mail</label><input class="input w-full" type="email" id="nb-email"></div>
          <div><label class="label">Telefon</label><input class="input w-full" id="nb-tel"></div>
        </div>
        <div>
          <label class="label">Počet kusů</label>
          <input class="input w-28" type="number" id="nb-pocet" value="1" min="1">
        </div>
      </div>
      <div class="flex gap-2 justify-end mt-5">
        <button class="btn" onclick="closeModal()">Zrušit</button>

      </div>

async function nabidkaSaveNew() {
  const nazev = document.getElementById('nb-nazev')?.value.trim();
  const zakaznik = document.getElementById('nb-zakaznik')?.value.trim();
  if (!nazev || !zakaznik) { alert('Vyplňte název výrobku a zákazníka'); return; }
  const r = await api('/api/nabidky', 'POST', {
    nazev, zakaznik,
    email: document.getElementById('nb-email')?.value || '',
    tel: document.getElementById('nb-tel')?.value || '',
    pocet_ks: parseInt(document.getElementById('nb-pocet')?.value) || 1
  });
  if (r.error) { alert('Chyba: ' + r.error); return; }
  closeModal();
  nabidkaDetail(r.id);
}

async function nabidkaDelete(id, btn) {
  if (!confirm('Smazat nabídku?')) return;
  if (btn) btn.disabled = true;
  await api('/api/nabidky/' + id, 'DELETE');
  nabidky();
}

// ── Detail nabídky ────────────────────────────────────────────────────────

async function nabidkaDetail(id) {
  setContent('<div class="text-center py-16 text-gray-400">Načítám...</div>');
  const [nbR, matsR] = await Promise.all([
    api('/api/nabidky/' + id),
    api('/api/materialy?limit=500')
  ]);
  if (nbR.error) {
    setContent('<div class="text-center py-16 text-red-400">Chyba: ' + nbR.error + '</div>');
    return;
  }
  _nb = nbR;
  _nbMatsAll = (matsR.items || []).filter(m => {
    const nt = _nbNormTyp(m.typ);
    return nt.includes('DESKA') || nt.includes('PREKLIZK') || nt.includes('PLAYWOOD')
        || nt.includes('PLAST') || nt.includes('PEN') || nt.includes('FOAM')
        || nt.includes('BALDACHIN');
  });

  // Auto-doplnění cen pro existující řádky bez ceny
  await _nbAutoFillPrices();
  _nbRender();
}

async function _nbAutoFillPrices() {
  const rows = (_nb.materialy || []).filter(m => m.material_kod && !(parseFloat(m.cena_m2) > 0));
  if (rows.length === 0) return;
  await Promise.all(rows.map(async m => {
    const priceR = await api('/api/materialy/' + encodeURIComponent(m.material_kod) + '/fifo-cena');
    if (!priceR.error) {
      m.mat_jednotka = priceR.jednotka || 'm2';
      m.prorez_procento = parseFloat(priceR.prorez_procento) || 0;
      if (parseFloat(priceR.cena) > 0) {
        m.cena_m2 = priceR.cena;
        await api('/api/nabidky/' + _nb.id + '/materialy/' + m.id, 'PUT',
          { cena_m2: priceR.cena, prorez_procento: m.prorez_procento });
      }
    }
  }));
}

function _nbCena() {
  const n = _nb;
  const importCena = (n.import_items || []).reduce((s, it) => {
    const prorez = 1 + (parseFloat(it.prorez_procento)||0) / 100;
    return s + (parseFloat(it.mnozstvi)||0) * prorez * (parseFloat(it.cena_jednotka)||0);
  }, 0);
  const matCena = (n.materialy || []).reduce((s, m) => {
    const j = m.mat_jednotka || 'm2';
    const sirka = parseFloat(m.sirka_mm)||0;
    const pocet = parseInt(m.pocet_ks)||1;
    const prorez = 1 + (parseFloat(m.prorez_procento)||0) / 100;
    const qty = j === 'm'
      ? (sirka / 1000 * pocet * prorez)
      : (sirka * (parseFloat(m.vyska_mm)||0) / 1_000_000 * pocet * prorez);
    return s + qty * (parseFloat(m.cena_m2)||0);
  }, 0);
  const hwCena = (n.hw_items || []).reduce((s, h) => s + (parseFloat(h.mnozstvi)||0) * (parseFloat(h.cena_ks)||0), 0);
  const ks = parseInt(n.pocet_ks) || 1;
  const hodVyroba   = parseFloat(n.hodiny_vyroba)  || 0;
  const hodKresleni = parseFloat(n.hodiny_kresleni) || 0;
  const hodCnc      = parseFloat(n.hodiny_cnc)      || 0;
  // Kreslení = fixní jednorázoví náklad → dělí se počtem ks (amortizace na kus)
  const hod = hodVyroba + hodKresleni / ks + hodCnc;
  const praceCena = hod * (parseFloat(n.sazba_prace)||300);
  const extraCena = (n.extra || []).reduce((s, e) => s + (parseFloat(e.cena)||0), 0);
  const naklady = importCena + matCena + hwCena + praceCena + extraCena;
  const koef = parseFloat(n.koeficient) || 2.2;
  const bezDph = naklady * koef;
  const sdph = bezDph * 1.21;
  const kurz = parseFloat(n.kurz_eur) || 25;
  const eur = kurz > 0 ? bezDph / kurz : 0;
  const eurSdph = kurz > 0 ? sdph / kurz : 0;
  return { importCena, matCena, hwCena, praceCena, extraCena, naklady, koef, bezDph, sdph, eur, eurSdph, hod };
}

function _nbFmt(v) { return v.toLocaleString('cs-CZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function _nbFmt2(v) { return v.toLocaleString('cs-CZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

let _nbImportOpen = false;  // import sekce otevřená/zavřená

function _nbRender() {
  const n = _nb;
  const c = _nbCena();
  const hasImport = (n.import_items||[]).length > 0;
  if (hasImport && _nbImportOpen === undefined) _nbImportOpen = false;
  const importOpen = hasImport ? _nbImportOpen : true;

  // ── Import rows ──
  const importRows = (n.import_items || []).map(it => {
    const prorez = parseFloat(it.prorez_procento)||0;
    const prorezFactor = 1 + prorez / 100;
    const celkem = (parseFloat(it.mnozstvi)||0) * prorezFactor * (parseFloat(it.cena_jednotka)||0);
    const prorezLabel = prorez > 0 ? ` <span style="color:#f59e0b;font-size:.65rem">(+${prorez}%)</span>` : '';
    return `<tr>
      <td class="font-mono text-xs text-gray-500 px-1 py-0.5">${it.material_kod}</td>
      <td class="px-1 py-0.5"><input class="input" style="padding:2px 6px;font-size:.75rem;height:auto" value="${it.nazev_override||''}"
          onblur="nbImportUpdate(${it.id},'nazev_override',this.value)" placeholder="(popis)"></td>
      <td class="text-right px-1 py-0.5"><input class="input text-right" style="padding:2px 4px;font-size:.75rem;height:auto;width:52px"
          value="${_nbFmt2(parseFloat(it.mnozstvi)||0)}"
          onblur="nbImportUpdate(${it.id},'mnozstvi',parseFloat(this.value.replace(',','.'))||0)"></td>
      <td class="text-right px-1 py-0.5"><span class="font-mono text-xs">${_nbFmt2(parseFloat(it.cena_jednotka)||0)}</span>${prorezLabel}</td>
      <td class="text-right px-1 py-0.5 text-xs font-medium" id="nb-import-row-total-${it.id}">${_nbFmt2(celkem)} Kč</td>
    </tr>`;
  }).join('');

  // ── Material rows ──
  const matOptions = _nbMatsAll.map(m =>
    `<option value="${m.id}" ${m.id == '' ? '' : ''}>${m.nazev} [${m.typ||'?'}]</option>`
  ).join('');

  // Helper: zjisti jednotku materiálu z _nbMatsAll (nebo fallback m2)
  function _nbMatJednotka(material_kod) {
    if (!material_kod) return 'm2';
    const mat = _nbMatsAll.find(x => x.kod === material_kod);
    if (!mat) return 'm2';
    const nt = _nbNormTyp(mat.typ || '');
    if (nt.includes('PROFIL') || nt.includes('HLINIK') || nt.includes('LISTA')) return 'm';
    return 'm2'; // desky, pěny, plast vše m²
  }

  const matRows = (n.materialy || []).map(m => {
    const j = m.mat_jednotka || _nbMatJednotka(m.material_kod);
    const sirka = parseFloat(m.sirka_mm)||0;
    const vyska = parseFloat(m.vyska_mm)||0;
    const pocet = parseInt(m.pocet_ks)||1;
    const prorez = parseFloat(m.prorez_procento)||0;
    const prorezFactor = 1 + prorez / 100;
    const qtyBase = j === 'm' ? (sirka / 1000 * pocet) : (sirka * vyska / 1_000_000 * pocet);
    const qtyEff  = qtyBase * prorezFactor;
    const areaLabel = j === 'm' ? qtyEff.toFixed(3) + ' m' : _nbFmt2(qtyEff) + ' m²';
    const prorezLabel = prorez > 0 ? ` <span class="text-amber-500 text-xs">(+${prorez}% prořez)</span>` : '';
    const celkem = qtyEff * (parseFloat(m.cena_m2)||0);
    const cenLabel = j === 'm' ? 'Kč/m' : 'Kč/m²';
    const inp2 = `style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;outline:none;text-align:right"`;
    return `<tr>
      <td style="padding:2px 4px">
        <select style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;width:100%;background:white" onchange="nbMatUpdate(${m.id},'material_kod',this.value)">
          <option value="">– vyberte –</option>
          ${_nbMatsAll.map(mat => `<option value="${mat.kod}" ${mat.kod==m.material_kod?'selected':''}>${mat.nazev} [${mat.typ||'?'}]</option>`).join('')}
        </select>
      </td>
      <td style="padding:2px 2px"><input ${inp2} style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;width:62px;text-align:right"
          value="${sirka}" onblur="nbMatUpdate(${m.id},'sirka_mm',parseFloat(this.value)||0)"></td>
      <td style="padding:2px 2px"><input ${inp2} style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;width:62px;text-align:right"
          value="${vyska}" onblur="nbMatUpdate(${m.id},'vyska_mm',parseFloat(this.value)||0)"
          ${j==='m'?'disabled style="opacity:0.3;padding:2px 4px;font-size:.72rem;width:62px"':''}></td>
      <td style="padding:2px 2px"><input ${inp2} style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;width:38px;text-align:right"
          value="${pocet}" onblur="nbMatUpdate(${m.id},'pocet_ks',parseInt(this.value)||1)"></td>
      <td style="text-align:right;padding:2px 4px;font-size:.65rem;color:#6b7280" id="nb-mat-area-${m.id}">${areaLabel}${prorezLabel}</td>
      <td style="padding:2px 2px">
        <div style="display:flex;align-items:center;gap:2px;justify-content:flex-end">
          <input ${inp2} style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;width:70px;text-align:right" id="nb-mat-cena-m2-${m.id}"
            value="${_nbFmt2(parseFloat(m.cena_m2)||0)}"
            onblur="nbMatUpdate(${m.id},'cena_m2',parseFloat(this.value.replace(',','.'))||0)">
          <span style="font-size:.62rem;color:#9ca3af;white-space:nowrap">${cenLabel}</span>
        </div>
      </td>
      <td style="text-align:right;padding:2px 4px;font-size:.72rem;font-weight:600" id="nb-mat-total-${m.id}">${_nbFmt2(celkem)} Kč</td>
      <td style="padding:2px 2px;text-align:center">
        <button style="font-size:.65rem;padding:1px 5px;border-radius:4px;background:#fee2e2;color:#dc2626;border:none;cursor:pointer" onclick="nbMatDelete(${m.id})">✕</button>
      </td>
    </tr>`;
  }).join('');

  // ── HW / Spojovací materiál rows ──
  const hwRows = (n.hw_items || []).map(h => {
    const celkem = (parseFloat(h.mnozstvi)||0) * (parseFloat(h.cena_ks)||0);
    const isAuto = h.auto_generated == 1;
    const rowBg = isAuto ? 'background:#f0fdf4' : '';
    const inp = `style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;outline:none"`;
    return `<tr style="${rowBg}">
      <td style="padding:2px 4px">
        ${isAuto
          ? `<span style="font-size:.72rem;font-family:monospace;color:#374151">${h.material_kod||'–'}</span>
             <span style="font-size:.65rem;color:#16a34a;margin-left:3px" title="Auto ze spojovníků">⚙</span>`
          : `<select ${inp} style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;width:100%" onchange="nbHwUpdate(${h.id},'material_kod',this.value)">
               <option value="">– vyberte –</option>
               ${_nbMatsAll.map(mat => `<option value="${mat.kod}" ${mat.kod==h.material_kod?'selected':''}>${mat.nazev} [${mat.typ||'?'}]</option>`).join('')}
             </select>`
        }
      </td>
      <td style="padding:2px 4px;font-size:.72rem;color:#374151">${isAuto
        ? (h.nazev_override||h.mat_nazev||'')
        : `<input ${inp} style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;width:100%" value="${h.nazev_override||''}" onblur="nbHwUpdate(${h.id},'nazev_override',this.value)" placeholder="Popis">`
      }</td>
      <td style="padding:2px 4px;text-align:right">
        <input ${inp} style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;width:52px;text-align:right"
          value="${parseFloat(h.mnozstvi)||0}"
          onblur="nbHwUpdate(${h.id},'mnozstvi',parseFloat(this.value.replace(',','.'))||0)">
      </td>
      <td style="padding:2px 4px;text-align:right">
        <input ${inp} style="padding:2px 4px;font-size:.72rem;height:auto;border:1.5px solid #e2e8f0;border-radius:6px;width:70px;text-align:right" id="nb-hw-cena-${h.id}"
          value="${_nbFmt2(parseFloat(h.cena_ks)||0)}"
          onblur="nbHwUpdate(${h.id},'cena_ks',parseFloat(this.value.replace(',','.'))||0)">
      </td>
      <td style="text-align:right;padding:2px 4px;font-size:.72rem;font-weight:600" id="nb-hw-total-${h.id}">${_nbFmt2(celkem)} Kč</td>
      <td style="padding:2px 2px;text-align:center">

// ── Live update cen (bez full re-renderu) ─────────────────────────────────

function _nbUpdateAllPrices() {
  const c = _nbCena();

  // Hodiny summary
  const hodEl = document.getElementById('nb-hod-summary');
  {
    const n = _nb, ks = parseInt(n.pocet_ks)||1;
    const hV = parseFloat(n.hodiny_vyroba)||0;
    const hK = parseFloat(n.hodiny_kresleni)||0;
    const hC = parseFloat(n.hodiny_cnc)||0;
    const kresInfo = ks > 1 ? `${_nbFmt2(hK)}÷${ks}` : _nbFmt2(hK);
    if (hodEl) hodEl.innerHTML =
      `V:${_nbFmt2(hV)} K:${kresInfo} C:${_nbFmt2(hC)} = <strong>${_nbFmt2(c.hod)} h</strong> × ${_nbFmt(parseFloat(n.sazba_prace)||300)} = <strong>${_nbFmt2(c.praceCena)} Kč</strong>`;
  }

  // Shrnutí řádky + tfoot totals
  const setTxt = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  const setHtml = (id, v) => { const el = document.getElementById(id); if (el) el.innerHTML = v; };
  setTxt('nb-sum-import',   _nbFmt2(c.importCena) + ' Kč');
  setTxt('nb-sum-mat',      _nbFmt2(c.matCena)    + ' Kč');
  setTxt('nb-sum-hw',       _nbFmt2(c.hwCena)     + ' Kč');
  setTxt('nb-sum-prace',    _nbFmt2(c.praceCena)  + ' Kč');
  setTxt('nb-import-tfoot', _nbFmt2(c.importCena) + ' Kč');
  setTxt('nb-mat-tfoot',    _nbFmt2(c.matCena)    + ' Kč');
  setTxt('nb-hw-tfoot',     _nbFmt2(c.hwCena)     + ' Kč');
  setTxt('nb-import-sum-inline', _nbFmt2(c.importCena));
  const prEl = document.getElementById('nb-sum-prace-label');
  if (prEl) prEl.textContent = `Práce (${_nbFmt2(c.hod)} h)`;

  // Import řádky – total (s prořezem)
  (_nb.import_items||[]).forEach(it => {
    const prorez = 1 + (parseFloat(it.prorez_procento)||0) / 100;
    const total = (parseFloat(it.mnozstvi)||0) * prorez * (parseFloat(it.cena_jednotka)||0);
    setTxt('nb-import-row-total-' + it.id, _nbFmt2(total) + ' Kč');
  });

  // Materiálové řádky – area (s prořezem) + total
  (_nb.materialy||[]).forEach(m => {
    const j = m.mat_jednotka || 'm2';
    const sirka = parseFloat(m.sirka_mm)||0;
    const pocet = parseInt(m.pocet_ks)||1;
    const prorez = parseFloat(m.prorez_procento)||0;
    const prorezFactor = 1 + prorez / 100;
    const qtyBase = j === 'm' ? (sirka / 1000 * pocet) : (sirka * (parseFloat(m.vyska_mm)||0) / 1_000_000 * pocet);
    const qtyEff  = qtyBase * prorezFactor;
    const total = qtyEff * (parseFloat(m.cena_m2)||0);
    const prorezTag = prorez > 0 ? ` <span class="text-amber-500 text-xs">(+${prorez}% prořez)</span>` : '';
    const areaLabel = j === 'm' ? qtyEff.toFixed(3) + ' m' : _nbFmt2(qtyEff) + ' m²';
    setHtml('nb-mat-area-'  + m.id, areaLabel + prorezTag);
    setTxt('nb-mat-total-' + m.id, _nbFmt2(total) + ' Kč');
  });

  // HW řádky – total
  (_nb.hw_items||[]).forEach(h => {
    const total = (parseFloat(h.mnozstvi)||0) * (parseFloat(h.cena_ks)||0);
    setTxt('nb-hw-total-' + h.id, _nbFmt2(total) + ' Kč');
  });

  // Price box
  const box = document.getElementById('nb-price-box');
  if (box) box.innerHTML = `
    <div class="flex justify-between text-xs text-gray-500 mb-1">
      <span>Náklady × ${c.koef}</span><span>${_nbFmt2(c.naklady)} Kč</span>
    </div>
    <div class="flex justify-between font-semibold text-gray-800 border-t border-gray-200 pt-1.5 mb-1">
      <span>Bez DPH</span><span>${_nbFmt2(c.bezDph)} Kč</span>
    </div>
    <div class="flex justify-between text-xs text-gray-400 mb-1">
      <span>DPH 21 %</span><span>${_nbFmt2(c.sdph - c.bezDph)} Kč</span>
    </div>
    <div class="flex justify-between font-bold text-indigo-700 border-t border-gray-200 pt-1.5 text-base mb-1">
      <span>S DPH</span><span>${_nbFmt2(c.sdph)} Kč</span>
    </div>
    <div class="flex justify-between text-xs text-gray-500 mb-0.5">
      <span>EUR bez DPH</span><span>${_nbFmt2(c.eur)} €</span>
    </div>
    <div class="flex justify-between text-xs text-gray-400">
      <span>EUR s DPH</span><span>${_nbFmt2(c.eurSdph)} €</span>
    </div>`;
}

// ── Import z konfigurátoru ────────────────────────────────────────────────

function _nbParseImportText(txt) {
  return (txt || '').split('\n')
    .map(l => l.trim()).filter(Boolean)
    .map(line => {
      const m = line.match(/^([\d,\.]+)\s+(.+)$/);
      if (!m) return null;
      return { material_kod: m[2].trim(), mnozstvi: parseFloat(m[1].replace(',', '.')) || 0 };
    }).filter(Boolean);
}

function _nbParsePreview() {
  const txt = document.getElementById('nb-import-txt')?.value || '';
  const parsed = _nbParseImportText(txt);
  const el = document.getElementById('nb-import-preview');
  if (!el) return;
  if (parsed.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `<p class="text-xs text-gray-500 mb-1">Nalezeno ${parsed.length} položek:</p>
    <div class="flex flex-wrap gap-1">
      ${parsed.map(p => `<span class="text-xs bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">${p.mnozstvi} × ${p.material_kod}</span>`).join('')}
    </div>`;
}

async function nbSaveImport() {
  const txt = document.getElementById('nb-import-txt')?.value || '';
  const parsed = _nbParseImportText(txt);
  if (parsed.length === 0) { alert('Žádné položky k uložení. Zkontrolujte formát (množství KÓD na každém řádku).'); return; }
  const btn = document.querySelector('[onclick="nbSaveImport()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Ukládám...'; }
  const r = await api('/api/nabidky/' + _nb.id + '/import', 'POST', parsed);
  if (btn) { btn.disabled = false; btn.textContent = 'Uložit import'; }
  if (r.error) { alert('Chyba při ukládání: ' + r.error); return; }
  // Znovu načti celou nabídku (aby se projevily auto-přepočítané HW spojovníky)
  const fresh = await api('/api/nabidky/' + _nb.id);
  if (!fresh.error) _nb = fresh;
  else _nb.import_items = r.items || [];
  // Upozornění na položky bez ceny
  const bezCeny = (_nb.import_items||[]).filter(it => !(parseFloat(it.cena_jednotka) > 0));
  _nbRender();
  if (bezCeny.length > 0) {
    setTimeout(() => alert(
      bezCeny.length + ' položek nemá cenu v FIFO ani číselníku:\n' +
      bezCeny.map(it => it.material_kod).join(', ') +
      '\n\nCenu zadejte ručně v tabulce níže.'
    ), 200);
  }
}

async function nbImportUpdate(iid, field, value) {
  await api('/api/nabidky/' + _nb.id + '/import/' + iid, 'PUT', { [field]: value });
  const it = (_nb.import_items||[]).find(x => x.id === iid);
  if (it) it[field] = value;
  // Při změně množství se přepočítaly HW spojovníky — načti aktualizované hw_items
  if (field === 'mnozstvi') {
    const fresh = await api('/api/nabidky/' + _nb.id);
    if (!fresh.error) { _nb = fresh; _nbRender(); return; }
  }
  _nbUpdateAllPrices();
}

// ── Materiály (desky/pěny) ────────────────────────────────────────────────

async function nbMatAdd() {
  const r = await api('/api/nabidky/' + _nb.id + '/materialy', 'POST', { pocet_ks: 1 });
  if (r.error) { alert('Chyba: ' + r.error); return; }
  // Reload detail
  const fresh = await api('/api/nabidky/' + _nb.id);
  if (!fresh.error) { _nb = fresh; _nb._allMats = undefined; }
  // Preserve _nbMatsAll
  _nbRender();
}

async function nbMatUpdate(mid, field, value) {
  const body = { [field]: value };

  // Při změně materiálu auto-načti FIFO cenu (přepočítanou na správnou jednotku)
  if (field === 'material_kod') {
    const m = (_nb.materialy||[]).find(x => x.id === mid);
    if (value) {
      const priceR = await api('/api/materialy/' + encodeURIComponent(value) + '/fifo-cena');
      if (!priceR.error) {
        const cena = parseFloat(priceR.cena) || 0;
        const prorezPct = parseFloat(priceR.prorez_procento) || 0;
        body.cena_m2 = cena;
        body.prorez_procento = prorezPct;
        // Aktualizuj input pole ceny
        const cenaInput = document.getElementById('nb-mat-cena-m2-' + mid);
        if (cenaInput) {
          cenaInput.value = _nbFmt2(cena);
          if (cena === 0) {
            // Debug: ukáž z čeho se čerpalo
            const info = `FIFO: ${priceR._fifo_davky||0} | NC: ${priceR._nc_bez_dph||0} | Nakup.j.: ${priceR._nakup_jednotka||0} | Balení: ${priceR._nakup_baleni||0} | balenf: ${priceR.balenf||1}`;
            cenaInput.title = info;
            cenaInput.style.borderColor = '#f59e0b';
            console.warn('Nenalezena cena pro', value, info);
          } else {
            cenaInput.title = `Kč/kus: ${_nbFmt2(priceR.cena_za_kus)} ÷ balenf ${priceR.balenf} = ${_nbFmt2(cena)} Kč/${priceR.jednotka}${prorezPct>0?' | prořez: '+prorezPct+'%':''}`;
            cenaInput.style.borderColor = '';
          }
        }
        // Ulož jednotku a prořez do lokálního záznamu
        if (m) {
          m.mat_jednotka = priceR.jednotka || 'm2';
          m.mat_nazev = priceR.nazev || '';
          m.prorez_procento = prorezPct;
        }
      }
    } else {
      if (m) { m.mat_jednotka = 'm2'; }
    }
  }

  await api('/api/nabidky/' + _nb.id + '/materialy/' + mid, 'PUT', body);

  // Aktualizuj lokální stav
  const m = (_nb.materialy||[]).find(x => x.id === mid);
  if (m) {
    m[field] = value;
    if (body.cena_m2 !== undefined) m.cena_m2 = body.cena_m2;
  }
  _nbUpdateAllPrices();
}

async function nbMatDelete(mid) {
  if (!confirm('Smazat řádek?')) return;
  await api('/api/nabidky/' + _nb.id + '/materialy/' + mid, 'DELETE');
  const fresh = await api('/api/nabidky/' + _nb.id);
  if (!fresh.error) _nb = fresh;
  _nbRender();
}

async function nbCreateKancZakazka() {

async function nbHwPrepocitat() {
  const btn = document.getElementById('nb-hw-prepocitat-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Počítám...'; }
  const r = await api('/api/nabidky/' + _nb.id + '/hw/prepocitat', 'POST', {});
  if (btn) { btn.disabled = false; btn.innerHTML = '⚙ Přepočítat ze spojovníků'; }
  if (r.error) { alert('Chyba: ' + r.error); return; }
  _nb.hw_items = r.hw_items || [];
  _nbRender();
  if (r.pocet_spojovniku === 0) {
    alert('Žádné spojovníky nenalezeny. Zkontrolujte pravidla spojovníků v Nastavení → Spojovníky.');
  }
}

async function nbHwAdd() {
  const r = await api('/api/nabidky/' + _nb.id + '/hw', 'POST', { mnozstvi: 1, auto_generated: 0 });
  if (r.error) { alert('Chyba: ' + r.error); return; }
  const fresh = await api('/api/nabidky/' + _nb.id);
  if (!fresh.error) _nb = fresh;
  _nbRender();
}

async function nbHwUpdate(hwid, field, value) {
  const body = { [field]: value };

  // Při změně materiálu auto-načti FIFO cenu (ks)
  if (field === 'material_kod' && value) {
    const priceR = await api('/api/materialy/' + encodeURIComponent(value) + '/fifo-cena');
    if (!priceR.error) {
      const cena = parseFloat(priceR.cena_za_kus) || parseFloat(priceR.cena) || 0;
      body.cena_ks = cena;
      // Aktualizuj input pole ceny
      const cenaInput = document.getElementById('nb-hw-cena-' + hwid);
      if (cenaInput) {
        cenaInput.value = _nbFmt2(cena);
        cenaInput.style.borderColor = cena === 0 ? '#f59e0b' : '';
      }
      // Aktualizuj lokální záznam
      const h = (_nb.hw_items||[]).find(x => x.id === hwid);
      if (h) { h.cena_ks = cena; h.nazev_override = priceR.nazev || h.nazev_override || ''; }
    }
  }

  await api('/api/nabidky/' + _nb.id + '/hw/' + hwid, 'PUT', body);

  const h = (_nb.hw_items||[]).find(x => x.id === hwid);
  if (h) {
    h[field] = value;
    if (body.cena_ks !== undefined) h.cena_ks = body.cena_ks;
  }
  _nbUpdateAllPrices();
}

async function nbHwDelete(hwid) {
  if (!confirm('Smazat položku?')) return;
  await api('/api/nabidky/' + _nb.id + '/hw/' + hwid, 'DELETE');
  const fresh = await api('/api/nabidky/' + _nb.id);
  if (!fresh.error) _nb = fresh;
  _nbRender();
}
